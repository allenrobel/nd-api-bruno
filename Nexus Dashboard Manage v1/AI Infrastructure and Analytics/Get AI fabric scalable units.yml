info:
  name: Get AI fabric scalable units
  type: http
  seq: 2
  tags:
    - AI Infrastructure and Analytics

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/scalableUnits"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: scalableUnit
      value: ""
      type: query
      description: Get switches for a specific scalable unit only. If omitted, returns all scalable units with their assignments
      disabled: true
    - name: includeUnassigned
      value: "false"
      type: query
      description: Include switches not assigned to any scalable unit (only applicable when scalableUnit parameter is not provided)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: All scalable units with their switch assignments
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/scalableUnits"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: scalableUnit
          value: ""
          type: query
          description: Get switches for a specific scalable unit only. If omitted, returns all scalable units with their assignments
          disabled: true
        - name: includeUnassigned
          value: "false"
          type: query
          description: Include switches not assigned to any scalable unit (only applicable when scalableUnit parameter is not provided)
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "scalableUnits": [
              {
                "name": "scalable-unit-1",
                "switches": [
                  {
                    "description": "Backend compute scalable unit leaf 1",
                    "switchId": "FLM2518055U"
                  },
                  {
                    "description": "Backend compute scalable unit leaf 2",
                    "switchId": "FLM2518056V"
                  }
                ]
              },
              {
                "name": "scalable-unit-2",
                "switches": [
                  {
                    "description": "Frontend web scalable unit leaf 1",
                    "switchId": "FLM2518057W"
                  },
