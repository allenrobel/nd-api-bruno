info:
  name: Assign switches to scalable unit (bulk operation)
  type: http
  seq: 2

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/scalableUnits/:scalableUnit/actions/addMembers"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: scalableUnit
      value: ""
      type: path
      description: Name of the scalable unit
  body:
    type: json
    data: |-
      {
        "switches": [
          {
            "description": "",
            "switchId": ""
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response (Assign multiple switches using serial numbers)
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/scalableUnits/:scalableUnit/actions/addMembers"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: scalableUnit
          value: ""
          type: path
          description: Name of the scalable unit
      body:
        type: json
        data: |-
          {
            "switches": [
              {
                "description": "Backend compute scalable unit leaf 1",
                "switchId": "FLM2518055U"
              },
              {
                "description": "Backend compute scalable unit leaf 2",
                "switchId": "FLM2518056V"
              }
            ]
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Successfully assigned 2 switches to scalable unit scalable-unit-1"
          }
