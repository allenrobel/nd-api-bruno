          type: path
          description: Name of the fabric
        - name: aggregationOrLeafSwitchId
          value: ""
          type: query
          description: Serial number of the aggregation or leaf switch. Required when includeCandidates is true. When includeCandidates is false, this can be used to optionally filter the responses to only include associations for the specified aggregation or leaf switch.
