info:
  name: List access or ToR associations
  type: http
  seq: 3
  tags:
    - Access-ToR Associations

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/accessAssociations"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: aggregationOrLeafPeerSwitchId
      value: ""
      type: query
      description: Serial number of the aggregation or leaf VPC peer switch. When includeCandidates is false, this can be used along with aggregationOrLeafSwitchId to optionally filter the responses to only include associations for the specified vpc pair.
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: aggregationOrLeafSwitchId
      value: ""
      type: query
      description: Serial number of the aggregation or leaf switch. Required when includeCandidates is true. When includeCandidates is false, this can be used to optionally filter the responses to only include associations for the specified aggregation or leaf switch.
      disabled: true
    - name: includeCandidates
      value: "false"
      type: query
      description: Include candidate switches and return all possible associations. When false, only existing associations are returned.
    - name: accessOrTorSwitchId
      value: ""
      type: query
      description: Specify the serial number of the access or ToR switch to filter the results. Only valid when includeCandidates is false.
      disabled: true
    - name: accessOrTorPeerSwitchId
      value: ""
      type: query
      description: Specify the serial number of the access or ToR VPC peer switch to filter the results. Only valid when includeCandidates is false.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

