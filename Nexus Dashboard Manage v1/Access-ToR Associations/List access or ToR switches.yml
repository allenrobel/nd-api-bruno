info:
  name: List access or ToR switches
  type: http
  seq: 3

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/accessAssociations"
  params:
    - name: aggregationOrLeafSwitchId
      value: ""
      type: query
      description: Serial Number of the aggregation or leaf switch
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: fabric1
      type: path
      description: Name of the fabric
    - name: aggregationOrLeafPeerSwitchId
      value: ""
      type: query
      description: Serial Number of the aggregation or leaf VPC peer switch
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: Sort the records by the declared fields in either ascending (default) or descending (:desc) order
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

