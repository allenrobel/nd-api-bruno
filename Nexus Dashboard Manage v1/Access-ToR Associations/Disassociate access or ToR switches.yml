info:
  name: Disassociate access or ToR switches
  type: http
  seq: 2
  tags:
    - Access-ToR Associations

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/accessAssociationActions/disassociate"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: |-
      [
        {
          "accessOrTorSwitchId": "99A8ORYAJ2R",
          "aggregationOrLeafPeerSwitchId": "97UGR7ATD6J",
          "aggregationOrLeafSwitchId": "9ZNI940AB7M"
        }
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

