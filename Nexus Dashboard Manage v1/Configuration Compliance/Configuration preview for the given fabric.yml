info:
  name: Configuration preview for the given fabric
  type: http
  seq: 1
  tags:
    - Configuration Compliance

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/actions/preview"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: forceShowRun
      value: ""
      type: query
      description: If true, Config compliance fetches the latest running config from the Device. If false, Config compliance uses the cached version for computation.
      disabled: true
    - name: showBrief
      value: ""
      type: query
      description: If true, API provides line count of the pending config. If false, detailed output is provided.
      disabled: true
    - name: includeAllFabricGroupSwitches
      value: "false"
      type: query
      description: If this passed as true and the queried fabric is a VXLAN fabric group aka Multi-Site Domain (MSD) fabric, then all of the child fabric switches configuration preview is provided, if passed as false switches in migration state will not be used for configuration preview. If fabric is not a Multi-Site Domain, this flag is ignored.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

