info:
  name: Reconcile configuration drift for a switch
  type: http
  seq: 8
  tags:
    - Configuration Compliance

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/switchActions/:switchId/configurationDriftReconcile"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: switchId
      value: ""
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
  body:
    type: json
    data: |-
      {
        "reconcileConfig": [
          "ntp server 10.20.30.40 use-vrf management",
          "ntp server 10.20.30.50 use-vrf management"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

