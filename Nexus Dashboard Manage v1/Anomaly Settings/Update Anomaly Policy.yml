info:
  name: Update Anomaly Policy
  type: http
  seq: 22

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/anomalyRules/system/fabricManagement/:anomalyType"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: anomalyType
      value: ""
      type: path
      description: anomalyType name
  body:
    type: json
    data: "{}"
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response (basicAnomaly)
    description: No Content
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/anomalyRules/system/fabricManagement/:anomalyType"
      method: PUT
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: anomalyType
          value: ""
          type: path
          description: anomalyType name
      body:
        type: json
        data: |-
          {
            "anomalyFormatType": "basic",
            "anomalyType": "linkState",
            "commonAnomaly": {
              "details": "Policy to check interface state",
              "forwarding": "email",
              "isActive": true
            },
            "severity": "minor"
          }
    response:
      statusText: No Content
      body:
        type: text
        data: ""
