info:
  name: Retrieve a rule based on its ID
  type: http
  seq: 7

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/anomalyRules/complianceRules/:ruleId"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: ruleId
      value: ""
      type: path
      description: The ID of the rule that is retrieved
    - name: startDate
      value: ""
      type: query
      description: Start date of the rule in order to access a specific rule from compliance reports
    - name: endDate
      value: ""
      type: query
      description: End date of the rule in order to access a specific rule from compliance reports
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

