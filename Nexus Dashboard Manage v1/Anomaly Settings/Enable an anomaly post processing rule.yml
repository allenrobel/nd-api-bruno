info:
  name: Enable an anomaly post processing rule
  type: http
  seq: 16

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/anomalyRules/postProcessingRules/:ruleName/actions/enable"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: ruleName
      value: ""
      type: path
      description: Name of the anomaly post processing rule
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

