          description: Name of the anomaly post processing rule
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "actions": [
              {
                "action": "acknowledge",
                "applyToActiveAnomalies": true
              }
            ],
            "description": "Acknowledge EPG with invalid BD anomaly",
            "enabled": true,
            "lastModifiedTime": "2022-01-01T00:00:00Z",
            "matchCriteria": [
              {
                "anomalyTitleMatchCriteria": [
                  {
                    "valueEquals": "EPG_HAS_INVALID_BD"
