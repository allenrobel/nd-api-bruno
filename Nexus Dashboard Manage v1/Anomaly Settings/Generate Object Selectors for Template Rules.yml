info:
  name: Generate Object Selectors for Template Rules
  type: http
  seq: 4
  tags:
    - Anomaly Settings

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/anomalyRules/complianceRules/queryObjectsFileTemplatePreview"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: multipart-form
    data:
      - name: file
        type: text
        value: customer_template_2.json
      - name: ruleObjectSelectorData
        type: text
        value: '{"uuid": "123e4567-e89b-12d3-a456-426614174000", "name": "Example Selector", "description": "Description", "includes": [ { "matches": [ { "applicationEpgMatch": { "objectAttribute": "exampleAttribute", "tenant": { "type": "contains", "pattern": "app" }, "applicationProfile": { "type": "contains", "pattern": "app" }, "applicationEpg": { "type": "contains", "pattern": "app" } } } ] } ], "excludes": [ { "matches": [ { "applicationEpgMatch": { "objectAttribute": "exampleAttribute", "tenant": { "type": "contains", "pattern": "app" }, "applicationProfile": { "type": "contains", "pattern": "app" }, "applicationEpg": { "type": "contains", "pattern": "app" } } } ] } ], "selectorType": "EPG", "isSelectorBasedOnTagsActive": true, "ruleName": "Example Rule" }'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

