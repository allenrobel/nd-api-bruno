info:
  name: Get anomaly rules filtered by query parameters
  type: http
  seq: 24
  tags:
    - Anomaly Settings

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/anomalyRules/systemTelemetryRules"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: title
      value: ""
      type: query
      description: Title
      disabled: true
    - name: pathAnomalyCategory
      value: ""
      type: query
      description: Category type filter
      disabled: true
    - name: pathApplicablePlatforms
      value: aci
      type: query
      description: Applicable Platforms
      disabled: true
    - name: pathApplicablePlatforms
      value: nx-os
      type: query
      description: Applicable Platforms
      disabled: true
    - name: pathApplicablePlatforms
      value: all
      type: query
      description: Applicable Platforms
      disabled: true
    - name: status
      value: default
      type: query
      description: Status
      disabled: true
    - name: status
      value: customized
      type: query
      description: Status
      disabled: true
    - name: status
      value: notAvailable
      type: query
      description: Status
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

