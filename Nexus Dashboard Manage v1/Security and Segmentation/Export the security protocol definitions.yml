info:
  name: Export the security protocol definitions
  type: http
  seq: 31
  tags:
    - Security and Segmentation

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/securityProtocolDefinitionActions/export"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "securityProtocolDefinitionNames": [
          "https"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response (Export a security protocol definition)
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/securityProtocolDefinitionActions/export"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "securityProtocolDefinitionNames": [
              "https"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          name,tenantName,displayName,description,matchName,type,ipProtocol,srcPortRange,dstPortRange,tcpSessionRules,dscp,onlyFragments,stateful
          tenantSales~https,tenantSales,,Match HTTPs,MatchHttps,IP,TCP,,443,,,,false,false
          icmp,,,Match ICMP,MatchIcmp,IP,ICMP,,,,false,false,false
