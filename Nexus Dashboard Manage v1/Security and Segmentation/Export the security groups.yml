info:
  name: Export the security groups
  type: http
  seq: 22
  tags:
    - Security and Segmentation

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/securityGroupActions/export"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "securityGroupNames": [
          "SG_10000"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

