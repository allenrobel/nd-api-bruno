info:
  name: Export the security contracts
  type: http
  seq: 11
  tags:
    - Security and Segmentation

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/securityContractActions/export"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "securityContractNames": [
          "permit-web"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response (Export a security contract)
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/securityContractActions/export"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "securityContractNames": [
              "permit-web"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          name,tenantName,displayName,description,direction,ruleDirection,action,protocolDefinitionName
          tenantSales~permit-web,tenantSales,,allow web traffic,bidirectional,bidirectional,permit,tenantSales~https
          tenantSales~deny-icmp,tenantSales,,deny icmp traffic,bidirectional,bidirectional,deny,tenantSales~icmp
          deny-icmp,,,deny icmp traffic,bidirectional,bidirectional,deny,icmp
