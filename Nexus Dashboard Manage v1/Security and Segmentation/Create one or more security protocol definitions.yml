info:
  name: Create one or more security protocol definitions
  type: http
  seq: 35

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/securityProtocolDefinitions"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "securityProtocolDefinitions": [
          {
            "name": "",
            "tenantName": "",
            "displayName": "",
            "description": "",
            "matchType": "",
            "matchItems": [
              {
                "matchName": "",
                "type": "",
                "protocolOptions": "",
                "srcPortRange": "",
                "dstPortRange": "",
                "tcpFlags": "",
                "onlyFragments": false,
                "stateful": false,
                "dscp": 0
              }
            ]
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

