          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "securityAssociationNames": [
              "SA_10000"
            ]
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          name,tenantName,displayName,description,contractName,srcSecurityGroupName,srcVrfName,dstSecurityGroupName,dstVrfName,attach
          tenantSales~SA_10000,tenantSales,MySecurityAssociation_10000,,tenantSales~pemrit-web,tenantSales~SG_10000,tenantSales~MyVRF_50000,tenantSales~SG_20000,tenantSales~MyVRF_50001,true
