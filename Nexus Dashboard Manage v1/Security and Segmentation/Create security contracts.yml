info:
  name: Create security contracts
  type: http
  seq: 15

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/securityContracts"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "securityContracts": [
          {
            "name": "",
            "tenantName": "",
            "displayName": "",
            "description": "",
            "direction": "",
            "rules": [
              {
                "ruleDirection": "",
                "action": "",
                "protocolDefinitionName": "",
                "protocolDefinitionMatchSummary": ""
              }
            ]
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Example of creating one security contract (Create one security contract with multi directional rules without tenant)
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/securityContracts"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "securityContracts": [
              {
                "description": "Allow web traffic",
                "direction": "custom",
                "name": "permit-web",
                "rules": [
                  {
                    "action": "permit",
                    "protocolDefinitionName": "https",
                    "ruleDirection": "bidirectional"
                  },
                  {
                    "action": "permit",
                    "protocolDefinitionName": "http",
                    "ruleDirection": "unidirectional"
                  }
                ]
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "securityContracts": [
              {
                "name": "permit-web",
                "status": "success",
                "message": "Successfully created security contract: permit-web"
              }
            ]
          }
