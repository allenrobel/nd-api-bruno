      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: securityAssociationName
      value: ""
      type: path
      description: Security Association Name path parameter
  body:
    type: json
    data: |-
      {
        "name": "",
        "tenantName": "",
        "displayName": "",
        "description": "",
        "contractName": "",
        "srcSecurityGroupName": "",
        "srcVrfName": "",
        "dstSecurityGroupName": "",
        "dstVrfName": "",
        "attach": false
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

