info:
  name: Create one or more security associations
  type: http
  seq: 7
  tags:
    - Security and Segmentation

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/securityAssociations"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "securityAssociations": [
          {
            "contractName": "deny-icmp",
            "dstSecurityGroupName": "SG_20000",
            "dstVrfName": "MyVRF_50000",
            "name": "SA_10000",
            "srcSecurityGroupName": "SG_10000",
            "srcVrfName": "MyVRF_50000"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

