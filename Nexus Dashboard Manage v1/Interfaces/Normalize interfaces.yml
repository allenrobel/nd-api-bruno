info:
  name: Normalize interfaces
  type: http
  seq: 5
  tags:
    - Interfaces

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/interfaceActions/normalize"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "configData": {
          "mode": "access",
          "networkOS": {
            "networkOSType": "nx-os",
            "policy": {
              "accessVlan": 100,
              "adminState": true,
              "bpduGuard": "enable",
              "cdp": true,
              "duplexMode": "half",
              "extraConfig": "logging event port link-status",
              "mtu": "default",
              "netflow": false,
              "netflowMonitor": "Netflow Layer-2 monitor name for the interface",
              "netflowSampler": "Netflow Layer-2 sampler name for the interface (only applicable for Nexus 7000 platforms)",
              "orphanPort": true,
              "pfc": false,
              "policyType": "accessHost",
              "portTypeEdgeTrunk": true,
              "qos": false,
              "qosPolicy": "Custom QoS Policy associated with the interface (must be defined apriori)",
              "queueingPolicy": "Custom Queuing Policy associated with the interface (must be defined apriori)",
              "speed": "auto"
            }
          }
        },
        "interfaceType": "ethernet",
        "switchInterfaces": [
          {
            "interfaceName": "Ethernet1/11",
            "switchId": "FDO22412H7A"
          },
          {
            "interfaceName": "Ethernet1/12",
            "switchId": "FDO22412H7B"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

