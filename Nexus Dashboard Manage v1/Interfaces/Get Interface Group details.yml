info:
  name: Get Interface Group details
  type: http
  seq: 14
  tags:
    - Interfaces

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/interfaceGroups/:interfaceGroupName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: interfaceGroupName
      value: ""
      type: path
      description: Name of the Group
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

