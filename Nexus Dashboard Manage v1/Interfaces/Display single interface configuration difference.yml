info:
  name: Display single interface configuration difference
  type: http
  seq: 23
  tags:
    - Interfaces

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/interfaces/:interfaceName/diff"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: switchId
      value: ""
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: interfaceName
      value: ""
      type: path
      description: Name of the interface
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/interfaces/:interfaceName/diff"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: switchId
          value: ""
          type: path
          description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
        - name: interfaceName
          value: ""
          type: path
          description: Name of the interface
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "description": "Get side by side configuration difference for a given switch",
            "diffConfigs": [
              {
                "differenceType": "equal",
                "expectedConfig": "interface Ethernet1/2",
                "runningConfig": "interface Ethernet1/2"
              },
              {
                "differenceType": "equal",
                "expectedConfig": "  switchport",
                "runningConfig": "  switchport"
              },
              {
                "differenceType": "equal",
                "expectedConfig": "  switchport mode trunk",
                "runningConfig": "  switchport mode trunk"
              },
              {
                "differenceType": "delete",
                "expectedConfig": "",
                "runningConfig": "  switchport trunk allowed vlan 10"
              },
              {
                "differenceType": "equal",
                "expectedConfig": "  mtu 9216",
                "runningConfig": "  mtu 9216"
              },
              {
                "differenceType": "equal",
                "expectedConfig": "  no shutdown",
                "runningConfig": "  no shutdown"
              },
              {
                "differenceType": "insert",
                "expectedConfig": "  switchport trunk allowed vlan none",
                "runningConfig": ""
              },
              {
                "differenceType": "insert",
                "expectedConfig": "  spanning-tree port type edge trunk",
                "runningConfig": ""
              }
            ]
          }
