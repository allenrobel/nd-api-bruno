info:
  name: Create a new interfaces
  type: http
  seq: 19

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/interfaces"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: switchId
      value: ""
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "interfaces": [
          {}
        ],
        "meta": {}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: ethernetL2InterfaceExample (createInterfaceExamples)
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/interfaces"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: switchId
          value: ""
          type: path
          description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket Id
          disabled: true
      body:
        type: json
        data: |-
          {
            "interfaces": [
              {
                "configData": {
                  "mode": "access",
                  "networkOS": {
                    "networkOSType": "nexus",
                    "policy": {
                      "accessVlanId": 100,
                      "adminState": true,
                      "bpduGuard": "enable",
                      "cdp": true,
                      "duplexMode": "half",
                      "extraConfig": "logging event port link-status",
                      "mtu": "default",
                      "netflow": false,
                      "netflowMonitor": "Netflow Layer-2 monitor name for the interface",
                      "netflowSampler": "Netflow Layer-2 sampler name for the interface (only applicable for Nexus 7000 platforms)",
                      "orphanPort": true,
                      "pfc": false,
                      "policyType": "accessHost",
                      "portTypeFast": true,
                      "qos": false,
                      "qosPolicy": "Custom QoS Policy associated with the interface (must be defined apriori)",
                      "queueingPolicy": "Custom Queuing Policy associated with the interface (must be defined apriori)",
                      "speed": "auto"
                    }
                  }
                },
                "interfaceName": "Ethernet1/13",
                "interfaceType": "ethernet",
                "switchId": "FDO22412H7U"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "Interface created successfully.",
                "name": "Ethernet1/13",
                "status": "success"
              }
            ]
          }
