info:
  name: Create interfaces
  type: http
  seq: 19
  tags:
    - Interfaces

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/interfaces"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: fabric_1
      type: path
      description: Name of the fabric
    - name: switchId
      value: FDO22412H7U
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "interfaces": [
          {
            "configData": {
              "mode": "access",
              "networkOS": {
                "networkOSType": "nx-os",
                "policy": {
                  "accessVlan": 100,
                  "adminState": true,
                  "bpduGuard": "enable",
                  "cdp": true,
                  "duplexMode": "half",
                  "extraConfig": "logging event port link-status",
                  "mtu": "default",
                  "netflow": false,
                  "netflowMonitor": "Netflow Layer-2 monitor name for the interface",
                  "netflowSampler": "Netflow Layer-2 sampler name for the interface (only applicable for Nexus 7000 platforms)",
                  "orphanPort": true,
                  "pfc": false,
                  "policyType": "accessHost",
                  "portTypeEdgeTrunk": true,
                  "qos": false,
                  "qosPolicy": "Custom QoS Policy associated with the interface (must be defined apriori)",
                  "queueingPolicy": "Custom Queuing Policy associated with the interface (must be defined apriori)",
                  "speed": "auto"
                }
              }
            },
            "interfaceName": "Ethernet1/13",
            "interfaceType": "ethernet",
            "switchId": "FDO22412H7U"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

