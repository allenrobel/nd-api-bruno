info:
  name: Export list of all interfaces for the given fabric
  type: http
  seq: 3

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/interfaceActions/export"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "exportList": [
          {
            "interfaceName": "",
            "switchId": ""
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: ZIP archive with multiple CSVs when interfaces have different policyTypes
    description: |
      ZIP archive containing CSV files grouped by policyType. Each CSV file is named as 'interface_<policyType>_<timestamp>.csv' (e.g., 'interface_preprovision_20251031211500000.csv'). 
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/interfaceActions/export"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "exportList": [
              {
                "interfaceName": "Ethernet1/1",
                "switchId": "FDO222425SE"
              },
              {
                "interfaceName": "Ethernet1/3",
                "switchId": "FDO222425SE"
              }
            ]
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/zip
      body:
        type: text
        data: <binary data representation of a zip file>
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/interfaceActions/export"
      method: POST
