info:
  name: Deploy interface
  type: http
  seq: 2
  tags:
    - Interfaces

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/interfaceActions/deploy"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "interfaces": [
          {
            "interfaceName": "Port-channel501",
            "switchId": "FDO222419B7"
          },
          {
            "interfaceName": "Ethernet1/3",
            "switchId": "FDO222419B7"
          },
          {
            "interfaceName": "Loopback10",
            "switchId": "FDO222419B7"
          },
          {
            "interfaceName": "vPC1",
            "switchId": "FDO222419B7"
          },
          {
            "interfaceName": "vlan2000",
            "switchId": "FDO222419B7"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

