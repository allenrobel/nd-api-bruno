  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/interfaceActions/updateAdminState"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "interfaces": [
          {
            "adminState": "",
            "interfaceName": "",
            "switchId": ""
          }
        ]
      }
  auth: inherit

settings:
