info:
  name: List all interfaces
  type: http
  seq: 18
  tags:
    - Interfaces

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/interfaces"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: fabric_1
      type: path
      description: Name of the fabric
    - name: switchId
      value: 9NIE7U0ZXHZ
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: networkName
      value: ""
      type: query
      description: Network name
      disabled: true
    - name: configOnly
      value: "false"
      type: query
      description: Get configuration data alone or with operational data
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

