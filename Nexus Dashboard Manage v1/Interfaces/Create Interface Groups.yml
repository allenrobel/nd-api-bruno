info:
  name: Create Interface Groups
  type: http
  seq: 11
  tags:
    - Interfaces

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/interfaceGroups"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "interfaceGroups": [
          {
            "interfaceGroupName": "IG1_ANY",
            "networkNames": [
              "MyNetwork_30003",
              "MyNetwork_30004"
            ],
            "switchInterfaces": [
              {
                "interfaceNames": [
                  "Ethernet1/1",
                  "Ethernet1/2",
                  "Ethernet1/3",
                  "Ethernet1/4"
                ],
                "switchId": "FDO24490CQQ"
              },
              {
                "interfaceNames": [
                  "Ethernet1/1",
                  "Ethernet1/2",
                  "Ethernet1/3",
                  "Ethernet1/4"
                ],
                "switchId": "FX1930GDYZ"
              }
            ],
            "type": "any"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

