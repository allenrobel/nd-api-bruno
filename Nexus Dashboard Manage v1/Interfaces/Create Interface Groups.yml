info:
  name: Create Interface Groups
  type: http
  seq: 11

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/interfaceGroups"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "interfaceGroups": []
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: createMultipleInterfaceGroups (any)
    description: any interface group
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/interfaceGroups"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket Id
          disabled: true
      body:
        type: json
        data: |-
          {
            "interfaceGroups": [
              {
                "description": "Create any interface group",
                "interfaceGroupName": "IG1",
                "networkNames": [
                  "MyNetwork_30003",
                  "MyNetwork_30004"
                ],
                "switchInterfaces": [
                  {
                    "interfaceNames": [
                      "portChannel501"
                    ],
                    "switchId": "FDO24490CQQ"
                  },
                  {
                    "interfaceNames": [
                      "portChannel502",
                      "portChannel503",
                      "portChannel504"
                    ],
                    "switchId": "FOX1930GDYK"
                  }
                ],
                "type": "any"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "interfaceGroups": [
              {
                "message": "Interface group 'IG2' created successfully",
                "status": "success",
                "type": "vpc"
              },
              {
                "message": "Interface group 'IG3' failed to create",
                "status": "failed",
                "type": "portChannel"
              }
            ]
          }
