                "adminStatus": "up",
                "combinedConfigs": [
                  {
                    "config": "interface Ethernet1/3\\r\\n  switchport\\r\\n  switchport mode trunk\\r\\n  switchport trunk allowed vlan none\\r\\n  spanning-tree port type edge trunk\\r\\n  mtu 9216\\r\\n  no shutdown\\r\\n",
                    "configType": "running",
                    "lines": 7
                  },
                  {
                    "config": "interface Ethernet1/3\\n",
                    "configType": "pending",
                    "lines": 0
                  },
                  {
                    "config": "interface Ethernet1/3\\n  switchport\\n  switchport mode trunk\\n  switchport trunk allowed vlan none\\n  mtu 9216\\n  spanning-tree port type edge trunk\\n  no shutdown\\n",
                    "configType": "expected",
                    "lines": 7
                  }
                ],
                "fabricName": "fabric1",
                "interfaceName": "Ethernet1/3",
                "message": "Configuration mismatch found",
                "operationalStatus": "down",
                "status": "success",
                "switchId": "FDO222419B7",
                "switchName": "N9K-40"
              }
            ],
            "description": "Cofiguration preview example"
          }
