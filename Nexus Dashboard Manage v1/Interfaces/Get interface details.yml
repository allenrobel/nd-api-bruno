info:
  name: Get interface details
  type: http
  seq: 22

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/interfaces/:interfaceName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: switchId
      value: ""
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: interfaceName
      value: ""
      type: path
      description: Name of the interface
    - name: configOnly
      value: ""
      type: query
      description: Get configuration data alone or with operational data
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: ethernetExample
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/interfaces/:interfaceName"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: switchId
          value: ""
          type: path
          description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
        - name: interfaceName
          value: ""
          type: path
          description: Name of the interface
        - name: configOnly
          value: ""
          type: query
          description: Get configuration data alone or with operational data
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "configData": {
              "mode": "access",
              "networkOS": {
                "networkOSType": "nexus",
                "policy": {
                  "accessVlanId": 100,
                  "adminState": true,
                  "bpduGuard": "enable",
                  "cdp": true,
                  "duplexMode": "half",
                  "extraConfig": "logging event port link-status",
                  "mtu": "default",
                  "netflow": false,
                  "netflowMonitor": "Netflow Layer-2 monitor name for the interface",
                  "netflowSampler": "Netflow Layer-2 sampler name for the interface (only applicable for Nexus 7000 platforms)",
                  "orphanPort": true,
                  "pfc": false,
                  "policyType": "accessHost",
                  "portTypeFast": true,
                  "qos": false,
                  "qosPolicy": "Custom QoS Policy associated with the interface (must be defined apriori)",
                  "queueingPolicy": "Custom Queuing Policy associated with the interface (must be defined apriori)",
                  "speed": "auto"
                }
              }
            },
            "interfaceName": "Ethernet1/13",
            "interfaceType": "ethernet",
            "operData": {
              "adminStatus": "up",
              "mode": "access",
              "mtu": 9216,
              "operDescription": "XCVR not inserted",
              "operationalStatus": "down",
              "speed": "25Gb",
              "vrfName": "default"
            },
            "switchId": "FDO22412H7U"
          }
