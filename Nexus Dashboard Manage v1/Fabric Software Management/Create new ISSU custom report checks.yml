info:
  name: Create new ISSU custom report checks
  type: http
  seq: 33

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/updateReportActions/prePostCustomReport"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "reportsCheck": {
          "acceptableVariance": 0,
          "advancedChecks": [
            {
              "checkMustContains": [],
              "checkMustNotContains": []
            }
          ],
          "checkType": "",
          "cliCommand": "",
          "failureLevel": "",
          "ignoreFilters": [],
          "postUpdateDelay": 0,
          "reportCheckDescription": "",
          "reportCheckName": "",
          "reportCheckType": ""
        },
        "switchId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/updateReportActions/prePostCustomReport"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "reportsCheck": {
              "acceptableVariance": 2,
              "advancedChecks": [
                {
                  "checkMustContains": [
                    "module version"
                  ],
                  "checkMustNotContains": [
                    "module Name"
                  ]
                }
              ],
              "checkType": "custom",
              "cliCommand": "sh version",
              "failureLevel": "error",
              "ignoreFilters": [
                "NXOS version"
              ],
              "postUpdateDelay": 10,
              "reportCheckDescription": "nxos version",
              "reportCheckName": "nxos_version",
              "reportCheckType": "preAndPost"
            },
            "switchId": "FDO24020JNK"
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "reportData": "Pre/Post ISSU report difference details",
            "reportInstanceId": "vxlanFabric_N9K_leaf_12_post",
            "reportSummary": "Pre/Post ISSU report summary",
