      value: switch
      type: query
      description: Device type
      disabled: true
    - name: controllerUpgradeVersion
      value: ""
      type: query
      description: Software version for controller upgrade
      disabled: true
    - name: platformType
      value: aci
      type: query
      description: Platform type of the switches
      disabled: true
    - name: platformType
      value: nx-os
      type: query
      description: Platform type of the switches
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

