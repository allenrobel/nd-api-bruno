info:
  name: Create ISSU report checks
  type: http
  seq: 39

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/updateReports/reportChecks"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "updateChecks": [
          {
            "acceptableVariance": 0,
            "advancedChecks": [
              {
                "checkMustContains": [],
                "checkMustNotContains": []
              }
            ],
            "checkType": "",
            "cliCommand": "",
            "failureLevel": "",
            "ignoreFilters": [],
            "postUpdateDelay": 0,
            "reportCheckDescription": "",
            "reportCheckName": "",
            "reportCheckType": ""
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 207 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/updateReports/reportChecks"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "updateChecks": [
              {
                "acceptableVariance": 2,
                "advancedChecks": [
                  {
                    "checkMustContains": [
                      "module version"
                    ],
                    "checkMustNotContains": [
                      "module Name"
                    ]
                  }
                ],
                "checkType": "basic",
                "cliCommand": "sh version",
                "failureLevel": "error",
                "ignoreFilters": [
                  "NXOS version"
                ],
                "postUpdateDelay": 10,
                "reportCheckDescription": "nxos version",
                "reportCheckName": "nxos_version",
                "reportCheckType": "preAndPost"
              },
              {
                "acceptableVariance": 2,
                "advancedChecks": [
                  {
                    "checkMustContains": [
                      "module version"
                    ],
                    "checkMustNotContains": [
                      "module Name"
                    ]
                  }
                ],
                "checkType": "basic",
                "cliCommand": "show mod",
                "failureLevel": "info",
                "ignoreFilters": [
                  "module number"
                ],
                "postUpdateDelay": 10,
                "reportCheckDescription": "show mod command",
                "reportCheckName": "show_mod",
                "reportCheckType": "preAndPost"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "updateChecks": [
              {
                "message": "nxos version created successful",
                "reportCheckName": "nxos_version",
                "status": "success"
