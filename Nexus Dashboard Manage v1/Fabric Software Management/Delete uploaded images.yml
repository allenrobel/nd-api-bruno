info:
  name: Delete uploaded images
  type: http
  seq: 7

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabricSoftware/images/actions/remove"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "imageNames": []
      }
  auth: inherit

settings:
