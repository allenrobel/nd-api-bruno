info:
  name: Update ISSU custom report checks
  type: http
  seq: 42

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/updateReports/reportChecks/:reportCheckName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: reportCheckName
      value: ""
      type: path
      description: Name of the update report check
  body:
    type: json
    data: |-
      {
        "acceptableVariance": 0,
        "advancedChecks": [
          {
            "checkMustContains": [],
            "checkMustNotContains": []
          }
        ],
        "checkType": "",
        "cliCommand": "",
        "failureLevel": "",
        "ignoreFilters": [],
        "postUpdateDelay": 0,
        "reportCheckDescription": "",
        "reportCheckName": "",
        "reportCheckType": ""
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: No Content
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/updateReports/reportChecks/:reportCheckName"
      method: PUT
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: reportCheckName
          value: ""
          type: path
          description: Name of the update report check
      body:
        type: json
        data: |-
          {
            "acceptableVariance": 2,
            "advancedChecks": [
              {
                "checkMustContains": [
                  "module version"
                ],
                "checkMustNotContains": [
                  "module Name"
                ]
              }
            ],
            "checkType": "basic",
            "cliCommand": "sh version",
            "failureLevel": "info",
            "ignoreFilters": [
              "nxos",
              "[a-z,0-9]"
            ],
            "postUpdatedelay": 10,
            "reportCheckDescription": "fetch nxos version details",
            "reportCheckName": "nxos_version",
            "reportCheckType": "preAndPost"
          }
    response:
      statusText: No Content
      body:
        type: text
        data: ""
