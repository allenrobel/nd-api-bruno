info:
  name: Get all ISSU report checks
  type: http
  seq: 38

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/updateReports/reportChecks"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

