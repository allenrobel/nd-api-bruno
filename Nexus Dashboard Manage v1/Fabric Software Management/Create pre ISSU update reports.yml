info:
  name: Create pre ISSU update reports
  type: http
  seq: 30
  tags:
    - Fabric Software Management

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/updateReportActions/startPreReport"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "updateGroupName": "vxlanFabric_N9K_leaf"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

