  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/updateReports/reportChecks/:reportCheckName"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: reportCheckName
          value: ""
          type: path
          description: Name of the update report check
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "acceptableVariance": 2,
            "advancedChecks": [
              {
                "checkMustContains": [
                  "module version"
                ],
                "checkMustNotContains": [
                  "module Name"
                ]
              }
            ],
            "checkType": "basic",
            "cliCommand": "sh version",
            "failureLevel": "warning",
            "ignoreFilters": [
              "nxos",
              "[a-z,0-9]"
            ],
            "postUpdateDelay": 30,
            "reportCheckDescription": "fetch switch details",
            "reportCheckName": "nxos_version",
            "reportCheckType": "preAndPost"
          }
