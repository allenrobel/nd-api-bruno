info:
  name: Get ISSU pre and post report check
  type: http
  seq: 41

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/updateReports/reportChecks/:reportCheckName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: reportCheckName
      value: ""
      type: path
      description: Name of the update report check
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

