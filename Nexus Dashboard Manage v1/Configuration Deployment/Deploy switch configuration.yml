info:
  name: Deploy switch configuration
  type: http
  seq: 5
  tags:
    - Configuration Deployment

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switchActions/deploy"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: fabric_1
      type: path
      description: Name of the fabric
    - name: forceShowRun
      value: ""
      type: query
      description: If true, Config compliance fetches the latest running config from the Device. If false, Config compliance uses the cached version for computation.
      disabled: true
  body:
    type: json
    data: |-
      {
        "switchIds": [
          "FOC21373AFA",
          "FVT93126SKE"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

