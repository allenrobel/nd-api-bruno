info:
  name: Deploy fabric configuration
  type: http
  seq: 2

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/actions/deploy"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: forceShowRun
      value: ""
      type: query
      description: If true, Config compliance fetches the latest running config from the Device. If false, Config compliance uses the cached version for computation.
      disabled: true
    - name: inclAllFabricGroupsSwitches
      value: ""
      type: query
      description: |
        inclAllFabricGroupSwitches (Include all Fabric Groups Switches): If set to true, and you specify a fabric group name, changes will be deployed to all member fabrics within the group. If set to false, changes will not be deployed to the member fabrics
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

