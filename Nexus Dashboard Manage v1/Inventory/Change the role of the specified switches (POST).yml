info:
  name: Change the role of the specified switches (POST)
  type: http
  seq: 49

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/inventory/switchActions/changeRoles"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "switchRoles": [
          {
            "role": "",
            "switchId": ""
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

