info:
  name: Get VPC pair details
  type: http
  seq: 40
  tags:
    - Inventory

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/vpcPair"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: switchId
      value: ""
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: withCustomTemplate
    description: VPC pair details with custom template
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/vpcPair"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: switchId
          value: ""
          type: path
          description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "peerSwitchId": "FDO23040Q86",
            "switchId": "FDO23040Q85",
            "useVirtualPeerLink": true,
            "vpcPairDetails": {
              "templateConfig": {
                "customConfig": "vpc domain 20\n  peer-keepalive destination 10.1.1.2 source 10.1.1.1 vrf management\n  role priority 2000",
                "customField1": "custom-value-1",
                "domainId": "20"
              },
              "templateName": "my_custom_template",
              "type": "custom"
            }
          }
