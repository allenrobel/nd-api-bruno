  type: http
  seq: 54
  tags:
    - Inventory

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/inventory/switchActions/copyRunStart"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "switchIds": [
          "SAL1948TRTT",
          "SAL1947TRAB"
        ]
      }
  auth: inherit

