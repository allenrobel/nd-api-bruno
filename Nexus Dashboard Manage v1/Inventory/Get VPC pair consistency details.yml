  type: http
  seq: 40

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/vpcPairConsistency"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: switchId
      value: ""
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

