info:
  name: Fetch CLI response in text format or download
  type: http
  seq: 60

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/inventory/switchActions/showCommands"
  headers:
    - name: X-Content-Type
      value: ""
      description: Content type header to indicate if response should be in archive or JSON format
  params:
    - name: jobId
      value: ""
      type: query
      description: Job id to indicate show commands response
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

