info:
  name: Change the system mode of the switches
  type: http
  seq: 21

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switchActions/changeSystemMode"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
    - name: deploy
      value: ""
      type: query
      description: If true, the system mode will be deployed
    - name: blocking
      value: ""
      type: query
      description: |
        This query parameter applies only when deploy is true
        If block is true, the API will wait until the deploy operation is complete or timeout before returning a response
        The timeout value is determined by the server settings 'Maintenance mode deploy wait time in minutes' + 30 seconds
  body:
    type: json
    data: |-
      {
        "mode": "",
        "switchIds": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

