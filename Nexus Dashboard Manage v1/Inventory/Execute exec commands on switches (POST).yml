info:
  name: Execute exec commands on switches (POST)
  type: http
  seq: 59
  tags:
    - Inventory

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/inventory/switchActions/execCommands"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "templateName": "exec_elam_capture",
        "templateInputs": {
          "isIngress": "true",
          "srcIP": "10.10.10.1",
          "dstIP": "10.10.10.2"
        },
        "switchIds": [
          "SAL1925HCYJ",
          "SAL1924GTKN"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

