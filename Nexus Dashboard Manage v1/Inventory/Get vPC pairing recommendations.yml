info:
  name: Get vPC pairing recommendations
  type: http
  seq: 44
  tags:
    - Inventory

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/vpcPairRecommendation"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: switchId
      value: ""
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: useVirtualPeerLink
      value: ""
      type: query
      description: Virtual peer link available
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

