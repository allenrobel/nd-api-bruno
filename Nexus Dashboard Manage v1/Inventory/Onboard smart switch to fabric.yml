info:
  name: Onboard smart switch to fabric
  type: http
  seq: 14
  tags:
    - Inventory

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/smartSwitches/actions/updateSecureTenant"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "smartSwitchIntegrations": [
          {
            "integrationName": "int-1",
            "switchId": "SAL1948TRTT",
            "switchName": "leaf1",
            "connectivityStatus": "connected"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

