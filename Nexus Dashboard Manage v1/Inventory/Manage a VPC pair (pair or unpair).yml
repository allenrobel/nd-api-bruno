          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "peerSwitchId": "FDO23040Q86",
            "switchId": "FDO23040Q85",
            "useVirtualPeerLink": true,
            "vpcAction": "pair",
            "vpcPairDetails": {
              "adminState": true,
              "allowedVlans": "1-100",
              "domainId": 10,
              "enableMirrorConfig": true,
              "fabricName": "Fabric1",
              "fabricPathSwitchId": 100,
              "isVpcPlus": true,
              "isVteps": true,
              "keepAliveHoldTimeout": 5,
              "keepAliveVrf": "default",
              "loopbackSecondaryIp": "192.168.3.1",
              "nveInterface": 2,
              "peerSwitchDomainConfig": "peer-keepalive destination 10.1.1.2 source 10.1.1.1 vrf mgmt\nauto-recovery\ndelay restore 150\nkeepalive hold-timeout 5",
              "peerSwitchKeepAliveLocalIp": "192.168.1.2",
              "peerSwitchMemberInterfaces": [
                "eth1/6",
                "eth1/8",
                "eth1/9",
                "eth1/10"
              ],
              "peerSwitchNativeVlan": 2,
              "peerSwitchPoConfig": "mtu 9216\npriority-flow-control mode on\nno shutdown",
              "peerSwitchPoDescription": "Peer-2 Port-Channel Description",
              "peerSwitchPoId": 201,
              "peerSwitchPrimaryIp": "192.168.2.2",
              "peerSwitchSourceLoopback": 11,
              "poMode": "active",
              "switchDomainConfig": "peer-keepalive destination 10.1.1.2 source 10.1.1.1 vrf mgmt\nauto-recovery\ndelay restore 150\nkeepalive hold-timeout 5",
              "switchKeepAliveLocalIp": "192.168.1.1",
              "switchMemberInterfaces": [
                "eth1/5",
                "eth1/7",
                "eth1/8",
                "eth1/9"
              ],
              "switchNativeVlan": 1,
              "switchPoConfig": "mtu 9216\npriority-flow-control mode on\nno shutdown",
              "switchPoDescription": "Peer-1 Port-Channel Description",
              "switchPoId": 200,
              "switchPrimaryIp": "192.168.2.1",
              "switchSourceLoopback": 10,
              "type": "default"
            }
          }
    response:
      statusText: No Content
      body:
        type: text
        data: ""
