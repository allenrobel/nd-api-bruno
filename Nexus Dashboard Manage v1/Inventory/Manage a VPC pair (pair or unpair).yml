info:
  name: Manage a VPC pair (pair or unpair)
  type: http
  seq: 41
  tags:
    - Inventory

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/switches/:switchId/vpcPair"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: switchId
      value: ""
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "peerSwitchId": "FDO23040Q86",
        "switchId": "FDO23040Q85",
        "useVirtualPeerLink": true,
        "vpcAction": "pair",
        "vpcPairDetails": {
          "templateConfig": {
            "customConfig": "vpc domain 20\n  peer-keepalive destination 10.1.1.2 source 10.1.1.1 vrf management\n  role priority 2000",
            "customField1": "custom-value-1",
            "domainId": "20"
          },
          "templateName": "my_custom_template",
          "type": "custom"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

