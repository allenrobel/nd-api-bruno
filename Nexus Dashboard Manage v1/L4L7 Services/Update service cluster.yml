info:
  name: Update service cluster
  type: http
  seq: 10
  tags:
    - L4L7 Services

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/clusters/:serviceClusterName"
  params:
    - name: serviceClusterName
      value: ""
      type: path
      description: Service cluster name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "serviceClusterName": "Cluster1",
        "clusterType": "firewall",
        "formFactor": "physical",
        "nodeRedundancy": "standalone",
        "serviceNodes": [
          {
            "nodeName": "Node1",
            "serviceLinks": [
              {
                "attachSwitches": [
                  "FDO20401ABC"
                ],
                "attachSwitchInterface": "Ethernet1/42",
                "linkData": {
                  "adminState": true,
                  "allowedVlans": "none",
                  "bpduGuard": "default",
                  "cdp": true,
                  "svcLeafIntfDescription": "source interface of service link",
                  "svcLeafIntfFreeformConfig": "",
                  "linkDataType": "ethernet",
                  "mtu": "jumbo",
                  "nativeVlanId": 1,
                  "netflow": false,
                  "netflowMonitor": "nfMonitor",
                  "netflowSampler": "sampler1",
                  "orphanPort": false,
                  "portDuplexMode": "auto",
                  "portTypeEdgeTrunk": true,
                  "pfc": false,
                  "qos": false,
                  "qosPolicy": "qosPolicy1",
                  "queuingPolicy": "queuingPolicy1",
                  "speed": "auto"
                },
                "nodeInterface": "G1/1",
                "nodeInterfaceUsage": "insideOutside"
              }
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Service cluster that has service node with customized link
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/clusters/:serviceClusterName"
      method: PUT
      params:
        - name: serviceClusterName
          value: ""
          type: path
          description: Service cluster name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "serviceClusterName": "Cluster1",
            "clusterType": "other",
            "formFactor": "physical",
            "nodeRedundancy": "standalone",
            "serviceNodes": [
              {
                "nodeName": "Node1",
                "serviceLinks": [
                  {
                    "attachSwitches": [
                      "FDO20401ABC"
                    ],
                    "attachSwitchInterface": "Ethernet1/45",
                    "linkData": {
                      "linkDataType": "custom",
                      "templateName": "my_service_link_trunk",
                      "templateParams": {
                        "adminState": "true",
                        "speed": "10Mb"
                      }
                    },
                    "nodeInterface": "G1/1",
                    "nodeInterfaceUsage": "secondArm"
                  }
                ]
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "serviceClusterName": "Cluster1",
            "clusterType": "other",
