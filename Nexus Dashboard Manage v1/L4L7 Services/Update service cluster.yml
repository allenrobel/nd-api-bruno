info:
  name: Update service cluster
  type: http
  seq: 10

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/l4l7Services/clusters/:clusterName"
  params:
    - name: clusterName
      value: ""
      type: path
      description: Service cluster name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "clusterName": "",
        "clusterType": "",
        "formFactor": "",
        "lastUpdateTimestamp": "",
        "nodeRedundancy": "",
        "serviceNodes": [
          {
            "lastUpdateTimestamp": "",
            "nodeName": "",
            "serviceLinks": [
              {
                "attachSwitches": [],
                "attachSwitchInterface": "",
                "linkData": "",
                "nodeInterface": "",
                "nodeInterfaceUsage": ""
              }
            ]
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Service cluster that has service node with customized link
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/l4l7Services/clusters/:clusterName"
      method: PUT
      params:
        - name: clusterName
          value: ""
          type: path
          description: Service cluster name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "clusterName": "Cluster1",
            "clusterType": "other",
            "formFactor": "physical",
            "nodeRedundancy": "standalone",
            "serviceNodes": [
              {
                "nodeName": "Node1",
                "serviceLinks": [
                  {
                    "attachSwitches": [
                      "FDO20401ABC"
                    ],
                    "attachSwitchInterface": "Ethernet1/45",
                    "linkData": {
                      "linkDataType": "custom",
                      "templateName": "my_service_link_trunk",
                      "templateParams": {
                        "adminState": "true",
                        "speed": "10Mb"
                      }
                    },
                    "nodeInterface": "G1/1",
                    "nodeInterfaceUsage": "secondArm"
                  }
                ]
              }
            ]
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "clusterName": "Cluster1",
            "clusterType": "other",
            "formFactor": "physical",
            "nodeRedundancy": "standalone",
            "serviceNodes": [
              {
                "nodeName": "Node1",
