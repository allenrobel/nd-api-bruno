info:
  name: Get service insertion detail
  type: http
  seq: 21
  tags:
    - L4L7 Services

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/insertions/:insertionName"
  params:
    - name: insertionName
      value: ""
      type: path
      description: Service insertion name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Service as a Gateway use case
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/insertions/:insertionName"
      method: GET
      params:
        - name: insertionName
          value: ""
          type: path
          description: Service insertion name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "serviceInsertion": {
              "insertionData": {
                "associatedNetworks": [
                  "destNet1"
                ],
                "functionName": "FWFunc3",
                "useCase": "serviceAsGW"
              },
              "insertionName": "ServiceIns1",
              "enabled": true,
              "sourceVrf": "Sales",
              "useCase": "serviceAsGW"
            },
            "deploymentStatus": {
              "status": "deployed",
              "statusDetails": [
                {
                  "type": "serviceVrf",
                  "name": "ServiceVRF_50001",
                  "status": "deployed"
                }
              ]
            }
          }
