info:
  name: Get route detail
  type: http
  seq: 33
  tags:
    - L4L7 Services

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/routes/:routeName"
  params:
    - name: routeName
      value: ""
      type: path
      description: Route name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Route with customized template
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/routes/:routeName"
      method: GET
      params:
        - name: routeName
          value: ""
          type: path
          description: Route name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "routeData": {
              "routeDataType": "custom",
              "templateName": "my_service_ebgp_route",
              "templateParams": {
                "adminState": "true"
              }
            },
            "routeName": "route3",
            "vrfName": "Vrf1"
          }
  - name: eBGP dynamic route
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/routes/:routeName"
      method: GET
      params:
        - name: routeName
          value: ""
          type: path
          description: Route name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "routeData": {
              "adminState": true,
              "advertiseHostRoute": false,
              "bgpAuthentication": {
                "authenticationKeyType": "3des",
                "password": "mysecret",
                "passwordFabricInherit": true
              },
              "bgpPassword": false,
              "localAsn": "100",
              "exportGatewayIp": true,
              "loopbackInterfaceDescription": "loopback interface description",
              "loopbackIps": {
                "ipv4Loopback": "192.168.1.1",
                "ipv6Loopback": "FEDC:B123::1",
                "ipv4PeerLoopback": "192.168.1.2",
                "ipv6PeerLoopback": "FEDC:B123::2"
              },
              "routeDataType": "eBGP",
              "routeMapTag": 12345,
              "routeMaps": {
                "ipv4RouteMapIn": "routeMap1",
                "ipv6RouteMapIn": "routeMap3",
                "ipv4RouteMapOut": "routeMap2",
                "ipv6RouteMapOut": "routeMap4"
              },
              "serviceNodeAsn": "200",
              "ipv4ServiceNodeAddress": "1.2.3.1/24",
              "ipv6ServiceNodeAddress": "FEDC:BA98::1/96",
              "useAutoCreatedLoopback": true,
              "vpcPeerLinkPeeringConfig": {
                "ipv4Destination": "192.168.10.2",
                "ipv6Destination": "2001:db9::2",
                "peeringVlanId": 1825,
                "ipv6SourceSubnet": "2001:db9::1/120",
                "ipv4SourceSubnet": "192.168.10.1/30"
              },
              "vpcPeerLinkPeering": false
            },
            "routeName": "route2",
            "vrfName": "Vrf1"
          }
  - name: Static route
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/routes/:routeName"
      method: GET
      params:
        - name: routeName
          value: ""
          type: path
          description: Route name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "routeData": {
              "ipv6DestinationSubnets": [
                "FEDC:BA98::1/96"
              ],
              "ipv4DestinationSubnets": [
                "1.2.3.1/24",
                "5.6.7.8/32"
              ],
              "exportGatewayIp": true,
              "routeDataType": "static",
              "ipv4ServiceNodeAddress": "10.10.10.10",
              "ipv6ServiceNodeAddress": "fe80:10::10"
            },
            "routeName": "route1",
            "vrfName": "Vrf1"
          }
  - name: 400 Response
