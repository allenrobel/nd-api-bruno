      type: path
      description: Probe name used for sharing if needed
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "lastUpdateTimestamp": "",
        "probeData": "",
        "probeName": "",
        "vrfName": ""
      }
  auth: inherit

settings:
