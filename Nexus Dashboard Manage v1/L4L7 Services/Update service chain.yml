info:
  name: Update service chain
  type: http
  seq: 5
  tags:
    - L4L7 Services

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/chains/:chainName"
  params:
    - name: chainName
      value: ""
      type: path
      description: Service chain name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "chainData": {
          "chainDataType": "custom",
          "templateName": "my_service_epbr",
          "templateParams": {
            "hashingBucket": "8"
          }
        },
        "chainEntries": [
          {
            "serviceClusterName": "Cluster1",
            "clusterType": "firewall",
            "probeFailAction": "drop",
            "functionName": "function1",
            "sequenceNumber": 10,
            "vrfName": "Vrf1"
          }
        ],
        "chainName": "chain1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

