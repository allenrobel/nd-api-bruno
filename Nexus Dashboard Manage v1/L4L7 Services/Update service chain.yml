info:
  name: Update service chain
  type: http
  seq: 5

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/l4l7Services/chains/:chainName"
  params:
    - name: chainName
      value: ""
      type: path
      description: Service chain name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "chainData": "",
        "chainEntries": [
          {
            "clusterName": "",
            "clusterType": "",
            "probeFailAction": "",
            "functionName": "",
            "sequenceNumber": 0,
            "vrfName": ""
          }
        ],
        "chainName": "",
        "lastUpdateTimestamp": ""
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Service chain with customized template
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/l4l7Services/chains/:chainName"
      method: PUT
      params:
        - name: chainName
          value: ""
          type: path
          description: Service chain name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "chainData": {
              "chainDataType": "custom",
              "templateName": "my_service_epbr",
              "templateParams": {
                "hashingBucket": "8"
              }
            },
            "chainEntries": [
              {
                "clusterName": "Cluster1",
                "clusterType": "firewall",
                "failAction": "drop",
                "functionName": "function1",
                "sequenceNumber": 10,
                "vrfName": "Vrf1"
              }
            ],
            "chainName": "chain1"
          }
    response:
