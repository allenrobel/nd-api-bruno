info:
  name: Create service insertions
  type: http
  seq: 19
  tags:
    - L4L7 Services

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/insertions"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "serviceInsertions": [
          {
            "insertionData": {
              "associatedNetworks": [
                "destNet1"
              ],
              "functionName": "FWFunc3",
              "useCase": "serviceAsGW"
            },
            "insertionName": "ServiceIns1",
            "enabled": true,
            "sourceVrf": "Sales",
            "useCase": "serviceAsGW"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 207 Response (Service as Gateway use case)
