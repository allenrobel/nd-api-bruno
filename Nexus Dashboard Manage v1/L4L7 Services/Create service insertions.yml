                  "useCase": "serviceAsGW"
                },
                "insertionName": "ServiceIns1",
                "enabled": true,
                "sourceVrf": "Sales",
                "useCase": "serviceAsGW"
              }
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "name": "Resource-1",
                "status": "success",
                "message": "Operation completed successfully."
              },
