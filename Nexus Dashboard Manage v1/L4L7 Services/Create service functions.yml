info:
  name: Create service functions
  type: http
  seq: 12
  tags:
    - L4L7 Services

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/functions"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "serviceFunctions": [
          {
            "clusterConnectivities": [
              {
                "arms": [
                  {
                    "armType": "firstOrOutsideArm",
                    "peeringOption": "staticPeering",
                    "probeName": "probe1",
                    "PeeringConfigs": [
                      {
                        "peerSwitches": [
                          "FDO12345ABC"
                        ],
                        "routeName": "route1"
                      }
                    ],
                    "serviceNetworkName": "ServiceNet1"
                  }
                ],
                "serviceClusterName": "Cluster1",
                "serviceNodeIps": {
                  "ipv4Address": "123.1.1.123",
                  "ipv6Address": "1002::123"
                }
              }
            ],
            "clusterType": "firewall",
            "connectivityMode": "oneArm",
            "functionName": "FWFunc1",
            "vrfName": "Vrf1"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

