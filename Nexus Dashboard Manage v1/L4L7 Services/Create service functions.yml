info:
  name: Create service functions
  type: http
  seq: 12

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/functions"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "serviceFunctions": [
          {
            "clusterConnectivities": [
              {
                "arms": [
                  {
                    "armType": "",
                    "peeringOption": "",
                    "probeName": "",
                    "peeringConfigs": [
                      {
                        "peerSwitches": [],
                        "routeName": ""
                      }
                    ],
                    "serviceNetworkName": ""
                  }
                ],
                "clusterName": "",
                "lastUpdateTimestamp": "",
                "serviceNodeIps": {
                  "ipv4Address": "",
                  "ipv6Address": "",
                  "reverseIpv4Address": "",
                  "reverseIpv6Address": ""
                }
              }
            ],
            "clusterType": "",
            "connectivityMode": "",
            "functionName": "",
            "lastUpdateTimestamp": "",
            "vrf2Name": "",
            "vrfName": ""
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

