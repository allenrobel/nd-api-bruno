info:
  name: Update service insertion
  type: http
  seq: 22

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/insertions/:insertionName"
  params:
    - name: insertionName
      value: ""
      type: path
      description: Service insertion name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "sourceVrf": "",
        "enabled": false,
        "insertionName": "",
        "lastUpdateTimestamp": "",
        "insertionData": ""
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Service as a Gateway use case
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/insertions/:insertionName"
      method: PUT
      params:
        - name: insertionName
          value: ""
          type: path
          description: Service insertion name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "insertionData": {
              "associatedNetworks": [
                "destNet1"
              ],
              "functionName": "FWFunc3",
              "useCase": "serviceAsGW"
            },
            "insertionName": "ServiceIns1",
            "enabled": true,
            "sourceVrf": "Sales",
            "useCase": "serviceAsGW"
