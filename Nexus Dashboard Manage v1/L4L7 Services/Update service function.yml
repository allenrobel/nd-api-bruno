  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/l4l7Services/functions/:functionName"
  params:
    - name: functionName
      value: ""
      type: path
      description: Service function name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "clusterConnectivities": [
          {
            "arms": [
              {
                "armType": "firstOrOutsideArm",
                "peeringOption": "eBGPDynamicPeering",
                "probeName": "probe1",
                "peeringConfigs": [
                  {
                    "peerSwitches": [
                      "FDO12345ABC"
                    ],
                    "routeName": "route1"
                  }
                ],
                "serviceNetworkName": "ServiceNet1"
              },
              {
                "armType": "secondOrInsideArm",
                "peeringOption": "eBGPDynamicPeering",
                "probeName": "probe2",
                "serviceNetworkName": "ServiceNet2"
              }
            ],
            "serviceClusterName": "LBCluster1",
            "serviceNodeIps": {
              "ipv4Address": "123.1.5.123",
              "ipv6Address": "1005::123",
              "reverseIpv4Address": "123.1.6.123",
              "reverseIpv6Address": "1006::123"
            }
          }
        ],
        "clusterType": "loadBalancer",
        "connectivityMode": "twoArm",
        "functionName": "LBFunc1",
        "vrf2Name": "Vrf1",
        "vrfName": "Vrf1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

