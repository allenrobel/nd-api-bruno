info:
  name: Get probe detail
  type: http
  seq: 28

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/l4l7Services/probes/:probeName"
  params:
    - name: probeName
      value: ""
      type: path
      description: Probe name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Probe with customized template
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/l4l7Services/probes/:probeName"
      method: GET
      params:
        - name: probeName
          value: ""
          type: path
          description: Probe name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "probeData": {
              "probeDataType": "custom",
              "templateName": "my_service_endpoint",
              "templateParams": {
                "delayDown": "30",
                "delayUp": "30",
                "probe": "true",
                "frequency": "10",
                "httpGet": "",
                "port": "443",
                "protocol": "icmp",
                "srcLoopbackIp": "192.168.126.1",
                "srcLoopbackIpv6": "",
                "threshold": "",
                "timeout": "",
                "useAutoCreatedLoopback": "false",
                "vrfName": "Sales"
              }
            },
            "probeName": "probe1",
            "vrfName": "Vrf1"
          }
  - name: Probe with core attributes
