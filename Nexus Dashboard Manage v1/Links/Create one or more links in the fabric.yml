info:
  name: Create one or more links in the fabric
  type: http
  seq: 5

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/links"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "links": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: CreatedOneLink (PreProvisionIntrFabricLinkExample)
    description: Intra-fabric link with a pre-provision policy
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/links"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket Id
          disabled: true
      body:
        type: json
        data: |-
          {
            "links": [
              {
                "configData": {
                  "policyType": "preprovision",
                  "templateInputs": {
                    "dstInterfaceConfig": "logging event port link-status",
                    "dstInterfaceDescription": "desc",
                    "mtu": 9216,
                    "speed": "auto",
                    "srcInterfaceConfig": "logging event port link-status",
                    "srcInterfaceDescription": "desc"
                  }
                },
                "dstFabricName": "ebgp-fab",
                "dstInterfaceName": "Ethernet1/9",
                "dstSwitchId": "FDO21351QGE",
                "dstSwitchName": "sml_N9K-FX2-7",
                "srcFabricName": "ebgp-fab",
                "srcInterfaceName": "Ethernet1/2",
                "srcSwitchId": "FDO20372FH8",
                "srcSwitchName": "sml_N9K-FX2-6"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "links": [
              {
                "linkId": "LINK-UUID-8540",
                "message": "LINK-UUID-8540 create successful",
                "status": "success"
              }
            ]
          }
  - name: CreatedOneLink (User-defined template with pre-provision policy.)
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/links"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket Id
          disabled: true
      body:
        type: json
        data: |-
          {
            "links": [
              {
                "configData": {
                  "policyType": "userDefined",
                  "templateInputs": {
                    "allowedVlans": "none",
                    "mtu": 9216
                  },
                  "templateName": "user_defined_pre_provision"
                },
                "dstFabricName": "fab2",
                "dstInterfaceName": "Ethernet1/3",
                "dstSwitchId": "FDO21351QGE",
                "dstSwitchName": "sml_N9K-FX2-7",
                "srcFabricName": "fab1",
                "srcInterfaceName": "Ethernet1/5",
                "srcSwitchId": "FDO20372FH8",
                "srcSwitchName": "sml_N9K-FX2-6"
