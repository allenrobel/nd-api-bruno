info:
  name: Get a link
  type: http
  seq: 7
  tags:
    - Links

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/links/:linkId"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: linkId
      value: ""
      type: path
      description: Link ID path parameter
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

