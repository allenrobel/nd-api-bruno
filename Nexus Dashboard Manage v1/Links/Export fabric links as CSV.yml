info:
  name: Export fabric links as CSV
  type: http
  seq: 1

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/linkActions/export"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "fabricName": "",
        "linkIds": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: When there are multiple types of links (different policyTypes), the response will be a zip file containing multiple csv files for each policyType (Export all links from a fabric)
    description: |
      When there are multiple types of links (different policyTypes), the response will be a zip file containing multiple csv files for each policyType.  Each csv file will be named as 'links_<policyType>_<fabricName>_<timestamp>.csv', e.g., 'links_preprovision_fab1_20251031211500000.csv' for preprovision type links         
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/linkActions/export"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "fabricName": "fab1",
            "linkIds": []
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/zip
      body:
        type: text
        data: <binary data representation of a zip file>
  - name: When there are multiple types of links (different policyTypes), the response will be a zip file containing multiple csv files for each policyType (Export specific links from a fabric)
    description: |
      When there are multiple types of links (different policyTypes), the response will be a zip file containing multiple csv files for each policyType.  Each csv file will be named as 'links_<policyType>_<fabricName>_<timestamp>.csv', e.g., 'links_preprovision_fab1_20251031211500000.csv' for preprovision type links         
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/linkActions/export"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "fabricName": "fab1",
            "linkIds": [
              "LINK-UUID-8540",
              "LINK-UUID-3650"
            ]
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/zip
      body:
        type: text
        data: <binary data representation of a zip file>
