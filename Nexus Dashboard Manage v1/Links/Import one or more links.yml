info:
  name: Import one or more links
  type: http
  seq: 2
  tags:
    - Links

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/linkActions/import"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: CreatedOneLink (ebgpVrfLite)
    description: Import eBGP VRF lite links via CSV
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/linkActions/import"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket Id
          disabled: true
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "links": [
              {
                "linkId": "LINK-UUID-8540",
                "message": "LINK-UUID-8540 created successfully",
                "status": "success"
              }
            ]
