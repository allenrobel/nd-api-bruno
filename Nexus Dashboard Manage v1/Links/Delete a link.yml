info:
  name: Delete a link
  type: http
  seq: 6
  tags:
    - Links

http:
  method: DELETE
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/links/:linkId"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: linkId
      value: ""
      type: path
      description: Link ID path parameter
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
    - name: isLogicalLink
      value: "false"
      type: query
      description: Indicates if the link is a logical link. Set to `true` for logical links, `false` otherwise
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

