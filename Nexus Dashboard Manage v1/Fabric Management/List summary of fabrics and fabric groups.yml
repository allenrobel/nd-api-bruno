info:
  name: List summary of fabrics and fabric groups
  type: http
  seq: 57
  tags:
    - Fabric Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabricsSummary"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: category
      value: fabric
      type: query
      description: Filter by category of fabric for fabricGroups
      disabled: true
    - name: category
      value: fabricGroup
      type: query
      description: Filter by category of fabric for fabricGroups
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

