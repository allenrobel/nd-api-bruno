info:
  name: List all snapshot fabrics
  type: http
  seq: 59

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/snapshotFabrics"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: One
    description: Sample response for snapshot fabrics
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/snapshotFabrics"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "fabrics": [
              {
                "displayFabricType": "ACI",
                "fabricName": "NYC_Snapshot",
                "featureUsage": {
                  "telemetry": "nd-cluster-2"
                },
                "licenseTier": "essentials",
                "local": true,
                "location": {
                  "latitude": 9.93333,
                  "longitude": -84.08333
                },
                "ownerCluster": "nd-cluster-1",
                "securityDomain": "all",
                "type": "aci"
              }
            ]
          }
