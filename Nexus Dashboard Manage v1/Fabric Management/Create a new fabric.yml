          "nveHoldDownTimer": 180,
          "nveLoopbackId": 1,
          "nveLoopbackIpRange": "10.3.0.0/22",
          "nxapi": true,
          "nxapiHttp": true,
          "nxapiHttpPort": 80,
          "nxapiHttpsPort": 443,
          "overlayMode": "cli",
          "perVrfLoopbackAutoProvision": false,
          "perVrfLoopbackAutoProvisionIpv6": false,
