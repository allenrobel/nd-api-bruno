      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "category": "fabric",
        "licenseTier": "advantage",
        "location": {
          "latitude": 33.33939,
          "longitude": -121.89496
        },
        "management": {
