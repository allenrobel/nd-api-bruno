          "bgpMaxPath": 4,
          "bgpUnderlayFailureProtect": false,
          "cdp": false,
          "coppPolicy": "strict",
          "defaultQueuingPolicy": false,
          "disableRouteMapTag": false,
          "evpn": true,
          "fabricMtu": 9216,
          "fabricVpcDomainId": false,
          "fabricVpcQos": false,
          "fabricVpcQosPolicyName": "spine_qos_for_fabric_vpc_peering",
          "firstHopRedundancyProtocol": "hsrp",
