          "l2HostInterfaceMtu": 9216,
          "l2VniRange": "30000-49000",
          "l3VniNoVlanDefaultOption": false,
          "l3VniRange": "50000-59000",
          "leafTorIdRange": false,
          "localDhcpServer": false,
          "macsec": false,
          "macsecReportTimer": 5,
          "managementIpv4Prefix": 24,
