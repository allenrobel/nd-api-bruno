          "ptpDomainId": 0,
          "ptpLoopbackId": 0,
          "realTimeInterfaceStatisticsCollection": false,
          "rendezvousPointCount": 2,
          "rendezvousPointLoopbackId": 254,
          "rendezvousPointMode": "asm",
          "replicationMode": "multicast",
          "routeMapTag": 12345,
          "sharedVpcDomainId": 1,
          "siteId": "23",
          "snmpTrap": true,
          "staticUnderlayIpAllocation": false,
          "strictConfigComplianceMode": false,
          "subInterfaceDot1qRange": "2-511",
          "targetSubnetMask": 30,
          "tcamAllocation": true,
          "tenantDhcp": true,
          "tenantRoutedMulticast": false,
          "tenantRoutedMulticastIpv6": false,
          "type": "vxlanEbgp",
          "underlayIpv6": false,
          "underlayMulticastGroupAddressLimit": 128,
          "vpcAutoRecoveryTimer": 360,
          "vpcDelayRestoreTimer": 150,
          "vpcDomainIdRange": "1-1000",
          "vpcIpv6NeighborDiscoverySync": true,
          "vpcLayer3PeerRouter": true,
          "vpcPeerKeepAliveOption": "management",
          "vpcPeerLinkEnableNativeVlan": false,
          "vpcPeerLinkPortChannelId": "500",
          "vpcPeerLinkVlan": "3600",
          "vpcTorDelayRestoreTimer": 30,
          "vrfExtensionTemplate": "Default_VRF_Extension_Universal",
          "vrfLiteAutoConfig": "manual",
          "vrfLiteIpv6SubnetRange": "fd00::a33:0/112",
          "vrfLiteIpv6SubnetTargetMask": 126,
          "vrfLiteSubnetRange": "10.33.0.0/16",
          "vrfLiteSubnetTargetMask": 30,
          "vrfTemplate": "Default_VRF_Universal",
          "vrfVlanRange": "2000-2299"
        },
        "name": "fabric1",
        "securityDomain": "all",
        "telemetryCollection": true,
        "telemetryCollectionType": "inBand",
        "telemetrySourceInterface": "loopback0",
        "telemetrySourceVrf": "default",
        "telemetryStreamingProtocol": "ipv4"
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

