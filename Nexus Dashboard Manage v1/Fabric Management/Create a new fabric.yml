          "anycastGatewayMac": "2020.0000.00aa",
          "anycastLoopbackId": 10,
          "anycastRendezvousPointIpRange": "10.254.254.0/24",
          "autoGenerateMulticastGroupAddress": false,
          "autoUniqueVrfLiteIpPrefix": false,
          "bfd": false,
          "bfdAuthentication": false,
          "bfdAuthenticationKeyId": 100,
          "bfdIbgp": false,
          "bgpAllowAsInNum": 1,
          "bgpAsMode": "multiAS",
          "bgpAsn": "23",
          "bgpAuthentication": false,
          "bgpLoopbackId": 0,
