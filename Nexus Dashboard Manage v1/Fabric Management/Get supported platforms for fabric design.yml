info:
  name: Get supported platforms for fabric design
  type: http
  seq: 1
  tags:
    - Fabric Management

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabricActions/designSupportMatrix"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "breakoutSpineInterfaces": true,
        "leafCount": 4,
        "leafModel": "N9K-C93180YC-FX3",
        "leafVpcPairPolicy": "pairWithPhysicalPeerLink",
        "linkCapacity": "100Gb",
        "spineCount": 6,
        "spineModel": "N9364E-SG2-Q"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

