info:
  name: Export fabric design device inventory as CSV
  type: http
  seq: 14
  tags:
    - Fabric Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/actions/bulkSwap"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/actions/bulkSwap"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          Name,IP Address,Model,Role,Generated Serial Number,Serial Number,vPC Role,vPC Peer,Software Version
          MyFabric-Leaf-1,192.168.2.21,N9K-C9332D-GX2B,Leaf,TEMPSNJPF1O1,,,,10.5(3)
          MyFabric-Leaf-2,192.168.2.22,N9K-C9332D-GX2B,Leaf,TEMPSNJPF1O2,,,,10.5(3)
          MyFabric-Leaf-3,192.168.2.23,N9K-C9332D-GX2B,Leaf,TEMPSNJPF1O3,,,,10.5(3)
          MyFabric-Leaf-4,192.168.2.24,N9K-C9332D-GX2B,Leaf,TEMPSNJPF1O4,,,,10.5(3)
          MyFabric-Spine-1,192.168.2.25,N9K-C9364D-GX2A,Spine,TEMPSNJPF1O5,,,,10.5(3)
          MyFabric-Spine-2,192.168.2.26,N9K-C9364D-GX2A,Spine,TEMPSNJPF1O6,,,,10.5(3)
