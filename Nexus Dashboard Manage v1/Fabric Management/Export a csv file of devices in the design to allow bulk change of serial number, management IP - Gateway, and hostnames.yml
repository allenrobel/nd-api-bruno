info:
  name: Export a csv file of devices in the design to allow bulk change of serial number, management IP / Gateway, and hostnames.
  type: http
  seq: 14

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/actions/bulkSwap"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/actions/bulkSwap"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          Name,IP Address,Model,Role,Generated Serial Number,Serial Number,vPC Role,vPC Peer,Software Version
          MyFabric-leaf-1,192.168.2.21,N9K-C9332D-GX2B,Leaf,FAKESNL1,REALSNL1,,,10.5(3)
          MyFabric-leaf-2,192.168.2.22,N9K-C9332D-GX2B,Leaf,FAKESNL2,REALSNL2,,,10.5(3)
          MyFabric-leaf-3,192.168.2.23,N9K-C9332D-GX2B,Leaf,FAKESNL3,REALSNL3,,,10.5(3)
          MyFabric-leaf-4,192.168.2.24,N9K-C9332D-GX2B,Leaf,FAKESNL4,REALSNL4,,,10.5(3)
          MyFabric-spine-1,192.168.2.25,N9K-C9364D-GX2A,Leaf,FAKESNS1,REALSNS1,,,10.5(3)
          MyFabric-spine-2,192.168.2.26,N9K-C9364D-GX2A,Leaf,FAKESNS2,REALSNS2,,,10.5(3)
