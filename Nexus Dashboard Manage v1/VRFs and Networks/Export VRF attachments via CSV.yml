      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfAttachments/export"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "switchIds": [
              "9UA832KA3LO",
              "9YVKXMATL9J"
            ],
            "vrfNames": [
              "MyVRF_50000",
              "MyVRF_50001"
