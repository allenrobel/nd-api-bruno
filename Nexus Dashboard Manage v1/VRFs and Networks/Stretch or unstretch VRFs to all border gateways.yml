info:
  name: Stretch or unstretch VRFs to all border gateways
  type: http
  seq: 24

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfActions/stretch"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "attachments": [
          {
            "vrfName": "",
            "stretch": ""
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Multi-tenant example (Multiple stretch/unstretch)
    description: Example response for a multi-tenant environment. Each VRF name is prefixed
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfActions/stretch"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "attachments": [
              {
                "stretch": "allBgwList",
                "vrfName": "tenantA~MyVRF_50000"
              },
              {
                "stretch": "none",
                "vrfName": "TenantB~MyVRF_50001"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "status": "success",
                "stretch": "allBgwList",
                "vrfName": "tenantA~MyVRF_50000"
              },
              {
                "message": "VRF not attached to any BorderGateway switches",
                "status": "failed",
                "stretch": "none",
                "vrfName": "common~MyVRF_50001"
              }
            ]
          }
