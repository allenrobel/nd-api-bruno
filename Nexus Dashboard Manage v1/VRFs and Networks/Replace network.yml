info:
  name: Replace network
  type: http
  seq: 17

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/networks/:networkName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: networkName
      value: ""
      type: path
      description: Then name of the network
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: "{}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response (classicNetwork)
    description: No Content
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/networks/:networkName"
      method: PUT
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: networkName
          value: ""
          type: path
          description: Then name of the network
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket ID. This is mandatory if Change Control is enabled
          disabled: true
      body:
        type: json
        data: |-
          {
            "displayName": "MyNetwork_50000",
            "fabricName": "fab1",
            "hsrpVrrpGroupNumberV6": {
              "protocol": {
                "hsrp": 175,
                "vrrp": 100
              }
            },
            "l2Data": {
              "vlanName": "VLAN2000"
            },
            "l3Data": {
              "activePrimaryInterfaceIpv4": "192.168.50.2/24",
              "activePrimarySwitchPriority": 120,
              "gatewayIpv4Address": "192.168.50.1/24",
              "hsrpVersion": 2,
              "hsrpVrrpGroupNumber": {
                "protocol": {
                  "hsrpV2": 1
                }
              },
              "mtu": 9216,
              "netflow": false,
              "preempt": true,
              "routingTag": 50000,
              "standbyBackupInterfaceIpv4": "192.168.50.3/24",
              "standbyBackupSwitchPriority": 100,
              "vlanInterfaceDescription": "Classic Network Interface"
            },
            "layer": "layer3",
            "networkId": 20000,
            "networkName": "MyNetwork_50000",
            "networkType": "routed",
            "tenantName": "tenant3",
            "vlanId": 2000,
            "vrfName": "MyVRF_70000"
          }
    response:
      statusText: No Content
      body:
        type: text
        data: ""
