info:
  name: Replace network
  type: http
  seq: 17
  tags:
    - VRFs and Networks

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/networks/:networkName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: networkName
      value: ""
      type: path
      description: Then name of the network
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: |-
      {
        "displayName": "MyNetwork_30000",
        "fabricName": "fab1",
        "l2Data": {
          "fabricData": {
            "redundancyType": "hsrp"
          },
          "vlanName": "CLASSIC_VLAN_3000"
        },
        "l3Data": {
          "activePrimaryInterfaceIpv4": "10.33.0.2",
          "activePrimaryInterfaceIpv6": "2001:db8:3000::2",
          "activePrimarySwitchPriority": 150,
          "dhcpServers": [
            {
              "serverAddress": "10.63.0.10",
              "serverVrf": "MyVRF_50003"
            }
          ],
          "gatewayIpv4Address": "10.33.0.1/24",
          "gatewayIpv6Address": "2001:db8:3000::1/64",
          "hsrpVersion": 2,
          "hsrpVrrpGroupNumber": 100,
          "mtu": 9216,
          "netflow": false,
          "preempt": true,
          "routingTag": 30000,
          "standbyBackupInterfaceIpv4": "10.33.0.3",
          "standbyBackupInterfaceIpv6": "2001:db8:3000::3",
          "standbyBackupSwitchPriority": 100,
          "standbyVlanInterfaceDescription": "Classic LAN Enhanced standby interface",
          "vlanInterfaceDescription": "Classic LAN Enhanced primary interface"
        },
        "networkMode": "layer3",
        "networkName": "MyNetwork_30000",
        "networkType": "classicLanEnhanced",
        "vlanId": 3000,
        "vrfName": "MyVRF_50003"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

