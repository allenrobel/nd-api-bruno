          type: path
          description: Name of the fabric
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket ID. This is mandatory if Change Control is enabled
          disabled: true
      body:
        type: json
        data: |-
          {
            "networks": [
              {
                "aciData": {
                  "applicationProfileName": "ANP1",
                  "epgName": "EPG1",
                  "fabricData": {
                    "vlanPoolDomains": [
                      {
                        "domainName": "PhysDom",
                        "domainType": "physical",
                        "vlanPool": "100-200,211,300-400"
                      }
                    ]
                  }
                },
                "displayName": "MyNetwork_30000",
                "fabricName": "fab1",
                "l2Data": {
                  "fabricData": {
                    "enableIr": false,
                    "multicastGroup": "239.1.1.1",
                    "stretch": "bgw1"
                  },
                  "rtAuto": true,
                  "vlanName": "VLAN3000"
                },
                "l3Data": {
                  "arpSuppression": true,
                  "fabricData": {
                    "dhcpServers": [
                      {
                        "serverAddress": "10.0.0.1",
                        "serverVrf": "MyVRF_50000"
                      }
                    ],
                    "gatewayOnBorder": true,
                    "igmpVersion": 3,
                    "ipv4Trm": true,
                    "ipv6Trm": false,
                    "loopbackId": 300,
                    "netflow": false
                  },
                  "gatewayIpv4Address": "192.168.30.1/24",
                  "mtu": 9216,
                  "routingTag": 30000,
                  "secondaryGatewayIpv4Collection": [
                    "192.168.30.2/24"
                  ],
                  "secondaryGatewayIpv6Collection": [
                    "2001:db8:30::1/64"
                  ],
                  "vlanInterfaceDescription": "VXLAN Network 30000 Interface"
                },
                "layer": "layer3",
                "networkId": 30000,
                "networkName": "MyNetwork_30000",
                "networkType": "vxlan",
                "tenantName": "tenant1",
                "vlanId": 3000,
                "vrfName": "MyVRF_50000"
              },
              {
                "displayName": "MyNetwork_40000",
                "fabricName": "fab1",
                "l2Data": {
                  "vlanName": "VLAN4000"
                },
                "l3Data": {
                  "activePrimaryInterfaceIpv4": "192.168.40.2/24",
                  "activePrimaryInterfaceIpv6": "2001:db8:40::2/64",
                  "activePrimarySwitchPriority": 120,
                  "gatewayIpv4Address": "192.168.40.1/24",
                  "hsrpVersion": 2,
                  "hsrpVrrpGroupNumber": {
                    "protocol": {
                      "hsrpV2": 1
                    }
                  },
                  "hsrpVrrpGroupNumberV6": {
                    "protocol": {
                      "hsrp": 200,
                      "vrrp": 75
                    }
                  },
                  "l3NetflowMonitor": "L3_MONITOR",
                  "mtu": 9216,
                  "netflow": true,
                  "preempt": true,
                  "routingTag": 40000,
                  "standbyBackupInterfaceIpv4": "192.168.40.3/24",
                  "standbyBackupInterfaceIpv6": "2001:db8:40::3/64",
                  "standbyBackupSwitchPriority": 100,
                  "standbyVlanInterfaceDescription": "Standby Classic Network 40000 Interface",
                  "vlanInterfaceDescription": "Classic Network 40000 Interface"
                },
                "layer": "layer3",
                "networkName": "MyNetwork_40000",
                "networkType": "routed",
                "tenantName": "tenant2",
                "vlanId": 4000,
                "vrfName": "MyVRF_60000"
              },
              {
                "displayName": "MyNetwork_20000",
                "fabricName": "fab1",
                "layer": "layer3",
                "networkExtensionTemplateName": "CustomExtTemplate",
                "networkId": 20000,
                "networkName": "MyNetwork_20000",
                "networkTemplateConfig": {
                  "customParam1": "value1",
                  "customParam2": "value2"
                },
                "networkTemplateName": "CustomTemplate",
                "networkType": "userDefined",
                "tenantName": "tenant3",
                "vlanId": 2000,
                "vrfName": "MyVRF_70000"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "networkId": 30001,
                "networkName": "TenantA~MyNetwork_30001",
                "status": "success"
              },
              {
                "networkId": 30002,
                "networkName": "TenantB~MyNetwork_30002",
                "status": "success"
              }
            ]
          }
