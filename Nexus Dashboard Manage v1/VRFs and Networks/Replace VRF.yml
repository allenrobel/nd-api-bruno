info:
  name: Replace VRF
  type: http
  seq: 34
  tags:
    - VRFs and Networks

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfs/:vrfName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: vrfName
      value: ""
      type: path
      description: Name of the vrf
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: |-
      {
        "additionalData": {
          "advertiseDefaultRoute": true,
          "advertiseHostRoute": false,
          "asn": "65789",
          "configureStaticDefaultRoute": true,
          "disableRtAuto": false,
          "evpnRouteTargetExport": [
            "65000:50000"
          ],
          "evpnRouteTargetImport": [
            "65000:50000"
          ],
          "ipv6LinkLocal": true,
          "l3VniMulticastGroup": "1.1.1.2",
          "loopbackId": 25,
          "maxBgpPaths": 1,
          "maxIbgpPaths": 2,
          "netflow": false,
          "routeTargetExport": [
            "65000:50000"
          ],
          "routeTargetImport": [
            "65000:50000"
          ],
          "rtAuto": false,
          "trmOnBgw": false,
          "v4RpAbsent": false,
          "v4RpExternal": false
        },
        "fabricData": {
          "advertiseDefaultRoute": true,
          "advertiseHostRoute": false,
          "configureStaticDefaultRoute": true,
          "netflow": false
        },
        "fabricName": "fab1",
        "vlanId": 2000,
        "vrfId": 50000,
        "vrfName": "MyVRF_50000",
        "vrfType": "vxlan"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

