info:
  name: Export network attachments via CSV
  type: http
  seq: 9
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/networkAttachments/export"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "networkNames": [
          "MyNetwork_30000",
          "MyNetwork_30001"
        ],
        "switchFabricNames": [
          "apic1",
          "apic2"
        ],
        "switchIds": [
          "99X70W9ORI1",
          "98AM4PTG8V0"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/networkAttachments/export"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "networkNames": [
              "MyNetwork_30000",
              "MyNetwork_30001"
            ],
            "switchFabricNames": [
              "apic1",
              "apic2"
            ],
            "switchIds": [
              "99X70W9ORI1",
              "98AM4PTG8V0"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          networkName,networkId,switchId,switchName,switchFabricName,vlanId,status,attach,switchRole,peerSwitchId,sviEnabled,isActive,interfaces
          MyNetwork_30001,30001,99X70W9ORI1,bgl-vp-leaf2,fab1,100,inSync,true,leaf,98AM4PTG8V0,true,true,"[{""interfaceRange"":""Ethernet1/1-3"",""mode"":""access""}]"
