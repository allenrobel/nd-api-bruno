          type: path
          description: Name of the fabric
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket ID. This is mandatory if Change Control is enabled
          disabled: true
      body:
        type: json
        data: |-
          {
            "vrfs": [
              {
                "coreData": {
                  "evpnRouteTargetExport": [
                    "65000:1002"
                  ],
                  "evpnRouteTargetImport": [
                    "65000:1002"
                  ],
                  "ipv6LinkLocal": true,
                  "maxBgpPaths": 1,
                  "maxIbgpPaths": 2,
                  "mtu": 9216,
                  "routeTargetExport": [
                    "65000:1001"
                  ],
                  "routeTargetImport": [
                    "65000:1001"
                  ],
                  "routingTag": 12345,
                  "v6VrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
                  "vrfDescription": "VXLAN VRF for Production",
                  "vrfInterfaceDescription": "Interface for VLAN 101",
                  "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
                  "vrfVlanName": "VLAN101"
                },
                "fabricData": {
                  "advertiseDefaultRoute": true,
                  "advertiseHostRoute": false,
                  "asn": "1234",
                  "bgpPassword": "a3f5b6",
                  "bgpPasswordKeyType": 3,
                  "configureStaticDefaultRoute": true,
                  "netflow": true,
                  "netflowMonitor": "Netflow_123",
                  "rtAuto": false,
                  "trmData": {
                    "ipv4Trm": true,
                    "l3VniMulticastGroup": "239.1.1.1",
                    "mvpnRouteTargetExport": [
                      "65000:100"
                    ],
                    "mvpnRouteTargetImport": [
                      "65000:100"
                    ],
                    "trmOnBgw": false,
                    "v4MulticastGroup": "224.1.0.0/4",
                    "v4RpAbsent": false,
                    "v4RpAddress": "10.1.0.1",
                    "v4RpExternal": false
                  }
                },
                "fabricName": "fab1",
                "vlanId": 101,
                "vrfId": 50000,
                "vrfName": "MyVRF_50000",
                "vrfType": "vxlan"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "status": "success",
                "vrfId": 50000,
                "vrfName": "MyVRF_50000"
              }
            ]
          }
