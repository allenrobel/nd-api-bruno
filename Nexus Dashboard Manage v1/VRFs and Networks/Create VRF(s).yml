info:
  name: Create VRF(s)
  type: http
  seq: 31

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/vrfs"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: fabric1
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: |-
      {
        "vrfs": [
          {
            "fabricName": "fabric1",
            "vrfName": "MyVRF_50001",
            "vrfType": "vxlanIbgp",
            "coreData": {
              "vrfVlanName": "MyVLAN_2001",
              "vrfInterfaceDescription": "VRF 50001, VLAN 2001",
              "vrfDescription": "PROD",
              "mtu": 9216,
              "routingTag": 12345,
              "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
              "v6VrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
              "maxBgpPaths": 1,
              "maxIbgpPaths": 2,
              "ipv6LinkLocal": true,
              "rtAuto": false,
              "routeTargetImport": [],
              "routeTargetExport": [],
              "evpnRouteTargetImport": [],
              "evpnRouteTargetExport": []
            },
            "fabricData": {
              "bgpBestPathRelax": false,
              "bgpLogNeighborChange": false,
              "trmData": {
                "ipv4Trm": false,
                "v4RpAbsent": false,
                "v4RpExternal": false,
                "v4RpAddress": "",
                "loopbackNumber": null,
                "l3VniMulticastGroup": "",
                "v4MulticastGroup": "",
                "ipv6Trm": false,
                "v6RpAbsent": false,
                "v6RpExternal": false,
                "v6RpAddress": "",
                "v6MulticastGroup": "",
                "mvpnInterAs": false,
                "trmOnBgw": false,
                "mvpnRouteTargetImport": [],
                "mvpnRouteTargetExport": []
              },
              "advertiseHostRoute": false,
              "advertiseDefaultRoute": true,
              "configureStaticDefaultRoute": true,
              "bgpPassword": "",
              "bgpPasswordKeyType": "",
              "bgpAllowAsIn": false,
              "bgpAllowAsInNum": 3,
              "bgpAsOverride": false,
              "bgpDisablePeerAsCheck": false,
              "bgpSoftReconfigAlways": false,
              "netflow": false,
              "netflowMonitor": ""
            },
            "vrfId": 50001,
            "vlanId": 2001
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Single success (Custom VRF)
    description: Create one VRF
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/vrfs"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket ID. This is mandatory if Change Control is enabled
          disabled: true
      body:
        type: json
        data: |-
          {
            "vrfs": [
              {
                "fabricName": "fab1",
                "vlanId": 101,
                "vrfExtensionTemplateName": "CustomExtTemplate1",
                "vrfId": 50000,
                "vrfName": "MyVRF_50000",
                "vrfTemplateConfig": {
                  "param1": "value1",
                  "param2": "value2"
                },
                "vrfTemplateName": "CustomTemplate1",
                "vrfType": "userDefined"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "status": "success",
                "vrfId": 50000,
                "vrfName": "MyVRF_50000"
              }
            ]
          }
  - name: Single success (VXLAN VRF)
    description: Create one VRF
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/vrfs"
