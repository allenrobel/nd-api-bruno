info:
  name: Create VRF(s)
  type: http
  seq: 31
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfs"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: |-
      {
        "vrfs": [
          {
            "additionalData": {
              "bgpAuth": false,
              "configureStaticDefaultRoute": true,
              "maxBgpPaths": 1,
              "netflow": false,
              "ospfAuth": true,
              "ospfAuthKey": "3des_encrypted_key_here",
              "ospfAuthKeyId": 127,
              "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET"
            },
            "coreData": {
              "mtu": 9216,
              "ospfAreaId": "0.0.0.1",
              "ospfv3AreaId": "0.0.0.1",
              "vpcPeering": true,
              "vrfDescription": "Classic VRF for legacy network integration",
              "vrfIpVersion": "both"
            },
            "fabricName": "fab1",
            "vrfName": "MyVRF_50003",
            "vrfType": "classicLanEnhanced"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Single success (Classic LAN Enhanced VRF)
    description: Create one VRF
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfs"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket ID. This is mandatory if Change Control is enabled
          disabled: true
      body:
        type: json
        data: |-
          {
            "vrfs": [
              {
                "additionalData": {
                  "bgpAuth": false,
                  "configureStaticDefaultRoute": true,
                  "maxBgpPaths": 1,
                  "netflow": false,
                  "ospfAuth": true,
                  "ospfAuthKey": "3des_encrypted_key_here",
                  "ospfAuthKeyId": 127,
                  "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET"
                },
                "coreData": {
                  "mtu": 9216,
                  "ospfAreaId": "0.0.0.1",
                  "ospfv3AreaId": "0.0.0.1",
                  "vpcPeering": true,
                  "vrfDescription": "Classic VRF for legacy network integration",
                  "vrfIpVersion": "both"
                },
                "fabricName": "fab1",
                "vrfName": "MyVRF_50003",
                "vrfType": "classicLanEnhanced"
              }
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "status": "success",
                "vrfId": 50000,
                "vrfName": "MyVRF_50000"
              }
            ]
          }
  - name: Single success (Custom VRF)
    description: Create one VRF
    request:
