          disabled: true
      body:
        type: json
        data: |-
          {
            "vrfs": [
              {
                "fabricName": "fab1",
                "vlanId": 2004,
                "vrfExtensionTemplateName": "CustomExtTemplate1",
                "vrfId": 50004,
                "vrfName": "MyVRF_50004",
                "vrfTemplateConfig": {
                  "vrfDescription": "Custom VRF",
                  "vrfIntfDescription": "VRF Interface",
                  "vrfName": "MyVRF_50004",
                  "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
                  "vrfSegmentId": "50004"
                },
                "vrfTemplateName": "Default_VRF_Universal",
                "vrfType": "userDefined"
              }
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "status": "success",
                "vrfId": 50000,
                "vrfName": "MyVRF_50000"
              }
