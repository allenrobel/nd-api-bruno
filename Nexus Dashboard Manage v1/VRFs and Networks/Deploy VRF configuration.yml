          type: query
          description: Change Control Ticket ID. This is mandatory if Change Control is enabled
          disabled: true
      body:
        type: json
        data: |-
          {
            "switchIds": [
              "99X70W9ORI1"
            ],
            "vrfNames": [
              "MyVRF_50001"
            ]
          }
    response:
      statusText: Accepted
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "Deployment of VRFs has been initiated successfully"
