info:
  name: Get network
  type: http
  seq: 16
  tags:
    - VRFs and Networks

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/networks/:networkName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: networkName
      value: ""
      type: path
      description: Then name of the network
    - name: fetchMembers
      value: ""
      type: query
      description: If true, fetches the members details of a policy
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

