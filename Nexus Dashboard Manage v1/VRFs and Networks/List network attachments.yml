info:
  name: List network attachments
  type: http
  seq: 11
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/networkAttachments/query"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: isConsolidated
      value: "false"
      type: query
      description: When true, returns interface ranges (e.g., 'Ethernet1/1-5'). When false, returns individual interface names (e.g., 'Ethernet1/1').
    - name: includeAll
      value: "false"
      type: query
      description: When true, returns all attachments. When false, does not return attachments that were never attached.
  body:
    type: json
    data: |-
      {
        "networkNames": [
          "MyNetwork_30000",
          "MyNetwork_30001"
        ],
        "switchFabricNames": [
          "apic1",
          "apic2"
        ],
        "switchIds": [
          "99X70W9ORI1"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

