info:
  name: Attach/detach VRFs
  type: http
  seq: 25
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfAttachments"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: |-
      {
        "attachments": [
          {
            "attach": true,
            "instanceValues": {
              "loopbackId": 100,
              "loopbackIpv4Address": "10.1.1.10"
            },
            "switchId": "FDO24520JKL",
            "vlanId": 2000,
            "vrfName": "MyVRF_50000"
          },
          {
            "attach": true,
            "instanceValues": {
              "loopbackId": 100,
              "loopbackIpv4Address": "10.1.1.11"
            },
            "switchId": "FDO24520MNO",
            "vlanId": 2000,
            "vrfName": "MyVRF_50000"
          },
          {
            "attach": true,
            "instanceValues": {
              "loopbackId": 101,
              "loopbackIpv4Address": "10.1.1.20"
            },
            "switchId": "FDO24520JKL",
            "vlanId": 2001,
            "vrfName": "MyVRF_50001"
          },
          {
            "attach": true,
            "instanceValues": {
              "loopbackId": 101,
              "loopbackIpv4Address": "10.1.1.21"
            },
            "switchId": "FDO24520MNO",
            "vlanId": 2001,
            "vrfName": "MyVRF_50001"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Multi-tenant example (Bulk VRF attach)
    description: Example response for a multi-tenant environment. Each VRF name is prefixed with the tenant name.
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfAttachments"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket ID. This is mandatory if Change Control is enabled
          disabled: true
      body:
        type: json
        data: |-
          {
            "attachments": [
              {
                "attach": true,
                "instanceValues": {
                  "loopbackId": 100,
                  "loopbackIpv4Address": "10.1.1.10"
                },
                "switchId": "FDO24520JKL",
                "vlanId": 2000,
                "vrfName": "MyVRF_50000"
              },
              {
                "attach": true,
                "instanceValues": {
                  "loopbackId": 100,
                  "loopbackIpv4Address": "10.1.1.11"
                },
                "switchId": "FDO24520MNO",
                "vlanId": 2000,
                "vrfName": "MyVRF_50000"
              },
              {
                "attach": true,
                "instanceValues": {
                  "loopbackId": 101,
                  "loopbackIpv4Address": "10.1.1.20"
                },
                "switchId": "FDO24520JKL",
                "vlanId": 2001,
                "vrfName": "MyVRF_50001"
              },
              {
                "attach": true,
                "instanceValues": {
                  "loopbackId": 101,
                  "loopbackIpv4Address": "10.1.1.21"
                },
                "switchId": "FDO24520MNO",
                "vlanId": 2001,
                "vrfName": "MyVRF_50001"
              }
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "vlanId already exists",
                "status": "failed",
                "switchId": "99X70W9ORI1",
                "switchName": "bgl-vp-leaf2",
                "vrfName": "common~MyVRF_50001"
              },
              {
                "status": "success",
                "switchId": "99X70W9ORI1",
                "switchName": "bgl-vp-leaf1",
                "vrfName": "tenant1~MyVRF_50001"
              }
            ]
          }
