info:
  name: Attach/detach VRFs
  type: http
  seq: 25

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfAttachments"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: fabric1
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: |
      {
        "attachments": [
          {
            "attach": true,
            "extensionValues": [
              {
                "autoPeerConfig": false,
                "dot1qId": 2,
                "interfaceName": "Ethernet1/8",
                "ipv4Address": "1.10.13.123/24",
                "ipv6Address": "2001:db8::/32",
                "ipv6RouteMapIn": "",
                "ipv6RouteMapOut": "EXTCON-RMAP-FILTER-V6",
                "mtu": 9216,
                "neighborAsn": "6578",
                "neighborIpv4Address": "1.10.13.124",
                "neighborIpv6Address": "2001:db8::1",
                "netflow": false,
                "peerVrfName": "MyVRF_50001",
                "routeMapIn": "",
                "routeMapOut": "EXTCON-RMAP-FILTER",
                "routeTag": 1
              }
            ],
            "extraConfig": "interface Ethernet1/1\n  description Link to core switch\n  no shutdown\n",
            "instanceValues": {
              "loopbackId": 23,
              "loopbackIpv4": "1.1.1.2",
              "loopbackIpv6": "2051:17:200::11"
            },
            "switchId": "FDO245206N5",
            "vlanId": 2000,
            "vrfName": "MyVRF_50000"
          },
          {
            "attach": false,
            "extraConfig": "interface Ethernet1/2\n  description Backup link\n  shutdown\n",
            "instanceValues": {
              "loopbackId": 24,
              "loopbackIpv4": "1.1.1.3",
              "loopbackIpv6": "2051:17:200::11"
            },
            "switchId": "FDO245206N6",
            "vlanId": 3000,
            "vrfName": "MyVRF_50000"
          },
          {
            "attach": true,
            "extraConfig": "interface Ethernet1/3\n  description High-speed connection\n  no shutdown\n",
            "instanceValues": {
              "loopbackId": 26,
              "loopbackIpv4": "1.1.1.4",
              "loopbackIpv6": "2051:17:200::11"
            },
            "switchId": "FDO245206N7",
            "vlanId": 4000,
            "vrfName": "MyVRF_50001"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

