                    "dot1qId": 101,
                    "interfaceName": "Ethernet1/11",
                    "ipv4Address": "192.168.101.1/30",
                    "mtu": 9216,
                    "neighborAsn": "65002",
                    "neighborIpv4Address": "192.168.101.2",
