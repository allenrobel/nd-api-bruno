info:
  name: Attach/detach networks
  type: http
  seq: 8
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/networkAttachments"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
    - name: strictModeValidation
      value: "true"
      type: query
      description: When true, enables strict mode validation for attachment operations.
  body:
    type: json
    data: |-
      {
        "attachments": [
          {
            "attach": true,
            "extraConfig": "interface Ethernet1/10\n  description Server connection for MyNetwork_30000\n  spanning-tree port type edge\n",
            "interfaces": [
              {
                "interfaceRange": "Ethernet1/10",
                "mode": "access"
              },
              {
                "interfaceGroupName": "ServerGroup1",
                "interfaceRange": "Ethernet1/11-15",
                "mode": "access"
              }
            ],
            "networkName": "MyNetwork_30000",
            "switchId": "FDO24530ABC",
            "vlanId": 3000
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Multi-tenant example (Access Mode Attachment)
