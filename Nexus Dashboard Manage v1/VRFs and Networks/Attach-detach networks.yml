info:
  name: Attach/detach networks
  type: http
  seq: 8

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/networkAttachments"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: |-
      {
        "attachments": [
          {}
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Multi-tenant example (Attach networks to switches)
    description: Example response for a multi-tenant environment. Each network name is prefixed with the tenant name.
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/networkAttachments"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: ticketId
          value: ""
          type: query
          description: Change Control Ticket ID. This is mandatory if Change Control is enabled
          disabled: true
      body:
        type: json
        data: |-
          {
            "attachments": [
              {
                "attach": true,
                "extraConfig": "interface Ethernet1/1\ndescription part of MyNetwork_30000\n",
                "interfaces": [
                  {
                    "interfaceRange": "Ethernet1/1",
                    "mapping": {
                      "mappingType": "none"
                    },
                    "mode": "trunk",
                    "nativeVlan": false
                  },
                  {
                    "interfaceRange": "Ethernet1/2",
                    "mode": "access"
                  },
                  {
                    "interfaceRange": "Eth1/20-25",
                    "mode": "dot1qTunnel"
                  },
                  {
                    "interfaceRange": "Port-Channel10",
                    "mode": "trunk",
                    "nativeVlan": false
                  }
                ],
                "networkName": "MyNetwork_30000",
                "switchId": "FDO20212311U",
                "vlanId": 2000
              },
              {
                "attach": true,
                "extraConfig": "interface Ethernet1/3-5\ndescription part of MyNetwork_30001\n",
                "interfaces": [
                  {
                    "interfaceRange": "Ethernet1/3-5",
                    "mapping": {
                      "mappingType": "none"
                    },
                    "mode": "trunk",
                    "nativeVlan": true
                  },
                  {
                    "interfaceRange": "Ethernet1/6",
                    "mode": "dot1qTunnel"
                  }
                ],
                "networkName": "MyNetwork_30001",
                "switchId": "FDO20212312U",
                "vlanId": 2001
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "vlanId already exists",
                "networkName": "common~MyNetwork_30001",
                "status": "failed",
                "switchId": "99X70W9ORI1",
                "switchName": "bgl-vp-leaf2"
              },
              {
                "networkName": "common~MyNetwork_30000",
                "status": "success",
                "switchId": "99X70W9ORI1",
                "switchName": "bgl-vp-leaf1"
              }
            ]
          }
