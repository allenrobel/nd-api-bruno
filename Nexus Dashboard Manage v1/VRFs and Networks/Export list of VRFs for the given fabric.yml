info:
  name: Export list of VRFs for the given fabric
  type: http
  seq: 20

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfActions/export"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "vrfNames": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: When there are multiple types of VRFs in the fabric, the response will be a zip file containing multiple CSV files for each type of VRF
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/vrfActions/export"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "vrfNames": [
              "MyVRF_50000",
              "MyVRF_60000"
            ]
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/zip
      body:
        type: text
        data: <binary data representation of a zip file>
