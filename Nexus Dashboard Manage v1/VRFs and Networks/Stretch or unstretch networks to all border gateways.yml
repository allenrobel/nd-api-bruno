          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "attachments": [
              {
                "networkName": "tenantA~MyNetwork_30000",
                "stretch": "allBgwList"
              },
              {
                "networkName": "tenantB~MyNetwork_30001",
                "stretch": "none"
