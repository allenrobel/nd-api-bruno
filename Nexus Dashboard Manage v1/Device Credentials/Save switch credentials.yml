  type: http
  seq: 9

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/credentials/switches"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

