info:
  name: Release resource by allocation details
  type: http
  seq: 6

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/resources/actions/removeResource"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: ""
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

