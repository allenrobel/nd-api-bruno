info:
  name: Allocates the ID or IP/Subnet resource on given pool. If the resource value is Specified in the request the same will be allocated
  type: http
  seq: 4

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/resources"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: tenantName
      value: ""
      type: query
      description: Name of the tenant
      disabled: true
  body:
    type: json
    data: |-
      {
        "resources": [
          {}
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

