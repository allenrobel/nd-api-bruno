info:
  name: Manage Tenant Fabric Associations
  type: http
  seq: 7
  tags:
    - Multi Tenancy

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/tenantFabricAssociations"
  body:
    type: json
    data: |-
      {
        "items": [
          {
            "allowedVlans": [
              "10-20",
              "30-40"
            ],
            "associate": true,
            "fabricName": "fabric1",
            "localName": "ten1",
            "tenantName": "tenant1"
          },
          {
            "allowedVlans": [
              "100-200"
            ],
            "associate": false,
            "fabricName": "fabric3",
            "tenantName": "tenant3",
            "tenantPrefix": "t3"
          },
          {
            "allowedVlans": [
              "10-20"
            ],
            "associate": true,
            "fabricName": "fabric4",
            "tenantName": "tenant4",
            "tenantPrefix": "t4"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

