info:
  name: Save user-selected network and security policies imported from ACI Fabric
  type: http
  seq: 2

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/actions/importTenantPolicies"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: "{}"
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/actions/importTenantPolicies"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "memberFabricName": "ACI-Fabric-1",
            "policies": {
              "networkAttachments": [
                {
                  "attach": true,
                  "extraConfig": "interface Ethernet1/1\n description Access Port\n",
                  "interfaces": [
                    {
                      "interfaceRange": "Ethernet1/1",
                      "mode": "access"
                    },
                    {
                      "interfaceRange": "Ethernet1/2",
                      "mode": "access"
                    }
                  ],
                  "networkName": "MyNetwork_30000",
                  "switchId": "FDO20212311U",
                  "vlanId": 2000
                }
              ],
              "networks": [
                {
                  "aciData": {
                    "applicationProfileName": "ANP1",
                    "epgName": "EPG1",
                    "fabricData": {
                      "vlanPoolDomains": [
                        {
                          "domainName": "PhysDom",
                          "domainType": "physical",
                          "vlanPool": "100-200,211,300-400"
                        }
                      ]
                    }
                  },
                  "displayName": "MyNetwork_30000",
                  "fabricName": "fab1",
                  "l2Data": {
                    "rtAuto": true,
                    "vlanName": "VLAN3000"
                  },
                  "l3Data": {
                    "arp": true,
                    "dhcpServers": [
                      {
                        "serverAddress": "10.0.0.1",
                        "serverVrf": "MyVRF_50000"
                      }
                    ],
                    "gatewayIp": "192.168.30.1/24",
                    "gatewayIpV6": [
                      {
                        "address": "2001:db8:30::1/64"
                      }
                    ],
                    "gatewayOnBorder": true,
                    "igmpVersion": 3,
                    "ipv4Trm": true,
                    "ipv6Trm": false,
                    "loopbackId": 300,
                    "mtu": 9216,
                    "netflow": false,
                    "secondaryIpV4": [
                      {
                        "address": "192.168.30.2/24"
                      }
                    ],
                    "tag": 30000,
                    "vlanInterfaceDescription": "VXLAN Network 30000 Interface"
                  },
                  "networkId": 30000,
                  "networkName": "MyNetwork_30000",
                  "networkType": "vxlan",
                  "stretch": "bgw1",
                  "vlanId": 3000,
                  "vrfName": "MyVRF_50000"
                }
              ],
              "vrfs": [
                {
                  "additionalData": {
                    "advertiseDefaultRoute": true,
                    "advertiseHostRoute": false,
                    "asn": "1234",
                    "bgpPassword": "a3f5b6",
                    "bgpPasswordKeyType": "3des",
                    "configureStaticDefaultRoute": true,
                    "ipv6LinkLocal": true,
                    "l3VniMulticastGroup": "239.1.1.1",
                    "maxBgpPaths": 1,
                    "maxIbgpPaths": 2,
                    "mtu": 9216,
                    "netflow": true,
                    "netflowMonitor": "Netflow_123",
                    "rtAuto": false,
                    "tag": 12345,
                    "v6VrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
                    "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET"
                  },
                  "coreData": {
                    "vrfDescription": "VXLAN VRF for Production",
                    "vrfInterfaceDescription": "Interface for VLAN 101",
                    "vrfVlanName": "VLAN101"
                  },
                  "fabricName": "fab1",
                  "vlanId": 101,
                  "vrfId": 1001,
                  "vrfName": "MyVRF3000",
                  "vrfType": "vxlan"
                }
              ]
            },
            "tenantName": "tenant1"
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Successfully imported selected policies from tenant1 on ACI-Fabric-1"
          }
