info:
  name: Set tenant member local names
  type: http
  seq: 8
  tags:
    - Multi Tenancy

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/tenantFabricAssociations/memberLocalName"
  body:
    type: json
    data: |-
      {
        "items": [
          {
            "fabricName": "fabric1",
            "localName": "ten1",
            "tenantName": "tenant1"
          },
          {
            "fabricName": "fabric1",
            "localName": "ten2",
            "tenantName": "tenant2"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 207 Response
    description: Multi-Status response with the status for each member local name request
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/tenantFabricAssociations/memberLocalName"
      method: POST
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "fabricName": "fabric1",
                "localName": "ten1",
                "tenantName": "tenant1"
              },
              {
                "fabricName": "fabric1",
                "localName": "ten2",
                "tenantName": "tenant2"
              }
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "fabricName": "fabric1",
                "localName": "ten1",
                "status": "success",
                "syncStatus": "notApplicable",
                "tenantName": "tenant1"
              },
              {
                "fabricName": "fabric1",
                "localName": "ten2",
                "message": "local name already in use",
                "status": "failed",
                "syncStatus": "outOfSync",
                "tenantName": "tenant2"
