                  {
                    "address": "10.1.1.1/24"
                  },
                  {
                    "address": "10.1.2.1/24"
                  }
                ],
                "importReadiness": {
                  "details": "network1 is ready for import",
                  "status": "ready"
                },
                "name": "network1",
                "networkType": "normal",
                "tenantName": "tenant1",
                "vrfName": "vrf1",
                "vrfTenantName": "tenant1"
              },
              {
                "gatewayAddresses": [
                  {
                    "address": "10.1.3.1/24"
                  }
                ],
                "importReadiness": {
                  "details": "network2 has already been imported. Re-import will fetch the latest configuration from the fabric.",
                  "status": "alreadyImported"
                },
                "name": "network2",
                "networkType": "normal",
                "tenantName": "tenant1",
                "vrfName": "vrf3",
                "vrfTenantName": "common"
              }
            ],
            "securityAssociations": [
              {
                "attach": true,
                "contractTenantName": "common",
                "dstGroupName": "sg2",
                "name": "sg1-sg2-ND-Contract2",
                "ndContractName": "ND-Contract2",
                "srcGroupName": "sg1"
              }
            ],
            "securityGroups": [
              {
                "mappedEpgCollection": [
                  {
                    "appProfileName": "appProfile1",
                    "name": "epg1",
                    "tenantName": "tenant1"
                  }
                ],
                "name": "sg1",
                "tenantName": "tenant1"
              },
              {
                "mappedEpgCollection": [
