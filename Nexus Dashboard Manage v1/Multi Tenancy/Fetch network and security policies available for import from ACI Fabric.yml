info:
  name: Fetch network and security policies available for import from ACI Fabric
  type: http
  seq: 1

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/actions/exportMemberTenantPolicies"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "tenantName": "",
        "memberFabricName": "",
        "filters": {
          "vrfNames": [],
          "networkNames": [],
          "includeSecurityPolicies": false
        },
        "epgMappingParameter": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/actions/exportMemberTenantPolicies"
      method: POST
