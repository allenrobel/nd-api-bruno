                    "tenantName": "tenant1"
                  }
                ],
                "name": "sg2",
                "tenantName": "tenant1"
              }
            ],
            "vrfs": [
              {
                "importReadiness": {
                  "details": "vrf1 is ready for import",
                  "status": "ready"
                },
                "name": "vrf1",
                "networkCount": 2,
                "tenantName": "tenant1"
              },
              {
                "importReadiness": {
                  "details": "vrf2 settings on the fabric are incompatible with ND policy",
                  "status": "notReady"
                },
                "name": "vrf2",
                "networkCount": 1,
                "tenantName": "tenant1"
              },
              {
                "importReadiness": {
                  "details": "vrf3 is ready for import",
                  "status": "ready"
                },
                "name": "vrf3",
                "networkCount": 1,
                "tenantName": "common"
              }
            ]
          }
