      type: query
      description: Interface type
      disabled: true
    - name: interfaceType
      value: tunnel
      type: query
      description: Interface type
      disabled: true
    - name: interfaceType
      value: peerlinkPortChannel
      type: query
      description: Interface type
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: podId
      value: ""
      type: query
      description: Identifier of the pod associated with the switch. Required for ACI fabrics.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

