          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "communityLists": [
              {
                "entries": [
                  {
                    "action": "permit",
                    "blackhole": false,
                    "communityNumbers": [
                      "100:1",
                      "200:2"
                    ],
                    "gracefulShutdown": false,
                    "internet": false,
                    "localAsn": false,
                    "noAdvertise": false,
                    "noExport": false,
                    "sequenceNumber": 10
                  }
                ],
                "name": "communityList1",
                "type": "standard"
              },
              {
                "entries": [
                  {
                    "action": "permit",
                    "communityNumberRegex": "11:22",
                    "sequenceNumber": 10
                  },
                  {
                    "action": "deny",
                    "communityNumberRegex": "11:23",
                    "sequenceNumber": 20
                  }
                ],
                "name": "communityList2",
                "type": "expanded"
              },
              {
                "entries": [
                  {
                    "action": "permit",
                    "blackhole": false,
                    "communityNumbers": [
                      "100:1",
                      "200:2"
                    ],
                    "gracefulShutdown": false,
                    "internet": false,
                    "localAsn": false,
                    "noAdvertise": false,
                    "noExport": false,
                    "sequenceNumber": 10
                  }
                ],
                "name": "communityList3",
                "tenantName": "tenantSales",
                "type": "standard"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "Successfully created extended community list communityList1",
                "name": "communityList1",
                "status": "success"
              },
              {
                "message": "Failed to create community list communityList2",
                "name": "communityList2",
                "status": "failed"
              },
              {
                "message": "Successfully created extended community list communityList3",
                "name": "tenantSales~communityList3",
                "status": "success"
              }
            ]
          }
