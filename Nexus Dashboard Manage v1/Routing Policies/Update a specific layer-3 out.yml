info:
  name: Update a specific layer-3 out
  type: http
  seq: 48
  tags:
    - Routing Policies

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/l3Outs/:l3OutName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: l3OutName
      value: ""
      type: path
      description: The name of the layer-3 out.
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket Id
      disabled: true
  body:
    type: json
    data: |-
      {
        "attach": true,
        "configuredFabrics": "fabric1",
        "connectivityDetails": {
          "links": [
            {
              "dot1qId": 200,
              "ipv6PrefixLength": 126,
              "mtu": 9216,
              "switch1Details": {
                "interfaceName": "Ethernet2/1.200",
                "ipv6Address": "2001:db8:10::1",
                "switchId": "FDO245206N8"
              },
              "switch2Details": {
                "interfaceName": "Ethernet2/2.200",
                "ipv6Address": "2001:db8:10::2",
                "switchId": "FDO245206N9"
              }
            }
          ],
          "routingInterfaceType": "subInterface"
        },
        "fabric1Name": "FabricC",
        "fabric2Name": "FabricD",
        "ipVersion": "ipv6",
        "name": "L3Out2",
        "routingDetails": {
          "fabric1StaticRoutes": [
            {
              "ipPrefix": "0::/0",
              "ipVersion": "ipv6",
              "nextHop": "2001:db8:10::2",
              "switchIds": [
                "FDO245206N8"
              ]
            }
          ],
          "routingProtocol": "static"
        },
        "vrf1Name": "VRF3",
        "vrf2Name": "VRF4"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

