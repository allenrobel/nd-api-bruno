info:
  name: Get details of an IPv6 prefix list
  type: http
  seq: 32
  tags:
    - Routing Policies

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/ipv6PrefixLists/:ipv6PrefixListName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: ipv6PrefixListName
      value: ""
      type: path
      description: IPv6 prefix list name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

