          type: path
          description: IPv6 prefix list name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "description": "Allows engineering server",
            "entries": [
              {
