info:
  name: Create access control lists
  type: http
  seq: 3
  tags:
    - Routing Policies

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/accessControlLists"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "accessControlLists": [
          {
            "entries": [
              {
                "action": "permit",
                "dst": "192.168.2.0/24",
                "icmpOption": "echo",
                "protocol": "icmp",
                "sequenceNumber": 10,
                "src": "192.168.1.0/24"
              },
              {
                "action": "permit",
                "dst": "192.168.4.0/24",
                "protocol": "tcp",
                "sequenceNumber": 20,
                "src": "192.168.3.0/24",
                "tcpOption": "established"
              },
              {
                "action": "permit",
                "dst": "192.168.6.0/24",
                "dstPort": "53",
                "dstPortAction": "equalTo",
                "protocol": "udp",
                "sequenceNumber": 30,
                "src": "192.168.5.0/24",
                "srcPort": "1024",
                "srcPortAction": "greaterThan"
              },
              {
                "action": "deny",
                "dst": "any",
                "protocol": "ip",
                "sequenceNumber": 40,
                "src": "any"
              }
            ],
            "name": "aclAdvanced",
            "type": "ipv4"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 207 Response (Create ACL with advanced options)
