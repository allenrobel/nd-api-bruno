    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "Successfully created access control list acl1",
                "name": "acl1",
                "status": "success"
              },
              {
                "message": "Access control list acl2 already exists",
                "name": "acl2",
                "status": "failed"
              },
              {
                "message": "Successfully created access control list tenant1~acl3",
                "name": "tenant1~acl3",
                "status": "success"
              }
