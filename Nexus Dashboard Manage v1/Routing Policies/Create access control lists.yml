                  {
                    "action": "permit",
                    "dst": "192.168.2.0/24",
                    "dstPortAction": "portRange",
                    "dstPortRangeEnd": "4000",
                    "dstPortRangeStart": "3000",
                    "protocol": "tcp",
                    "sequenceNumber": 10,
                    "src": "192.168.1.0/24",
                    "srcPortAction": "portRange",
                    "srcPortRangeEnd": "2000",
                    "srcPortRangeStart": "1000"
