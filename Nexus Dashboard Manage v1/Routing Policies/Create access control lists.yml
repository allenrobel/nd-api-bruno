                    "action": "deny",
                    "dst": "192.168.4.0/24",
                    "dstPort": "5000",
                    "dstPortAction": "lessThan",
                    "protocol": "udp",
                    "sequenceNumber": 20,
                    "src": "192.168.3.0/24",
                    "srcPort": "1024",
                    "srcPortAction": "greaterThan"
