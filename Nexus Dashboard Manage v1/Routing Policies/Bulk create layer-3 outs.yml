info:
  name: Bulk create layer-3 outs
  type: http
  seq: 45

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/l3Outs"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "l3Outs": [
          {
            "name": "",
            "attach": false,
            "fabric1Name": "",
            "fabric2Name": "",
            "vrf1Name": "",
            "vrf2Name": "",
            "tenant1Name": "",
            "tenant2Name": "",
            "configuredFabrics": "",
            "lastUpdateTimestamp": "",
            "ipVersion": "",
            "connectivityDetails": {},
            "routingDetails": {}
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Single success (Create multiple layer-3 outs)
    description: Create a layer-3 out.
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/l3Outs"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "l3Outs": [
              {
                "attach": true,
                "configuredFabrics": "both",
                "connectivityDetails": {
                  "links": [
                    {
                      "ipv4MaskLength": 30,
                      "mtu": 9216,
                      "switch1Details": {
                        "interfaceName": "Ethernet1/1",
                        "ipv4Address": "10.10.10.1",
                        "switchId": "FDO245206N6"
                      },
                      "switch2Details": {
                        "interfaceName": "Ethernet1/2",
                        "ipv4Address": "10.10.10.2",
                        "switchId": "FDO245206N7"
                      }
                    }
                  ],
                  "routingInterfaceType": "routed"
                },
                "fabric1Name": "FabricA",
                "fabric2Name": "FabricB",
                "ipVersion": "ipv4",
                "name": "L3Out1",
                "routingDetails": {
                  "fabric1Details": {
                    "ipv4PeeringDetails": {
                      "ipv4RouteMapIn": "routeMapIn1",
                      "ipv4RouteMapOut": "routeMapOut1"
                    },
                    "localAsn": "65001"
                  },
                  "fabric2Details": {
                    "asOverride": true,
                    "holdInterval": 200,
                    "ipv4PeeringDetails": {
                      "ipv4RouteMapIn": "routeMapIn2",
                      "ipv4RouteMapOut": "routeMapOut2"
                    },
                    "keepAliveInterval": 60,
                    "logNeighborChange": true
                  },
                  "routingProtocol": "bgp"
                },
                "vrf1Name": "VRF1",
                "vrf2Name": "VRF2"
              },
              {
                "attach": true,
                "configuredFabrics": "fabric1",
                "connectivityDetails": {
                  "links": [
                    {
                      "dot1qId": 200,
                      "ipv6PrefixLength": 126,
                      "mtu": 9216,
                      "switch1Details": {
                        "interfaceName": "Ethernet2/1.200",
                        "ipv6Address": "2001:db8:10::1",
                        "switchId": "FDO245206N8"
                      },
                      "switch2Details": {
                        "interfaceName": "Ethernet2/2.200",
                        "ipv6Address": "2001:db8:10::2",
                        "switchId": "FDO245206N9"
                      }
                    }
                  ],
                  "routingInterfaceType": "subInterface"
                },
                "fabric1Name": "FabricC",
                "fabric2Name": "FabricD",
                "ipVersion": "ipv6",
                "name": "L3Out2",
                "routingDetails": {
                  "fabric1StaticRoutes": [
                    {
                      "ipPrefix": "0::/0",
                      "ipVersion": "ipv6",
                      "nextHop": "2001:db8:10::2",
                      "switchIds": [
                        "FDO245206N8"
                      ]
                    }
                  ],
                  "routingProtocol": "static"
                },
                "vrf1Name": "VRF3",
                "vrf2Name": "VRF4"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "Layer-3 out created successfully",
                "name": "L3Out1",
                "status": "success"
              }
            ]
          }
