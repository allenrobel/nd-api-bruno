info:
  name: Update access control list
  type: http
  seq: 6
  tags:
    - Routing Policies

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/accessControlLists/:accessControlListName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: accessControlListName
      value: ""
      type: path
      description: Access control list name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "entries": [
          {
            "action": "permit",
            "dst": "192.168.2.0/24",
            "icmpOption": "echo",
            "protocol": "icmp",
            "sequenceNumber": 10,
            "src": "192.168.1.0/24"
          },
          {
            "action": "permit",
            "dst": "192.168.4.0/24",
            "protocol": "tcp",
            "sequenceNumber": 20,
            "src": "192.168.3.0/24",
            "tcpOption": "established"
          },
          {
            "action": "permit",
            "dst": "192.168.6.0/24",
            "dstPort": "53",
            "dstPortAction": "equalTo",
            "protocol": "udp",
            "sequenceNumber": 30,
            "src": "192.168.5.0/24",
            "srcPort": "1024",
            "srcPortAction": "greaterThan"
          },
          {
            "action": "deny",
            "dst": "any",
            "protocol": "ip",
            "sequenceNumber": 40,
            "src": "any"
          }
        ],
        "lastUpdateTimestamp": "2025-02-12T12:53:20Z",
        "name": "aclAdvanced",
        "type": "ipv4"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

