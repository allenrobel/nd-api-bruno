info:
  name: Create IPv6 prefix lists
  type: http
  seq: 30
  tags:
    - Routing Policies

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/ipv6PrefixLists"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "ipv6PrefixLists": [
          {
            "description": "Allows engineering server",
            "entries": [
              {
                "action": "permit",
                "mask": "ffff:ffff:f::",
                "maxLength": 64,
                "minLength": 48,
                "prefix": "2001:db8::/32",
                "sequenceNumber": 10
              },
              {
                "action": "permit",
                "exactLength": 64,
                "prefix": "2001:db8:1::/48",
                "sequenceNumber": 20
              }
            ],
            "name": "prefixList1"
          },
          {
            "description": "Denied subnet",
            "entries": [
              {
                "action": "deny",
                "maxLength": 64,
                "prefix": "2001:db8:2::/48",
                "sequenceNumber": 10
              }
            ],
            "name": "prefixList2"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

