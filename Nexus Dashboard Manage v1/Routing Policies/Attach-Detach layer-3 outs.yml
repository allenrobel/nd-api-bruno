info:
  name: Attach/Detach layer-3 outs
  type: http
  seq: 42

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/l3OutActions/attach"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "attachments": [
          {
            "name": "",
            "attach": false
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: AttachDetachL3Outs (exampleOne)
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/l3OutActions/attach"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "attachments": [
              {
                "attach": true,
                "name": "L3Out1"
              },
              {
                "attach": false,
                "name": "L3Out2"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "Layer-3 out attached successfully",
