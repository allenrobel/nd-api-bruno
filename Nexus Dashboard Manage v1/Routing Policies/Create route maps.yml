info:
  name: Create route maps
  type: http
  seq: 37

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/routeMaps"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "routeMaps": [
          {
            "name": "",
            "lastUpdateTimestamp": "",
            "entries": [
              {
                "sequenceNumber": 0,
                "action": "",
                "ruleEntries": []
              }
            ],
            "tenantName": ""
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 207 Response
    description: Multi-status response indicating individual results of route map creation.
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/routeMaps"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "routeMaps": [
              {
                "entries": [
                  {
                    "action": "permit",
                    "ruleEntries": [
                      {
                        "accessControlListName": "acl1",
                        "ruleType": "matchIpv4Acl"
                      },
                      {
                        "nextHopIpCollection": [
                          "10.10.10.1"
                        ],
                        "ruleType": "setIpv4NextHop"
                      }
                    ],
                    "sequenceNumber": 10
                  }
                ],
                "name": "MY-BGP-ROUTEMAP-1"
              },
              {
                "entries": [
                  {
                    "action": "deny",
                    "ruleEntries": [
                      {
                        "accessControlListName": "acl2",
                        "ruleType": "matchIpv6Acl"
                      }
                    ],
                    "sequenceNumber": 10
                  }
                ],
                "name": "MY-BGP-ROUTEMAP-2"
              },
              {
                "entries": [
                  {
                    "action": "deny",
                    "ruleEntries": [
                      {
                        "prefixListNames": [
                          "tenantSales~prefixList1",
                          "prefixList2"
                        ],
                        "ruleType": "matchIpv4PrefixList"
                      }
                    ],
                    "sequenceNumber": 10
                  }
                ],
                "name": "MY-BGP-ROUTEMAP-3",
                "tenantName": "tenantSales"
              }
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "Route map created successfully.",
                "name": "MY-BGP-ROUTEMAP-1",
                "status": "success"
              },
              {
                "message": "Route map already exists.",
                "name": "MY-BGP-ROUTEMAP-2",
                "status": "failed"
              },
              {
                "message": "Route map created successfully.",
                "name": "MY-BGP-ROUTEMAP-3",
                "status": "success"
              }
            ]
          }
