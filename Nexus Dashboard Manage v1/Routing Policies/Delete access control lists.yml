info:
  name: Delete access control lists
  type: http
  seq: 1
  tags:
    - Routing Policies

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/accessControlListActions/remove"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "accessControlListNames": [
          "acl1",
          "acl2",
          "tenant1~acl3",
          "tenant1~acl4",
          "aclPortRange",
          "aclAdvanced"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

