          description: IPv4 prefix list name
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "description": "Border router prefixes",
