info:
  name: Get details of an IPv4 prefix list
  type: http
  seq: 26

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/fabrics/:fabricName/ipv4PrefixLists/:ipv4PrefixListName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: ipv4PrefixListName
      value: ""
      type: path
      description: IPv4 prefix list name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

