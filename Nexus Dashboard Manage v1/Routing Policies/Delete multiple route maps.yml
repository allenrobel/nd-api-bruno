info:
  name: Delete multiple route maps
  type: http
  seq: 35

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/routeMapActions/remove"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "routeMapNames": []
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 207 Response (deleteRouteMaps)
    description: Multi-status response indicating individual results of removals.
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/routeMapActions/remove"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "routeMapNames": [
              "MY-BGP-ROUTEMAP-1",
              "MY-BGP-ROUTEMAP-2",
              "tenantSales~MY-BGP-ROUTEMAP-3"
            ]
          }
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "Route map removed successfully.",
                "name": "MY-BGP-ROUTEMAP-1",
                "status": "success"
              },
              {
                "message": "Route map not found.",
                "name": "MY-BGP-ROUTEMAP-2",
                "status": "failed"
              },
              {
                "message": "Route map removed successfully.",
                "name": "tenantSales~MY-BGP-ROUTEMAP-3",
                "status": "success"
              }
            ]
          }
