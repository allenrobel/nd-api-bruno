info:
  name: Get endpoint locator BGP configuration
  type: http
  seq: 4
  tags:
    - Endpoints

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/endpointLocator/actions/preview"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/endpointLocator/actions/preview"
      method: GET
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "items": [
              "router bgp 64519",
              "  neighbor 88.88.88.11",
              "    remote-as 64519",
              "    update-source loopback1",
              "    address-family l2vpn evpn",
              "      send-community",
              "      send-community extended",
              "      route-reflector-client",
              "      route-map epl-evpn-rt-2 out",
              "route-map epl-evpn-rt-2 permit 10",
              "  match evpn route-type 2"
            ],
            "summary": "Get Endpoint Locator configuration preview for a fabric"
