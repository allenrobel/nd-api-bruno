info:
  name: Enable endpoint locator
  type: http
  seq: 3
  tags:
    - Endpoints

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/fabrics/:fabricName/endpointLocator/actions/enable"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: ticketId
      value: ""
      type: query
      description: Change Control Ticket ID. This is mandatory if Change Control is enabled
      disabled: true
  body:
    type: json
    data: |-
      {
        "fabricType": "l2vpn",
        "nxApiMode": 1,
        "routeReflectors": [
          {
            "managementIpAddress": "172.29.160.141",
            "switchName": "s1"
          },
          {
            "managementIpAddress": "172.29.160.140",
            "switchName": "s2"
          }
        ],
        "skipSwitchConfiguration": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

