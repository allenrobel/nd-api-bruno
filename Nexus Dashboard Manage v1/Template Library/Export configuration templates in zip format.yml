info:
  name: Export configuration templates in zip format
  type: http
  seq: 1

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/configTemplateActions/exportAsZip"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "templateNames": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Bulk exported templates
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{managePath}}/configTemplateActions/exportAsZip"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "templateNames": [
              "Easy_Fabric",
              "int_mgmt",
              "VLAN_CONFIG_TEMPLATE"
            ]
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/zip
      body:
        type: text
        data: templates.zip
