info:
  name: List traffic analytics rule options
  type: http
  seq: 30
  tags:
    - Flow Analytics

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/traffic/rulesOptions"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: type
      value: switches
      type: query
      description: |
        Type of objects to list. 
        For each type, the filter parameter can be used to filter the results.
        These are the supported filter properties that can be used in the filter parameter for each type:
        - tenants: None
        - l3outs: tenant
        - switches: tenant, l3out
        - interfaces: tenant, l3out, switchId
    - name: type
      value: tenants
      type: query
      description: |
        Type of objects to list. 
        For each type, the filter parameter can be used to filter the results.
        These are the supported filter properties that can be used in the filter parameter for each type:
        - tenants: None
        - l3outs: tenant
        - switches: tenant, l3out
        - interfaces: tenant, l3out, switchId
      disabled: true
    - name: type
      value: l3outs
      type: query
      description: |
        Type of objects to list. 
        For each type, the filter parameter can be used to filter the results.
        These are the supported filter properties that can be used in the filter parameter for each type:
        - tenants: None
        - l3outs: tenant
        - switches: tenant, l3out
        - interfaces: tenant, l3out, switchId
      disabled: true
    - name: type
      value: interfaces
      type: query
      description: |
        Type of objects to list. 
        For each type, the filter parameter can be used to filter the results.
        These are the supported filter properties that can be used in the filter parameter for each type:
        - tenants: None
        - l3outs: tenant
        - switches: tenant, l3out
        - interfaces: tenant, l3out, switchId
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: isFabricInterconnect
      value: "false"
      type: query
      description: Returns the options specific to fabric interconnect if set to true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

