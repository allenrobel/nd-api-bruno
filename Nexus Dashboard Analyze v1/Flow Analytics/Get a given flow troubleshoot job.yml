info:
  name: Get a given flow troubleshoot job
  type: http
  seq: 25
  tags:
    - Flow Analytics

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/traffic/flows/troubleshootJobs/:jobId"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: jobId
      value: ""
      type: path
      description: The job ID
    - name: includeFailedNodes
      value: ""
      type: query
      description: Include list of failed nodes in the response
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

