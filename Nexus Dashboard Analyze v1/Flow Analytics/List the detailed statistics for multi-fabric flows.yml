info:
  name: List the detailed statistics for multi-fabric flows
  type: http
  seq: 5
  tags:
    - Flow Analytics

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/connectivity/multiFabricFlowDetails"
  params:
    - name: startDate
      value: ""
      type: query
      description: Start timestamp
    - name: endDate
      value: ""
      type: query
      description: End timestamp
    - name: sourceFabricName
      value: ""
      type: query
      description: The name of the source fabric of the flow.
    - name: sourceFabricFilter
      value: ""
      type: query
      description: Lucene format filter {srcIp,srcPort,ingressVrf,ingressVlan,dstIp,dstPort,egressVrf,egressVlan} - The flow filter for the source fabric.
    - name: destinationFabricName
      value: ""
      type: query
      description: The name of the destination fabric of the flow.
    - name: destinationFabricFilter
      value: ""
      type: query
      description: Lucene format filter {srcIp,srcPort,ingressVrf,ingressVlan,dstIp,dstPort,egressVrf,egressVlan} - The flow filter for the destination fabric.
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: includePaths
      value: ""
      type: query
      description: Include flow paths in the response.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

