      description: Name of the stats to be returned
      disabled: true
    - name: statisticName
      value: performanceMetrics
      type: query
      description: Name of the stats to be returned
      disabled: true
    - name: statisticName
      value: performanceScore
      type: query
      description: Name of the stats to be returned
      disabled: true
    - name: statisticName
      value: bytes
      type: query
      description: Name of the stats to be returned
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

