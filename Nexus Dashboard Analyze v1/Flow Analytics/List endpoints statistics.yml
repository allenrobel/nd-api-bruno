info:
  name: List endpoints statistics
  type: http
  seq: 20
  tags:
    - Flow Analytics

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/traffic/endpoints/statistics"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: granularity
      value: ""
      type: query
      description: Granularity of the values with respect to duration in minutes (m), hours (h) and days (d)
      disabled: true
    - name: role
      value: client
      type: query
      description: |
        Specifies the role of the endpoint in traffic flows to determine which statistics are returned:
        - service: Returns statistics for the endpoint when it's acting as a service
        - client: Returns statistics for the endpoint when it's acting as a client
        - any: Returns combined statistics for the endpoint in both client and service roles
    - name: role
      value: service
      type: query
      description: |
        Specifies the role of the endpoint in traffic flows to determine which statistics are returned:
        - service: Returns statistics for the endpoint when it's acting as a service
        - client: Returns statistics for the endpoint when it's acting as a client
        - any: Returns combined statistics for the endpoint in both client and service roles
      disabled: true
    - name: role
      value: any
      type: query
      description: |
        Specifies the role of the endpoint in traffic flows to determine which statistics are returned:
        - service: Returns statistics for the endpoint when it's acting as a service
        - client: Returns statistics for the endpoint when it's acting as a client
        - any: Returns combined statistics for the endpoint in both client and service roles
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

