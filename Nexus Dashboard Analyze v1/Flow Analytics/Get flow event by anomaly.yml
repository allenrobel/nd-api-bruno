  type: http
  seq: 1
  tags:
    - Flow Analytics

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/connectivity/flowEvents/details"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: anomalyId
      value: ""
      type: query
      description: Required identifier for the anomaly
    - name: startDate
      value: ""
      type: query
      description: Start timestamp
    - name: endDate
      value: ""
      type: query
      description: End timestamp
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

