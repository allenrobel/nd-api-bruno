info:
  name: Stop a flow troubleshoot job
  type: http
  seq: 28
  tags:
    - Flow Analytics

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/traffic/flows/troubleshootJobs/:jobId/stop"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: jobId
      value: ""
      type: path
      description: The job ID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

