info:
  name: Get flow rate trend
  type: http
  seq: 9
  tags:
    - Flow Analytics

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/flowStatistics/trends"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: granularity
      value: ""
      type: query
      description: Granularity of the values with respect to duration in minutes (m), hours (h) and days (d)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

