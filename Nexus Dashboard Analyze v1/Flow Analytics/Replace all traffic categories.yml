info:
  name: Replace all traffic categories
  type: http
  seq: 12
  tags:
    - Flow Analytics

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/traffic/categories"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "categories": [
          {
            "name": "Web",
            "fabricName": "DC-WEST",
            "portSelectors": [
              {
                "protocol": 6,
                "ports": [
                  "80",
                  "443"
                ]
              },
              {
                "protocol": 17,
                "ports": [
                  "100-200"
                ]
              }
            ]
          },
          {
            "name": "Storage",
            "fabricName": "DC-WEST",
            "portSelectors": [
              {
                "protocol": 6,
                "ports": [
                  "2049",
                  "111"
                ]
              }
            ]
          }
        ],
        "meta": {
          "counts": {
            "total": 2,
            "remaining": 0
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

