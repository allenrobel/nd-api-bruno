info:
  name: Create a Connectivity Analysis job
  type: http
  seq: 43
  tags:
    - Network Connectivity Resources

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/connectivityAnalysis/jobs"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "analysisOptions": [
          "Consistency Checker",
          "ELAM"
        ],
        "flowType": "FSV_VXLAN_L3_VNI",
        "srcIp": "10.4.0.1",
        "vrf": "default",
        "fabricName": "Topo3",
        "fabricType": "DCNM",
        "dstIp": "10.4.0.10",
        "dstVrf": "default",
        "jobName": "Topo3 01-08-2024 22:47:26",
        "executionType": "explorer"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

