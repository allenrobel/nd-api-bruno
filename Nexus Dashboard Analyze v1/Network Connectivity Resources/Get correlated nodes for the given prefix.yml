info:
  name: Get correlated nodes for the given prefix
  type: http
  seq: 26
  tags:
    - Network Connectivity Resources

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/connectivity/routes/rootCause/nodes"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: timestamp
      value: ""
      type: query
      description: Timestamp of the requested information
    - name: prefix
      value: ""
      type: query
      description: Deleted prefix IP
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: switchName
      value: ""
      type: query
      description: Name of the switch
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

