info:
  name: Get congestion scores across fabrics
  type: http
  seq: 1
  tags:
    - Network Connectivity Resources

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/congestion/details"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: switchName
      value: ""
      type: query
      description: Name of the switch
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: interfaceName
      value: ""
      type: query
      description: Name of the interface
      disabled: true
    - name: scope
      value: fabric
      type: query
      description: Get fabric/switch/interface level congestion score
      disabled: true
    - name: scope
      value: switch
      type: query
      description: Get fabric/switch/interface level congestion score
      disabled: true
    - name: scope
      value: interface
      type: query
      description: Get fabric/switch/interface level congestion score
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

