info:
  name: Get traffic trends for fabric(s)
  type: http
  seq: 55
  tags:
    - Network Connectivity Resources

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/externalTraffic/trends"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: granularity
      value: ""
      type: query
      description: Granularity of the values with respect to duration in minutes (m), hours (h) and days (d)
      disabled: true
    - name: timezoneOffset
      value: ""
      type: query
      description: Time zone offset
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

