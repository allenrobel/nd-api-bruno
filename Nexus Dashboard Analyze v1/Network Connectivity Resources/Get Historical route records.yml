  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/connectivity/routes/urib"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: switchName
      value: ""
      type: query
      description: Name of the switch
      disabled: true
    - name: routeType
      value: ipv4
      type: query
      description: Route type, v4 or v6
      disabled: true
    - name: routeType
      value: ipv6
      type: query
      description: Route type, v4 or v6
      disabled: true
    - name: routeSource
      value: history
      type: query
      description: Route source, history or latest
      disabled: true
    - name: routeSource
      value: latest
      type: query
      description: Route source, history or latest
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

