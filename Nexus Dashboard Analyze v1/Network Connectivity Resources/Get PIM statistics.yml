info:
  name: Get PIM statistics
  type: http
  seq: 18
  tags:
    - Network Connectivity Resources

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/connectivity/multicast/pimStats"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: switchName
      value: ""
      type: query
      description: Name of the switch
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

