info:
  name: Execute Switch-to-Switch OAM
  type: http
  seq: 47
  tags:
    - Network Connectivity Resources

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/connectivityAnalysis/oam/:fabricName/switchToSwitch"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "dstSwitchName": "leaf-102",
        "egressInterface": "all",
        "srcSwitchName": "leaf-101",
        "vrfName": "tenant-vrf-1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

