                    "multicastRoutingEnabled": true,
                    "fabricQuerierEnabled": false,
                    "reportSuppressionEnabled": true,
                    "v3ReportSuppressionEnabled": true,
                    "explicitHostTrackingEnabled": true,
                    "fastLeaveEnabled": false,
                    "linkLocalGroupSuppressionEnabled": true,
                    "optimisedFloodEnabled": false,
                    "anomalyScore": 0,
                    "statisticalCounters": [
                      {
                        "counterName": "numSrcGrp",
                        "counterNameLabel": "Number of Source Group",
                        "counterType": "",
                        "value": 0,
                        "trending": "flat"
                      },
                      {
                        "counterName": "numMcGrp",
                        "counterNameLabel": "Number of Multicast Group",
                        "counterType": "",
                        "value": 1,
                        "trending": "flat"
                      },
                      {
                        "counterName": "unknPktRcvd",
                        "counterNameLabel": "Unknown Packets Received",
                        "counterType": "error",
                        "value": 0,
                        "trending": "flat"
                      },
                      {
                        "counterName": "invQueryRcvd",
                        "counterNameLabel": "Invalid Query Received",
                        "counterType": "error",
                        "value": 0,
                        "trending": "flat"
                      },
                      {
                        "counterName": "verMisMatchRcvd",
                        "counterNameLabel": "IGMP Packets Received with Version Mismatch",
                        "counterType": "error",
                        "value": 4,
                        "trending": "flat"
                      },
                      {
                        "counterName": "numRtrIf",
                        "counterNameLabel": "Number of Mrouter Port",
                        "counterType": "",
                        "value": 1,
                        "trending": "flat"
                      },
                      {
