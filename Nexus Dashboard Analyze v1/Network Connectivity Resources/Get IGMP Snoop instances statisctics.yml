          {
            "switches": [
              {
                "fabricName": "DC-trex",
                "switchName": "nc-aci-trex-leaf01",
                "igmpSnoopingInstances": [
                  {
                    "sourceName": "igmpsnoop/bridgedom-[16252847]",
                    "adminState": "enabled",
                    "vrfName": "ctx1",
                    "bridgeDomainName": "bd3",
                    "tenantName": "tn1",
                    "bridgeDomainVnid": 16252847,
                    "vrfVnid": 2392066,
                    "querierIp": "50.4.0.1",
                    "controlFlag": "routing,eht,llg-supr,v12r-supr,v3r-supr,vpc",
                    "unknownMulticastAction": "flood",
                    "querierVersion": "v2",
                    "multicastRouterPorts": [
                      "vlan2(BD)"
