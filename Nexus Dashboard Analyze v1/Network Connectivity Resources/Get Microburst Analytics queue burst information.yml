info:
  name: Get Microburst Analytics queue burst information
  type: http
  seq: 4
  tags:
    - Network Connectivity Resources

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/connectivity/microburst/bursts"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: switchName
      value: ""
      type: query
      description: Name of the switch
    - name: interfaceName
      value: ""
      type: query
      description: Name of the interface
    - name: groupBy
      value: peak
      type: query
      description: Aggregation by Statistics Type
    - name: groupBy
      value: duration
      type: query
      description: Aggregation by Statistics Type
      disabled: true
    - name: queueName
      value: ""
      type: query
      description: Name of the queue in switch/interface
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

