info:
  name: Get the flow device details
  type: http
  seq: 40
  tags:
    - Network Connectivity Resources

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/connectivityAnalysis/flowDeviceDetails"
  params:
    - name: jobId
      value: ""
      type: query
      description: ID of the Connectivity Analysis job.
    - name: serialNumber
      value: ""
      type: query
      description: Serial number of the device to query.
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

