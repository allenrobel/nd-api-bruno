info:
  name: Bulk delete programmable reports settings
  type: http
  seq: 30
  tags:
    - Job and Report Management

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/programmableReports/settingActions/remove"
  body:
    type: json
    data: |-
      {
        "settingNames": [
          "performance_periodic",
          "invrep"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

