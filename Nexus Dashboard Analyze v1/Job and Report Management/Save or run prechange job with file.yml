info:
  name: Save or run prechange job with file
  type: http
  seq: 10
  tags:
    - Job and Report Management

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/jobs/prechangeAnalysis/file"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: multipart-form
    data:
      - name: data
        type: text
        value: '{"name":"test_pca","description":"description", "analysisSubmissionTime":"6","preChangeSnapshotUUID":"preChangeSnapshotUUID", "baseSnapshotId":"baseSnapshotId","submitterName":"submitterName", "fabricName":"DC-EAST-OFFLINE"}], "baseSnapshotId":"0e5604f9-2e0765d5-e6c3-3a3e-93e2-141c16ff7eb8"}'
      - name: file
        type: text
        value: prechange_analysis_1.json
      - name: qqfilename
        type: text
        value: prechange_analysis_1.json
      - name: qqtotalfilesize
        type: text
        value: "2048"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

