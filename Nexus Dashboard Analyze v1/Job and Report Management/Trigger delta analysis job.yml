info:
  name: Trigger delta analysis job
  type: http
  seq: 4
  tags:
    - Job and Report Management

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/jobs/deltaAnalysis"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "fabricName": "fabricName",
        "jobName": "jobName",
        "laterEpochUuid": "laterEpochUuid",
        "priorEpochUuid": "priorEpochUuid"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

