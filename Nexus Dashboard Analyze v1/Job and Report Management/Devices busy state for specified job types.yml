info:
  name: Devices busy state for specified job types
  type: http
  seq: 6
  tags:
    - Job and Report Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/jobs/devicesState"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: jobTypes
      value: ""
      type: query
      description: Comma-separated list of job types from jobTypes
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

