info:
  name: List conformance report statuses
  type: http
  seq: 13
  tags:
    - Compliance Conformance and Update Analysis

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/conformance/reports/statuses"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric. If more than one fabric is required, separate the names with commas.
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

