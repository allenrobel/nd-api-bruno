info:
  name: Get monthly scale reports summary
  type: http
  seq: 12
  tags:
    - Compliance Conformance and Update Analysis

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/conformance/reports/scale/summary"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric. If more than one fabric is required, separate the names with commas.
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

