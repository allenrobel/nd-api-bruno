      description: 3 to 18 month period over which the conformance details for the fabric are projected. FabricName is mandatory
      disabled: true
    - name: outlookPeriod
      value: "18"
      type: query
      description: 3 to 18 month period over which the conformance details for the fabric are projected. FabricName is mandatory
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: reportType
      value: hardware
      type: query
      description: Type of report
      disabled: true
    - name: reportType
      value: software
      type: query
      description: Type of report
      disabled: true
    - name: reportType
      value: overall
      type: query
      description: Type of report
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

