info:
  name: Get policy change tree
  type: http
  seq: 15
  tags:
    - Compliance Conformance and Update Analysis

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/deltaAnalysis/policyChangeTree"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: jobId
      value: ""
      type: query
      description: job id
      disabled: true
    - name: depth
      value: "1"
      type: query
      description: Maximum depth of the tree to return. Default is 1.
    - name: objectId
      value: ""
      type: query
      description: Unique identifier of the object to fetch.
      disabled: true
    - name: nodeId
      value: ""
      type: query
      description: Unique identifier of the policy change tree node to be fetched.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

