info:
  name: Get upgrade report by instance
  type: http
  seq: 30
  tags:
    - Compliance Conformance and Update Analysis

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/fabricSoftware/upgradeReports/:reportId/instances/:instanceId"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: reportId
      value: ""
      type: path
      description: Report id for upgrade analysis
    - name: instanceId
      value: ""
      type: path
      description: Instance id for a previous run of pre-validation check
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: summary
      value: ""
      type: query
      description: Get summarized pre-upgrade check results
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

