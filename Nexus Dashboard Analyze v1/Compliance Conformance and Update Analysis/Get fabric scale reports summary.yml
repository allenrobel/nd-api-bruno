info:
  name: Get fabric scale reports summary
  type: http
  seq: 7
  tags:
    - Compliance Conformance and Update Analysis

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/conformance/reports/scale/fabrics/summary"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric. If more than one fabric is required, separate the names with commas.
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

