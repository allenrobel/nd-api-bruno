info:
  name: List conformance details for fabric
  type: http
  seq: 4
  tags:
    - Compliance Conformance and Update Analysis

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/conformance/reports"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: outlookPeriod
      value: "3"
      type: query
      description: 3 to 18 month period over which the conformance details for the fabric are projected. FabricName is mandatory
    - name: outlookPeriod
      value: "6"
      type: query
      description: 3 to 18 month period over which the conformance details for the fabric are projected. FabricName is mandatory
      disabled: true
    - name: outlookPeriod
      value: "9"
      type: query
      description: 3 to 18 month period over which the conformance details for the fabric are projected. FabricName is mandatory
      disabled: true
    - name: outlookPeriod
      value: "12"
      type: query
      description: 3 to 18 month period over which the conformance details for the fabric are projected. FabricName is mandatory
      disabled: true
    - name: outlookPeriod
      value: "15"
      type: query
      description: 3 to 18 month period over which the conformance details for the fabric are projected. FabricName is mandatory
      disabled: true
    - name: outlookPeriod
      value: "18"
      type: query
      description: 3 to 18 month period over which the conformance details for the fabric are projected. FabricName is mandatory
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: includeModules
      value: ""
      type: query
      description: Device types to include in the conformance results
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

