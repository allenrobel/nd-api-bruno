info:
  name: Get resource-level delta analysis between two snapshots
  type: http
  seq: 21
  tags:
    - Compliance Conformance and Update Analysis

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/deltaAnalysis/resources"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: jobId
      value: ""
      type: query
      description: job id
      disabled: true
    - name: includeAcknowledged
      value: "false"
      type: query
      description: Should results include acknowledged anomalies and its resources. This is optional and defaults to `false` if not provided.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: default
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/deltaAnalysis/resources"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: jobId
          value: ""
          type: query
          description: job id
          disabled: true
        - name: includeAcknowledged
          value: "false"
          type: query
          description: Should results include acknowledged anomalies and its resources. This is optional and defaults to `false` if not provided.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "earlierSnapshotTimestamp": "2024-03-21T10:00:00Z",
            "laterSnapshotTimestamp": "2024-03-21T14:30:00Z",
            "resources": [
              {
                "healthy": {
                  "earlierCount": 3,
                  "laterCount": 4,
                  "newCount": 1,
                  "removedCount": 0,
                  "unchangedCount": 2
                },
                "resourceType": "tenant",
                "total": {
                  "earlierCount": 5,
                  "laterCount": 7,
                  "newCount": 3,
                  "removedCount": 1,
                  "unchangedCount": 4
                },
                "unhealthy": {
                  "earlierCount": 2,
                  "laterCount": 3,
                  "newCount": 2,
                  "removedCount": 1,
                  "unchangedCount": 2
                }
              }
            ]
          }
