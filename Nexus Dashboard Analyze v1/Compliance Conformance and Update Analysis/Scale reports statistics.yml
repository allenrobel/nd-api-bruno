      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: nodeName
      value: ""
      type: query
      description: Switch Name
      disabled: true
  auth: inherit

settings:
