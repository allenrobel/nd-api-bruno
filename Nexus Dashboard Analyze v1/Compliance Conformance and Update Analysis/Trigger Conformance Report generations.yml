info:
  name: Trigger Conformance Report generations
  type: http
  seq: 5
  tags:
    - Compliance Conformance and Update Analysis

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/conformance/reports"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "fabricNames": [
          "US-EAST"
        ],
        "reportType": "scale"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

