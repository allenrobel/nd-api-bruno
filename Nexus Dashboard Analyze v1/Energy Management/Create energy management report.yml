  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/energyManagement/reports"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "startDate": "2021-04-01T00:00:00.000+05:30",
        "endDate": "2021-04-30T23:59:59.000+05:30",
        "costUpdated": false,
        "fabricNames": [
          "fab1",
          "fab2"
        ]
      }
  auth: inherit

