info:
  name: Get top outlets
  type: http
  seq: 12
  tags:
    - Energy Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/energyManagement/topOutlets"
  params:
    - name: startDate
      value: ""
      type: query
      description: Start timestamp
    - name: endDate
      value: ""
      type: query
      description: End timestamp
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: basedOn
      value: ""
      type: query
      description: Limit the calculation by input from switch or PowerDistributionUnit
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

