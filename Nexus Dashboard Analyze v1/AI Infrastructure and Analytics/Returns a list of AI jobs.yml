info:
  name: Returns a list of AI jobs
  type: http
  seq: 11
  tags:
    - AI Infrastructure and Analytics

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/aiJobs"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: jobId
      value: ""
      type: query
      description: Unique identifier for the AI job
      disabled: true
    - name: stateCategory
      value: active
      type: query
      description: Category of AI job state to filter by (e.g., active, completed, terminated)
      disabled: true
    - name: stateCategory
      value: completed
      type: query
      description: Category of AI job state to filter by (e.g., active, completed, terminated)
      disabled: true
    - name: stateCategory
      value: terminated
      type: query
      description: Category of AI job state to filter by (e.g., active, completed, terminated)
      disabled: true
    - name: forceRefresh
      value: "false"
      type: query
      description: |
        When set to true, forces a synchronous refresh of AI jobs data directly from the source system (e.g., Slurm cluster) before returning the response. 
        This bypasses the cached data and retrieves the most up-to-date information.

        **Role Restriction:** This parameter is not available to users with the 'observer' role. If an observer attempts to use this parameter, the API will return HTTP 403 (Forbidden).
    - name: switchName
      value: ""
      type: query
      description: Name of the switch
      disabled: true
    - name: interfaceName
      value: ""
      type: query
      description: Name of the interface
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

