  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/aiResources/gpus/statistics"
  params:
    - name: gpuId
      value: ""
      type: query
      description: Unique identifier for GPU
    - name: serverName
      value: ""
      type: query
      description: Name of the server
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: granularity
      value: ""
      type: query
      description: Granularity of the values with respect to duration in minutes (m), hours (h) and days (d)
      disabled: true
  auth: inherit

settings:
