info:
  name: Get a summary of AI jobs
  type: http
  seq: 14
  tags:
    - AI Infrastructure and Analytics

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/aiJobs/summary"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: stateCategory
      value: active
      type: query
      description: Category of AI job state to filter by (e.g., active, completed, terminated)
      disabled: true
    - name: stateCategory
      value: completed
      type: query
      description: Category of AI job state to filter by (e.g., active, completed, terminated)
      disabled: true
    - name: stateCategory
      value: terminated
      type: query
      description: Category of AI job state to filter by (e.g., active, completed, terminated)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

