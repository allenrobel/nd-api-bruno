info:
  name: Get the summary of anomalies
  type: http
  seq: 20
  tags:
    - Anomalies and Advisories

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/anomalies/summary"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: nodeName
      value: ""
      type: query
      description: Name of the fabric node, limit the anomaly score to given nodeName
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: fabricStatus
      value: all
      type: query
      description: Filter by fabric status (online, offline, all)
      disabled: true
    - name: fabricStatus
      value: online
      type: query
      description: Filter by fabric status (online, offline, all)
      disabled: true
    - name: fabricStatus
      value: offline
      type: query
      description: Filter by fabric status (online, offline, all)
      disabled: true
    - name: featureSet
      value: fabricManagement
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: telemetry
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: orchestration
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: groupBy
      value: ""
      type: query
      description: Aggregate records by this field
      disabled: true
    - name: snapshotFabricName
      value: ""
      type: query
      description: Name of the snapshot fabric, used for demos or test purposes only
      disabled: true
    - name: preChangeAnalysis
      value: ""
      type: query
      description: Select objects that are related to pre-change analysis or not
      disabled: true
    - name: analysisDate
      value: ""
      type: query
      description: Analysis timestamp used for snapshot fabrics on compliance
      disabled: true
    - name: complianceReport
      value: ""
      type: query
      description: True if this anomaly is a compliance report anomaly, false otherwise
      disabled: true
    - name: statisticsName
      value: ""
      type: query
      description: Name of the resource an alert is on
      disabled: true
    - name: includeSystemAnomalies
      value: ""
      type: query
      description: If true, include system anomalies in the response. If false or not provided, do not return system anomalies in the response.
      disabled: true
    - name: includeSuspendedAlerts
      value: ""
      type: query
      description: If true, include suspended alerts in the response. If false or not provided, do not return suspended alerts in the response.
      disabled: true
    - name: includeAnomalies
      value: all
      type: query
      description: Filter by root cause categories (isRoot, isCorrelated anomaly fields)
      disabled: true
    - name: includeAnomalies
      value: root
      type: query
      description: Filter by root cause categories (isRoot, isCorrelated anomaly fields)
      disabled: true
    - name: includeAnomalies
      value: correlated
      type: query
      description: Filter by root cause categories (isRoot, isCorrelated anomaly fields)
      disabled: true
    - name: includeAnomalies
      value: uncorrelated
      type: query
      description: Filter by root cause categories (isRoot, isCorrelated anomaly fields)
      disabled: true
    - name: includeAnomalies
      value: rootAndUncorrelated
      type: query
      description: Filter by root cause categories (isRoot, isCorrelated anomaly fields)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

