info:
  name: Get advisory level summary
  type: http
  seq: 3
  tags:
    - Anomalies and Advisories

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/advisories/summary"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: nodeName
      value: ""
      type: query
      description: Name of the fabric node, limit the anomaly score to given nodeName
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: fabricStatus
      value: all
      type: query
      description: Filter by fabric status (online, offline, all)
      disabled: true
    - name: fabricStatus
      value: online
      type: query
      description: Filter by fabric status (online, offline, all)
      disabled: true
    - name: fabricStatus
      value: offline
      type: query
      description: Filter by fabric status (online, offline, all)
      disabled: true
    - name: groupBy
      value: ""
      type: query
      description: Aggregate records by this field
      disabled: true
    - name: featureSet
      value: fabricManagement
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: telemetry
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: orchestration
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: snapshotFabricName
      value: ""
      type: query
      description: Name of the snapshot fabric, used for demos or test purposes only
      disabled: true
    - name: includeSystemAdvisories
      value: ""
      type: query
      description: When true, System advisories for the Nexus Dashboard cluster will be included.
      disabled: true
    - name: includeSuspendedAlerts
      value: ""
      type: query
      description: If true, include suspended alerts in the response. If false or not provided, do not return suspended alerts in the response.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

