info:
  name: Get the affected objects for an anomaly
  type: http
  seq: 12
  tags:
    - Anomalies and Advisories

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/anomalies/affectedObjects"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: anomalyId
      value: ""
      type: query
      description: Required identifier for the anomaly
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: featureSet
      value: fabricManagement
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: telemetry
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: orchestration
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: preChangeAnalysis
      value: ""
      type: query
      description: Select objects that are related to pre-change analysis or not
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

