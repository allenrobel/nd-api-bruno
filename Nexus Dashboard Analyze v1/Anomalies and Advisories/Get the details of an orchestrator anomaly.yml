      description: Shorthand title of anomaly
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: nodeName
      value: ""
      type: query
      description: Name of the fabric node, limit the anomaly score to given nodeName
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: fabricStatus
      value: all
      type: query
      description: Filter by fabric status (online, offline, all)
      disabled: true
    - name: fabricStatus
      value: online
      type: query
      description: Filter by fabric status (online, offline, all)
      disabled: true
    - name: fabricStatus
      value: offline
      type: query
      description: Filter by fabric status (online, offline, all)
      disabled: true
  auth: inherit

