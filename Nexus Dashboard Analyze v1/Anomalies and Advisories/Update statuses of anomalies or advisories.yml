info:
  name: Update statuses of anomalies or advisories
  type: http
  seq: 5
  tags:
    - Anomalies and Advisories

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/alerts/actions/updateStatus"
  params:
    - name: featureSet
      value: fabricManagement
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: telemetry
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: orchestration
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "alertType": "anomaly",
        "alerts": [
          {
            "anomalies": [
              {
                "compositeKey": ""
              }
            ]
          }
        ],
        "properties": {
          "acknowledge": true,
          "assignee": "User1",
          "clear": true,
          "comment": "verified by User1",
          "delete": true,
          "tags": [
            "tag1",
            "tag2"
          ],
          "verificationStatus": "CLOSED"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

