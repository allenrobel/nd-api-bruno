info:
  name: Get alert categories and severities
  type: http
  seq: 4
  tags:
    - Anomalies and Advisories

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/alertMappings"
  params:
    - name: fabricType
      value: NX-OS
      type: query
      description: Type of the fabric
      disabled: true
    - name: fabricType
      value: ACI
      type: query
      description: Type of the fabric
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: category
      value: ""
      type: query
      description: Retrieves a list of titles for the given category
      disabled: true
    - name: mnemonicTitle
      value: ""
      type: query
      description: Retrieves a list of severities and affected objects for the given mnemonic title
      disabled: true
    - name: scope
      value: fabric
      type: query
      description: Scope of the alert mappings to be retrieved. Possible values are 'fabric' or 'system'
      disabled: true
    - name: scope
      value: system
      type: query
      description: Scope of the alert mappings to be retrieved. Possible values are 'fabric' or 'system'
      disabled: true
    - name: scope
      value: orchestration
      type: query
      description: Scope of the alert mappings to be retrieved. Possible values are 'fabric' or 'system'
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

