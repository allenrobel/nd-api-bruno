info:
  name: Get the root cause for this anomaly
  type: http
  seq: 19
  tags:
    - Anomalies and Advisories

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/anomalies/rootCauses/:rootCauseId"
  params:
    - name: anomalyId
      value: ""
      type: query
      description: Required identifier for the anomaly
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: featureSet
      value: fabricManagement
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: telemetry
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: featureSet
      value: orchestration
      type: query
      description: Which feature set version are we filtering for
      disabled: true
    - name: preChangeAnalysis
      value: ""
      type: query
      description: Select objects that are related to pre-change analysis or not
      disabled: true
    - name: rootCauseId
      value: ""
      type: path
      description: Id of root cause section that needs to be fetched
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

