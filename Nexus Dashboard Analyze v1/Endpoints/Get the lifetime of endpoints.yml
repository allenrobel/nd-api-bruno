      description: Address type
      disabled: true
    - name: address
      value: ""
      type: query
      description: IPv4/IPv6/MAC address
      disabled: true
    - name: vrf
      value: ""
      type: query
      description: Name of the VRF that the endpoints belong to
      disabled: true
    - name: switchName
      value: ""
      type: query
      description: Name of the switch that the endpoints are attached to
      disabled: true
    - name: l2Vni
      value: ""
      type: query
      description: Network ID
      disabled: true
    - name: tenantName
      value: ""
      type: query
      description: Name of the tenant associated with the endpoint
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

