info:
  name: Get the lifetime of endpoints
  type: http
  seq: 19
  tags:
    - Endpoints

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/endpointLocator/endpointLife"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: active
      value: ""
      type: query
      description: Flag to indicate that the endpoint is still active
      disabled: true
    - name: endpointId
      value: ""
      type: query
      description: Unique identifier of an endpoint
      disabled: true
    - name: addressType
      value: IPv4
      type: query
      description: Address type
      disabled: true
