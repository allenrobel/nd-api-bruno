      disabled: true
    - name: securityGroupTag
      value: ""
      type: query
      description: Security Group Tag
      disabled: true
    - name: addressType
      value: IPv4
      type: query
      description: Address type
      disabled: true
    - name: addressType
      value: IPv6
      type: query
      description: Address type
      disabled: true
    - name: addressType
      value: MAC
      type: query
      description: Address type
      disabled: true
    - name: isDualStack
      value: ""
      type: query
      description: Flag to indicate that this endpoint has both a IPv4 address and IPv6 address
      disabled: true
    - name: isVpcConnected
      value: ""
      type: query
      description: Flag to indicate that this endpoint is connected to both switches of a VPC pair
      disabled: true
    - name: mac
      value: ""
      type: query
      description: MAC address of the endpoints
      disabled: true
    - name: ip
      value: ""
      type: query
      description: IP address of the endpoints
      disabled: true
    - name: vrf
      value: ""
      type: query
      description: Name of the VRF that the endpoints belong to
      disabled: true
    - name: l3Vni
      value: ""
      type: query
      description: VRF ID. This is 0 if and only if the endpoint is MAC only
      disabled: true
    - name: vlanId
      value: ""
      type: query
      description: vlan that the endpoints belong to
      disabled: true
    - name: switchName
      value: ""
      type: query
      description: Name of the switch that the endpoints are attached to
      disabled: true
    - name: switchPort
      value: ""
      type: query
      description: Switch interface that the endpoints are attached to
      disabled: true
    - name: l2Vni
      value: ""
      type: query
      description: Network ID
      disabled: true
    - name: tenantName
      value: ""
      type: query
      description: Name of the tenant associated with the endpoint
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
  auth: inherit

settings:
