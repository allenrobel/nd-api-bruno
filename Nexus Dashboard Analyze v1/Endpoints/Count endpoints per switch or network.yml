info:
  name: Count endpoints per switch or network
  type: http
  seq: 16
  tags:
    - Endpoints

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/endpointLocator/count/grouped"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: type
      value: network
      type: query
      description: Group endpoints by switch, group endpoints by network, or group switches by network
      disabled: true
    - name: type
      value: switch
      type: query
      description: Group endpoints by switch, group endpoints by network, or group switches by network
      disabled: true
    - name: type
      value: switchGroup
