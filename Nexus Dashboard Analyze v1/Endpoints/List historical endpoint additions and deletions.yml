info:
  name: List historical endpoint additions and deletions
  type: http
  seq: 28
  tags:
    - Endpoints

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/endpointLocator/historicalEndpoints"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
