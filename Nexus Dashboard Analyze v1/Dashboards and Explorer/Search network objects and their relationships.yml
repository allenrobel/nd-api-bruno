      type: query
      description: What query string to search for network objects
    - name: snapshotId
      value: ""
      type: query
      description: Identifier of the snapshot to query against
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
