  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "analysisDate": "2025-01-22T20:38:22.269Z",
        "dstIdentifier": "uni/tn-Prod/ap-OnlineStore/epg-Database",
        "fabricName": "Prod",
        "healthStatus": "unhealthy",
