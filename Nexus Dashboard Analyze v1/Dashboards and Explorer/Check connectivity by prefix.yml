info:
  name: Check connectivity by prefix
  type: http
  seq: 12
  tags:
    - Dashboards and Explorer

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/explorer/actions/validatePrefixConnectivity"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "analysisDate": "2025-01-22T20:38:22.269Z",
        "dstPrefixIdentifier": "172.16.5.0/24|uni/tn-DMZ/ctx-ExternalVRF",
        "fabricName": "Prod",
        "healthStatus": "unhealthy",
        "queryString": "Can Internal Service Prefix talk to DMZ Prefix",
        "snapshotId": "123e4567-e89b-12d3-a456-426614174000",
        "srcPrefixIdentifier": "10.20.1.0/24|uni/tn-Services/ctx-SharedServicesVRF"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

