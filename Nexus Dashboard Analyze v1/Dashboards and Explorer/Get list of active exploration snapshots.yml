info:
  name: Get list of active exploration snapshots
  type: http
  seq: 13
  tags:
    - Dashboards and Explorer

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/explorer/activeSnapshots"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

