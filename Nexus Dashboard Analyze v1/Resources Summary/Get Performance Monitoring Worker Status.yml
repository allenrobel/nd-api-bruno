info:
  name: Get Performance Monitoring Worker Status
  type: http
  seq: 4
  tags:
    - Resources Summary

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/performance/status"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

