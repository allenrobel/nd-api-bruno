info:
  name: Get smart switch operational events timeline
  type: http
  seq: 3
  tags:
    - Resources Summary

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/dpu/smartSwitchesTimeline"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: duration
      value: last_15_minutes
      type: query
      description: The time duration for which to retrieve the status data.
    - name: duration
      value: last_30_minutes
      type: query
      description: The time duration for which to retrieve the status data.
      disabled: true
    - name: duration
      value: last_45_minutes
      type: query
      description: The time duration for which to retrieve the status data.
      disabled: true
    - name: duration
      value: last_1_hour
      type: query
      description: The time duration for which to retrieve the status data.
      disabled: true
    - name: duration
      value: last_1_week
      type: query
      description: The time duration for which to retrieve the status data.
      disabled: true
    - name: operationalStatus
      value: all
      type: query
      description: The operational status to filter the switches by, all for all switches, ok for fully operational switches, or powered_down for switches with at least one power down event within the duration.
    - name: operationalStatus
      value: ok
      type: query
      description: The operational status to filter the switches by, all for all switches, ok for fully operational switches, or powered_down for switches with at least one power down event within the duration.
      disabled: true
    - name: operationalStatus
      value: powered_down
      type: query
      description: The operational status to filter the switches by, all for all switches, ok for fully operational switches, or powered_down for switches with at least one power down event within the duration.
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
    - name: queryString
      value: ""
      type: query
      description: An advanced lucene query string to filter the results.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

