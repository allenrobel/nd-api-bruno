info:
  name: Get DPU Interfaces and Associations
  type: http
  seq: 2
  tags:
    - Resources Summary

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/dpu/details"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: switchId
      value: ""
      type: query
      description: Serial Number or Id of the switch/leaf
    - name: moduleNumber
      value: ""
      type: query
      description: Number identifying a specific hardware module
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

