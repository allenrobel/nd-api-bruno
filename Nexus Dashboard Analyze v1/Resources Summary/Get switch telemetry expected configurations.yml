info:
  name: Get switch telemetry expected configurations
  type: http
  seq: 8
  tags:
    - Resources Summary

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/telemetry/switchesConfig"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: switchId
      value: ""
      type: query
      description: Serial Number or Id of the switch/leaf
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

