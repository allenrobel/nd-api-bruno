          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "flowTelemetryConfiguration": "\nconfigure terminal\nip access-list telemetryipv4acl\n  statistics per-entry\n  33 permit ip 50.0.0.0/8 201.0.0.0/8\n  30 permit ip 50.0.0.0/8 50.0.0.0/8\n  32 permit ip 201.0.0.0/8 50.0.0.0/8\nipv6 access-list telemetryipv6acl\n  statistics per-entry\n  31 permit ipv6 50::/32 50::/32\n\nfeature analytics\nflow filter telemetryFP\n  ipv4 telemetryipv4acl\n  ipv6 telemetryipv6acl\nflow exporter telemetryExp_0\n  destination 199.2.1.244 \n  transport udp 5640\n  source loopback0\n  dscp 44\nflow exporter telemetryExp_1\n  destination 199.2.1.245 \n  transport udp 5640\n  source loopback0\n  dscp 44\nflow exporter telemetryExp_2\n  destination 199.2.1.249 \n  transport udp 5640\n  source loopback0\n  dscp 44\nflow record telemetryRec\n  match ip source address\n  match ip destination address\n  match ip protocol\n  match transport source-port\n  match transport destination-port\n  collect counter bytes\n  collect counter packets\nflow monitor telemetryMon\n  record telemetryRec\n  exporter-bucket-id 1 0 1365\n    exporter telemetryExp_0\n  exporter-bucket-id 2 1366 2730\n    exporter telemetryExp_1\n  exporter-bucket-id 3 2731 4095\n    exporter telemetryExp_2\nflow profile telemetryProf\n  collect interval 1000\n  source port 787\n\nflow system config\n  exporter-id 7\n  monitor telemetryMon input\n  profile telemetryProf\n  \n  filter telemetryFP\nend\n",
            "softwareConfiguration": "configure terminal\nfeature lldp\nfeature icam\nfeature telemetry\ntelemetry\n  destination-profile\n    use-vrf default\n    source-interface loopback0\n  destination-group 500\n    ip address 199.2.1.248 port 57500 protocol gRPC encoding GPB\n  sensor-group 520\n    data-source DME\n    path sys/pim depth unbounded\n  sensor-group 527\n    data-source DME\n    path sys/intf query-condition query-target=subtree",
            "validFlowTelemetryConfiguration": true,
            "validSoftwareConfiguration": true
          }
