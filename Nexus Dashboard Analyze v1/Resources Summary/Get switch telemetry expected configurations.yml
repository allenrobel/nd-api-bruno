  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/telemetry/switchesConfig"
      method: GET
      params:
        - name: fabricName
          value: ""
          type: query
          description: Name of the fabric
        - name: switchId
          value: ""
          type: query
