          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "filters": [
              {
                "applyBothDirections": true,
                "contractDn": "uni/tn-tenant1/brc-contract1",
                "dstPort": "6-10",
                "etherType": "ip",
