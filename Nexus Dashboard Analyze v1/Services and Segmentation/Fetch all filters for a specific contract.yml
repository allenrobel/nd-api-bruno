info:
  name: Fetch all filters for a specific contract
  type: http
  seq: 11
  tags:
    - Services and Segmentation

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/securitySegmentation/contracts/filters"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: contractDn
      value: ""
      type: query
      description: The dn of a contract
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

