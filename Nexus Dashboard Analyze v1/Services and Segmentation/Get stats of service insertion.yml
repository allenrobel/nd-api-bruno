info:
  name: Get stats of service insertion
  type: http
  seq: 2
  tags:
    - Services and Segmentation

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{analyzePath}}/fabrics/:fabricName/l4l7Services/insertions/:insertionName/stats"
  params:
    - name: insertionName
      value: ""
      type: path
      description: Service insertion name
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

