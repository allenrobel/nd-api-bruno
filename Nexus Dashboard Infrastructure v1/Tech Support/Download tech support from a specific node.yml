info:
  name: Download tech support from a specific node
  type: http
  seq: 4
  tags:
    - Tech Support

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/techsupport/:nodeName/:name"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: nodeName
      value: ""
      type: path
      description: Node Name
    - name: name
      value: ""
      type: path
      description: The name of the tech support collection
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/techsupport/:nodeName/:name"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: nodeName
          value: ""
          type: path
          description: Node Name
        - name: name
          value: ""
          type: path
          description: The name of the tech support collection
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/x-octet-stream or application/x-tar
      body:
        type: text
        data: SGVsbG8gV29ybGQh
  - name: 404 Response
