info:
  name: Get ND node configuration and status
  type: http
  seq: 2

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/cluster/nodes"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: nodeName
      value: ""
      type: query
      description: Filter nodes by node name.
      disabled: true
    - name: nodeRole
      value: ""
      type: query
      description: Filter nodes by role.
      disabled: true
    - name: nodeBootstrapState
      value: ""
      type: query
      description: Filter nodes by bootstrapping state.
      disabled: true
    - name: nodeOperationalState
      value: ""
      type: query
      description: Filter nodes by operational state.
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

