  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/cluster/nodes"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "dataNetwork": {
              "gateway": {
                "ipv4": "192.2.0.254"
              },
              "network": {
                "cidrv4": "192.2.0.108/24"
              },
              "vlanId": 102
            },
            "managementNetwork": {
              "gateway": {
                "ipv4": "172.20.43.1"
              },
              "network": {
                "cidrv4": "172.20.43.27/24"
              }
            },
            "name": "sjc15-3m6-03-sn5",
            "nodeController": {
              "authentication": {
                "password": "<hidden>",
                "user": "admin"
              },
              "serverAddress": "172.20.43.41"
            },
            "role": "secondary",
            "serialNumber": "WZP26150GQ7"
          }
    response:
