info:
  name: Add a secondary or standby node
  type: http
  seq: 3

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/cluster/nodes"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "bgpConfig": {
          "asn": 0,
          "peerList": [
            {
              "asn": 0,
              "peerIp": ""
            }
          ],
          "routerId": ""
        },
        "dataNetwork": {
          "network": {
            "cidrv4": "",
            "cidrv6": ""
          },
          "gateway": {
            "ipv4": "",
            "ipv6": ""
          },
          "vlanId": 0
        },
        "managementNetwork": {},
        "name": "",
        "nodeController": {
          "authentication": {
            "user": "",
            "password": ""
          },
          "serverAddress": ""
        },
        "role": "",
        "serialNumber": "",
        "uuid": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

