info:
  name: User login
  type: http
  seq: 3

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/login"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: oidcRedirect
      value: ""
      type: query
      description: Set to 'true' for OIDC redirect flow
  body:
    type: json
    data: |-
      {
        "domain": "local",
        "userName": "admin",
        "userPasswd": "lab-1324"
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

