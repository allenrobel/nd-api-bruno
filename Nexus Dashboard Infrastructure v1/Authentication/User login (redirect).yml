info:
  name: User login (redirect)
  type: http
  seq: 2
  tags:
    - Authentication

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/login"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: oidcRedirect
      value: "true"
      type: query
      description: Set to 'true' to initiate OIDC redirect flow
      disabled: true
    - name: oidcRedirect
      value: "false"
      type: query
      description: Set to 'true' to initiate OIDC redirect flow
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 302 Response
    description: Found
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/login"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: oidcRedirect
          value: "true"
          type: query
          description: Set to 'true' to initiate OIDC redirect flow
          disabled: true
        - name: oidcRedirect
          value: "false"
          type: query
          description: Set to 'true' to initiate OIDC redirect flow
          disabled: true
    response:
      status: 302
      statusText: Found
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/login"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: oidcRedirect
          value: "true"
          type: query
          description: Set to 'true' to initiate OIDC redirect flow
          disabled: true
        - name: oidcRedirect
          value: "false"
          type: query
          description: Set to 'true' to initiate OIDC redirect flow
          disabled: true
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Internal server error"
          }
