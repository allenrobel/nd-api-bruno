info:
  name: User login (redirect)
  type: http
  seq: 2

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/login"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: oidcRedirect
      value: ""
      type: query
      description: Set to 'true' to initiate OIDC redirect flow
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 302 Response
    description: Found
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/login"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: oidcRedirect
          value: ""
          type: query
          description: Set to 'true' to initiate OIDC redirect flow
    response:
      statusText: Found
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/login"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: oidcRedirect
          value: ""
          type: query
          description: Set to 'true' to initiate OIDC redirect flow
    response:
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Internal server error"
          }
