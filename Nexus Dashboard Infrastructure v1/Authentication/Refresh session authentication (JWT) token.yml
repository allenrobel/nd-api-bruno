          disabled: true
      body:
        type: json
        data: |-
          {
            "jwttoken": "eyJhbGciOiJSUzI1NiIsImtpZCI6ImI0Z2Mwb2R0Y2Q1eDlxeXVxcjFsMDdjdWViY2VrYm52IiwidHlwIjoiSldUIn0..."
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
