info:
  name: Refresh session authentication (JWT) token
  type: http
  seq: 6
  tags:
    - Authentication

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/refresh"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "jwttoken": "eyJhbGciOiJSUzI1NiIsImtpZCI6ImI0Z2Mwb2R0Y2Q1eDlxeXVxcjFsMDdjdWViY2VrYm52IiwidHlwIjoiSldUIn0..."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/refresh"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "jwttoken": "eyJhbGciOiJSUzI1NiIsImtpZCI6ImI0Z2Mwb2R0Y2Q1eDlxeXVxcjFsMDdjdWViY2VrYm52IiwidHlwIjoiSldUIn0..."
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "jwttoken": "eyJhbGciOiJSUzI1NiIsImtpZCI6ImI0Z2Mwb2R0Y2Q1eDlxeXVxcjFsMDdjdWViY2VrYm52IiwidHlwIjoiSldUIn0...",
            "rbac": "[{\"domain\":\"all\",\"rolesMap\":{\"super-admin\":{}}}]",
            "redirectURI": "https://idp.example.com/authorize?...",
            "statusCode": 200,
            "token": "eyJhbGciOiJSUzI1NiIsImtpZCI6ImI0Z2Mwb2R0Y2Q1eDlxeXVxcjFsMDdjdWViY2VrYm52IiwidHlwIjoiSldUIn0...",
            "username": "admin",
