info:
  name: Get available login domains
  type: http
  seq: 5

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/logindomains"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/logindomains"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "defaultDomain": "local",
            "domains": [
              {
                "name": "local",
                "passwordSettings": {
                  "minimumLength": 8,
                  "strongCheckEnabled": true
                },
                "realm": "Local"
              },
              {
                "name": "ldap-corp",
                "realm": "LDAP"
              }
            ]
          }
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/logindomains"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Unable to retrieve login domains"
          }
