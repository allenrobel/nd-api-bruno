info:
  name: Session logout functionality.
  type: http
  seq: 4

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/logout"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: timeout
      value: ""
      type: query
      description: Set to 'true' if logout is due to inactivity
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
