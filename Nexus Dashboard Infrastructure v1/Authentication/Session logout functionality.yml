info:
  name: Session logout functionality.
  type: http
  seq: 5
  tags:
    - Authentication

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/logout"
  headers:
    - name: Authcookie
      value: ""
      description: |
        Session JWT token passed as an HTTP header (for programmatic access).
        Use this header when cookies are not available.
        Either this header OR the AuthCookie cookie must be provided.
      disabled: true
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: timeout
      value: ""
      type: query
      description: Set to 'true' if logout is due to inactivity
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

