info:
  name: Change password for current user
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/changePassword"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "newPasswd": "********",
        "userPasswd": "********"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/changePassword"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "newPasswd": "********",
            "userPasswd": "********"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
