info:
  name: Update fabric management advanced settings
  type: http
  seq: 21
  tags:
    - System Settings

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/settings/fabricManagement/advancedSettings"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "fabricManagementAdvancedSettings": [
          {
            "name": "pm_DaysToKeep",
            "namespace": "core",
            "value": "88"
          },
          {
            "name": "alarm_cleared_DaysToKeep",
            "namespace": "core",
            "value": "66"
          },
          {
            "name": "db_history_interval",
            "namespace": "global",
            "value": "90"
          },
          {
            "name": "archived_versions_limit",
            "namespace": "lan",
            "value": "2"
          },
          {
            "name": "sanSensorDiscovery",
            "namespace": "san",
            "value": "false"
          },
          {
            "name": "pm_collectSanTemperature",
            "namespace": "san",
            "value": "false"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

