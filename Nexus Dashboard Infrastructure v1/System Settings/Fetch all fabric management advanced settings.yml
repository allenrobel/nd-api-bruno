info:
  name: Fetch all fabric management advanced settings
  type: http
  seq: 20
  tags:
    - System Settings

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/settings/fabricManagement/advancedSettings"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: showAll
      value: "false"
      type: query
      description: When true, returns all fabric management system properties. When false or omitted (default), returns properties based on the advanced TAC option setting.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/settings/fabricManagement/advancedSettings"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: showAll
          value: "false"
          type: query
          description: When true, returns all fabric management system properties. When false or omitted (default), returns properties based on the advanced TAC option setting.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "fabricManagementAdvancedSettings": [
              {
                "annotations": {
                  "Description": "Specify the PM Default Polling Interval",
                  "DisplayName": "Performance Default Polling Interval in minutes",
                  "Enum": "5,10,15",
                  "Section": "PM"
                },
                "metaProperties": {
                  "defaultValue": "5",
                  "max": "15",
                  "min": "5"
                },
                "name": "pm_DefaultPoll_Interval",
                "namespace": "core",
                "parameterType": "integer",
                "priority": "0400.000500",
                "value": "5",
                "version": "1"
              },
              {
                "annotations": {
                  "Description": "Specify Whether to Collect Environment Sensor Values for SAN Switches",
                  "DisplayName": "Collect Temperature for SAN Switches",
                  "IsInternal": true,
                  "IsMandatory": false,
                  "IsShow": "san.pm_sanSensorDiscovery == true",
                  "Section": "PM"
                },
                "customerVisible": true,
                "metaProperties": {
                  "defaultValue": "false"
                },
                "name": "pm_collectSanTemperature",
                "namespace": "san",
                "parameterType": "boolean",
                "priority": "0400.000320",
                "value": "false",
                "version": "3"
              }
            ]
          }
