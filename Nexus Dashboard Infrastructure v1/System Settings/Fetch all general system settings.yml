info:
  name: Fetch all general system settings
  type: http
  seq: 28
  tags:
    - System Settings

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/settings/general"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/settings/general"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "advancedSettings": {
              "displayAdvancedSettingsForTAC": true,
              "fabricSnapshotCreation": false
            },
            "auditLogs": {
              "enableAuditRecordStream": true,
              "maxAuditRecord": 1000,
              "maxAuditRecordRetention": 5,
              "remoteStreamingServers": [
                "Splunk1",
                "Splunk2"
              ]
            },
            "emails": {
              "emails": [
                {
                  "emailServerType": "SMTP",
                  "name": "PrimarySMTPServer",
                  "smtpAuth": {
                    "enabled": true,
                    "username": "smtpuser"
                  },
                  "smtpHost": "10.10.10.10",
                  "smtpPort": 587,
                  "sourceEmail": "noreply@example.com"
                }
              ],
              "enableIntersight": true,
              "intersightAccountName": "customer_account"
            },
            "listStreamSystemAnomalies": [
              {
                "anomalies": [
                  "Critical",
                  "Major"
                ],
                "remoteStreamingServer": "Syslog1"
              }
            ],
            "logServers": [
              {
                "host": "10.10.10.10",
                "index": "splunk_index",
                "name": "SplunkServer1",
                "port": 8089,
                "protocol": "HTTPS",
                "serverType": "splunk",
                "token": "splunk_token"
              },
              {
                "cacert": "CA certificate",
                "host": "10.10.10.10",
                "name": "SyslogServer1",
                "port": 514,
                "protocol": "TCP",
                "serverType": "syslog",
                "severity": "info",
                "tls": false
              }
            ],
            "messageBusConfigurations": [
              {
                "ip": "192.168.1.100",
                "mode": "unsecured",
                "name": "KafkaConfig1",
                "port": 9092,
                "topic": "Topic1"
              }
            ]
          }
