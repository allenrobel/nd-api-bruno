info:
  name: Fetch log server system settings
  type: http
  seq: 36
  tags:
    - System Settings

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/settings/general/logServer"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/settings/general/logServer"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "logServerSettings": [
              {
                "host": "10.10.10.10",
                "index": "splunk_index",
                "name": "SplunkServer1",
                "port": 8089,
                "protocol": "HTTPS",
                "serverType": "splunk",
                "token": "splunk_token"
              },
              {
                "cacert": "CA certificate",
                "host": "10.10.10.10",
                "name": "SyslogServer1",
                "port": 514,
                "protocol": "TCP",
                "serverType": "syslog",
                "severity": "info",
                "tls": false
              }
            ]
          }
