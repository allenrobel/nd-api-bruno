info:
  name: Get device connection state to Intersight
  type: http
  seq: 7
  tags:
    - System Settings

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/intersight/connection"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

