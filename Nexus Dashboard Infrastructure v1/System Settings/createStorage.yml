  type: http
  seq: 15

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/remoteStorage"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: acceptHostKey
      value: ""
      type: query
      description: |
        For scp or sftp storage, accept the host key even if none was provided in payload.
      disabled: true
  body:
    type: json
    data: "{}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

