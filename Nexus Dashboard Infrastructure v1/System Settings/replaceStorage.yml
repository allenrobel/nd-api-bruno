info:
  name: replaceStorage
  type: http
  seq: 18

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/remoteStorage/:name"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: name
      value: ""
      type: path
      description: Remote storage to get
    - name: acceptHostKey
      value: ""
      type: query
      description: |
        For scp or sftp storage, accept the host key even if none was provided in payload.
      disabled: true
  body:
    type: json
    data: "{}"
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

