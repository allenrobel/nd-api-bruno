info:
  name: Create a remote storage
  type: http
  seq: 15
  tags:
    - System Settings

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/remoteStorage"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: acceptHostKey
      value: "false"
      type: query
      description: |
        For scp or sftp storage, accept the host key even if none was provided in payload.
  body:
    type: json
    data: |-
      {
        "alertThreshold": 90,
        "description": "nfs in building 1",
        "hostname": "192.168.100.100",
        "limit": "500Gi",
        "name": "nfs-server",
        "path": "/exports/datastore",
        "port": 2049,
        "readWrite": true,
        "type": "nfs"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

