info:
  name: Get user roles by domain and fabric
  type: http
  seq: 36

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/myRoles"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/myRoles"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "renderedRoles": [
              {
                "category": "fabric",
                "clusterName": "NDCluster1",
                "isLocal": true,
                "name": "fabric1",
                "roles": [
                  "fabric-admin",
                  "approver"
                ]
              }
            ],
            "securityDomains": [
              {
                "name": "all",
                "roles": [
                  "fabric-admin",
                  "approver"
                ]
              },
              {
                "name": "domain1",
                "roles": [
                  "fabric-admin",
                  "approver",
                  "observer"
                ]
              },
              {
                "name": "domain2",
                "roles": [
                  "fabric-admin",
                  "approver",
                  "support-engineer"
                ]
              }
            ],
            "tenantDomain": "DevOps"
          }
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/myRoles"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Internal Server Error",
            "description": "The server encountered an unexpected condition that prevented it from fulfilling the request.",
            "code": 500
          }
