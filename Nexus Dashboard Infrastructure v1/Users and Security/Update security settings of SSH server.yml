info:
  name: Update security settings of SSH server
  type: http
  seq: 42

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/security/sshConfig"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "allowedSubnets": [],
        "cryptoConfig": {
          "data": {
            "ciphers": [],
            "hostKeyAlgorithms": [],
            "kexAlgorithms": [],
            "macs": []
          },
          "management": {}
        },
        "enabled": false,
        "idleTimeout": 0,
        "supportedCrypto": {}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

