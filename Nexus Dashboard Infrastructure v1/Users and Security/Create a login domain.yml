info:
  name: Create a login domain
  type: http
  seq: 16
  tags:
    - Users and Security

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/aaa/loginDomains"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "description": "Single Provider LDAP AD Group Payload",
        "domain": "LDAPWithADGroup",
        "realm": "LDAP",
        "servers": {
          "ldap": {
            "adGroup": {
              "Configured AD Group": {
                "domains": {
                  "all": {
                    "roles": [
                      "Observer"
                    ]
                  }
                }
              }
            },
            "option": "LDAPGroupMap",
            "providers": {
              "1.2.3.4": {
                "attribute": "Configured attribute",
                "baseDN": "Configured BaseDN",
                "bindDN": "Configured BindDN",
                "description": "LDAP Provider",
                "filterDN": "(sAMAccountName={username})",
                "key": "XXXXXXXXXX",
                "monitor": false,
                "monitorPassword": "",
                "monitorUsername": "",
                "port": 389,
                "priority": 0,
                "retries": 5,
                "sslCert": "",
                "sslEnabled": false,
                "sslStrictnessLevel": "Strict",
                "timeout": 50
              }
            }
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

