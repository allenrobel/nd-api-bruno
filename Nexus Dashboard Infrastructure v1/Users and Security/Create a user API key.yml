info:
  name: Create a user API key
  type: http
  seq: 2
  tags:
    - Users and Security

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/aaa/apiKeys"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "annotations": {
          "k1": "v1",
          "k2": "v2"
        },
        "apiKeyName": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

