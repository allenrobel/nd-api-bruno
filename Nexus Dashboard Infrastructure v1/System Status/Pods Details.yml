info:
  name: Pods Details.
  type: http
  seq: 7

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/systemResources/pods"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: nodeName
      value: ""
      type: query
      description: Node Name
      disabled: true
    - name: namespace
      value: ""
      type: query
      description: Filter pods by namespace.
      disabled: true
    - name: podName
      value: ""
      type: query
      description: Filter specific pod by name.
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

