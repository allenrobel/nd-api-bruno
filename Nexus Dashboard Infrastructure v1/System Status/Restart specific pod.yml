info:
  name: Restart specific pod
  type: http
  seq: 3
  tags:
    - System Status

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/systemResources/actions/restart"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: namespace
      value: ""
      type: query
      description: Filter pods by namespace.
      disabled: true
    - name: podName
      value: ""
      type: query
      description: Filter specific pod by name.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

