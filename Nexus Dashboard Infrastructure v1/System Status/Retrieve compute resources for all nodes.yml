info:
  name: Retrieve compute resources for all nodes
  type: http
  seq: 5

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/systemResources/nodes/compute"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: nodeName
      value: ""
      type: query
      description: Node Name
      disabled: true
    - name: timeRangeDuration
      value: ""
      type: query
      description: |
        Resoure usage over a time range. Prefer to use timeRange query rather  than pulling via separate instant queries.
      disabled: true
    - name: timeRangeStep
      value: ""
      type: query
      description: |
        The step parameter defines how many data points are returned from the time range query.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

