info:
  name: Get cluster health configuration
  type: http
  seq: 1
  tags:
    - System Status

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/clusterhealth/config"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

