info:
  name: Import smart license RUM report
  type: http
  seq: 10

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/license/smartImport"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "file": ""
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Import failed (Valid XML import (shortened))
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/license/smartImport"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          {
            "file": "<smartLicense>... </smartLicense>\n"
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "clientRequestId": null,
            "resultId": "ERROR",
            "resultMessage": "Problem importing data, please use valid xml response file",
