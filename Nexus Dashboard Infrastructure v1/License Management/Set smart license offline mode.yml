info:
  name: Set smart license offline mode
  type: http
  seq: 4
  tags:
    - License Management

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/license/offlineMode"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "enable": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

