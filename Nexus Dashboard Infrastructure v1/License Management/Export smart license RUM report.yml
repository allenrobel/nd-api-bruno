info:
  name: Export smart license RUM report
  type: http
  seq: 9
  tags:
    - License Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/license/smartExport"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Example smart license RUM report
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/license/smartExport"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/xml
      body:
        type: xml
        data: |
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?><smartLicense><smartLicenseTrustRequest>...<smartLicenseTrustRequest></smartLicense>
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/license/smartExport"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Bad Request",
            "description": "The server could not understand the request due to incorrect syntax.",
            "code": 400
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/license/smartExport"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Unauthorized",
            "description": "Indicates that the request requires user authentication information.",
            "code": 401
          }
  - name: 403 Response
    description: Forbidden
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/license/smartExport"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Forbidden",
            "description": "The client does not have access rights to the content.",
            "code": 403
          }
  - name: Export failed
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/license/smartExport"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Agent unconfigured"
          }
