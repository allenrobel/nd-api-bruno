info:
  name: Import firmware
  type: http
  seq: 4
  tags:
    - System Software

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/systemSoftware/firmwares"
  params:
    - name: systemFirmwareImportType
      value: upload
      type: query
      description: Import firmware type.
      disabled: true
    - name: systemFirmwareImportType
      value: download
      type: query
      description: Import firmware type.
      disabled: true
    - name: systemFirmwareImportType
      value: remote
      type: query
      description: Import firmware type.
      disabled: true
  body:
    type: json
    data: |-
      {
        "remoteFile": "/shared/nd-dk9.4.0.1.iso",
        "remoteServerName": "rtpScp"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

