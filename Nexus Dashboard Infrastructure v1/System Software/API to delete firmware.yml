info:
  name: API to delete firmware
  type: http
  seq: 2

http:
  method: DELETE
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/systemSoftware/firmwares"
  params:
    - name: firmwareName
      value: ""
      type: query
      description: Filter firmware by name.
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

