info:
  name: API to get SMUs (Software Maintenance Upgrades).
  type: http
  seq: 13

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/systemSoftware/smus"
  params:
    - name: filter
      value: ""
      type: query
      description: |
        Filter SMUs by activation state. active: Show activated SMU package. inactive: Show inactive SMU packages. all: Show all SMU packages.
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

