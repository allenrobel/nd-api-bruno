    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/systemSoftware/firmwares"
      method: POST
      params:
        - name: systemFirmwareImportType
          value: ""
          type: query
          description: Import firmware type.
      body:
        type: json
        data: |-
          {
            "download": {
              "url": "http://192.168.1.100/nd-dk9-4.0.0.1.iso"
            }
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: fc1e277f-7caf-4081-8627-3796ced10be0
