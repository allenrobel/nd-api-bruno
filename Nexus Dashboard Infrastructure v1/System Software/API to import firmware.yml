info:
  name: API to import firmware
  type: http
  seq: 4

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/systemSoftware/firmwares"
  params:
    - name: systemFirmwareImportType
      value: ""
      type: query
      description: Import firmware type.
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

