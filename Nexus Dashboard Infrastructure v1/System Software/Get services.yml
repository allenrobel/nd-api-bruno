info:
  name: Get services.
  type: http
  seq: 9

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/systemSoftware/services"
  params:
    - name: serviceName
      value: ""
      type: query
      description: Filter service by name.
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

