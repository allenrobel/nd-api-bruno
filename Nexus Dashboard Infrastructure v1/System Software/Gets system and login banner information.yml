info:
  name: Gets system and login banner information
  type: http
  seq: 1

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/about"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/about"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "buildVersion": "4.2.0.78",
            "preLoginBanner": "Welcome to Nexus Dashboard. Unauthorized access is prohibited.",
            "productName": "Nexus Dashboard",
            "productVersion": "4.2(1)"
          }
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/about"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
    response:
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Internal server error"
          }
