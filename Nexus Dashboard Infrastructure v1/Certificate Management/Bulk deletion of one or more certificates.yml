info:
  name: Bulk deletion of one or more certificates
  type: http
  seq: 5

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/security/certificates/actions/remove"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      [
        {
          "attachedSubjects": [],
          "certificateDetail": "",
          "certificateName": "",
          "certificateType": "",
          "expiresOn": "",
          "ips": [],
          "status": "",
          "statusMessage": "",
          "updateTime": "",
          "version": 0
        }
      ]
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 207 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/security/certificates/actions/remove"
      method: POST
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
      body:
        type: json
        data: |-
          [
            {
              "certificateName": "test.pem"
            },
            {
              "certificateName": "test1.crt"
            }
          ]
    response:
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "certificateMetadata": [
              {
                "certificateName": "test.pem",
                "certificateType": "fabric",
                "status": "success",
                "statusMessage": "Deleted"
              },
              {
                "certificateName": "nxos.pem",
                "certificateType": "fabric",
                "status": "failed",
                "statusMessage": "Certificate in use, not deleted"
