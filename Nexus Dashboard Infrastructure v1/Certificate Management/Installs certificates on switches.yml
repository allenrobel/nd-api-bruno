          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "switchPostResponses": [
              {
                "certificateName": "server_cert1.pem",
                "response": "installed",
                "status": "success",
                "switchIpAddress": "10.10.1.1",
                "switchName": "switch1"
              },
              {
                "certificateName": "server_cert2.pem",
                "response": "SSH Host Key mismatch",
