info:
  name: Installs certificates on switches
  type: http
  seq: 3
  tags:
    - Certificate Management

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/security/certificates/actions/installCertificates"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "certificateType": "fabric",
        "password": "changeme123!",
        "switchCertificates": [
          {
            "certificateName": "server_cert.pem",
            "switchName": "switch1"
          },
          {
            "certificateName": "server_cert2.pem",
            "switchName": "switch2"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

