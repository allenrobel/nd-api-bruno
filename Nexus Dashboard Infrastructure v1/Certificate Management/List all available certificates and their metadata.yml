info:
  name: List all available certificates and their metadata
  type: http
  seq: 1
  tags:
    - Certificate Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/security/certificates"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: certificateType
      value: ca
      type: query
      description: Certificate type
      disabled: true
    - name: certificateType
      value: system
      type: query
      description: Certificate type
      disabled: true
    - name: certificateType
      value: fabric
      type: query
      description: Certificate type
      disabled: true
    - name: attachedType
      value: ""
      type: query
      description: Attached feature or switch name type
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/security/certificates"
      method: GET
