          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "certificateMetadata": [
              {
                "attachedSubjects": [
                  "bootstrapServer"
                ],
                "certificateName": "test.pem",
                "certificateType": "system",
                "expiresOn": "2024-08-01T06:00:54.04949812Z"
              },
              {
                "attachedSubjects": [
                  "webServer"
                ],
                "certificateName": "test1.crt",
                "certificateType": "system",
