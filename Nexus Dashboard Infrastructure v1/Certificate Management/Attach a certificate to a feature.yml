info:
  name: Attach a certificate to a feature.
  type: http
  seq: 24
  tags:
    - Certificate Management

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/security/features/:featureName/certificates/:certificateName"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: featureName
      value: ""
      type: path
      description: Name of the feature to query
    - name: certificateName
      value: ""
      type: path
      description: Name of the certificate to query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

