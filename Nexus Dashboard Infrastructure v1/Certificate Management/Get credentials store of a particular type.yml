info:
  name: Get credentials store of a particular type
  type: http
  seq: 12

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/security/credentialsStores/:pathStoreType"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: pathStoreType
      value: ""
      type: path
      description: Credentials Store type
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

