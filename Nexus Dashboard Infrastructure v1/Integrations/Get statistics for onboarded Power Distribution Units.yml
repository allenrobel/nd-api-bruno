info:
  name: Get statistics for onboarded Power Distribution Units
  type: http
  seq: 67

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/pduStatistics"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: serialNumber
      value: ""
      type: query
      description: Serial number of the Power Distribution Unit we want statistics for
    - name: statisticName
      value: ""
      type: query
      description: Name of the statistics to be returned, comma separated list of statistics
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: sort
      value: ""
      type: query
      description: Sort the records by the declared fields in either ascending (default) or descending (:desc) order
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

