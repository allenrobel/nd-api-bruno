  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/openshift/instance/:integrationId/pods"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: integrationId
      value: ""
      type: path
      description: Id of the Integration, Id format is {type}-{ip} or {type}-{name}
    - name: start
      value: ""
      type: query
      description: start Index of List
      disabled: true
    - name: end
      value: ""
      type: query
      description: end Index of List
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

