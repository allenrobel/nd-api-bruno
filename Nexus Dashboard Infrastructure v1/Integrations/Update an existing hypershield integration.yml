info:
  name: Update an existing hypershield integration
  type: http
  seq: 19
  tags:
    - Integrations

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/hypershield/:integrationId/actions/modify"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: integrationId
      value: ""
      type: path
      description: Id of the Integration, Id format is {type}-{ip} or {type}-{name}
  body:
    type: json
    data: |-
      {
        "apiToken": "eyJraWQiOiIw...",
        "associatedFabrics": [
          "fabric1",
          "fabric2"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

