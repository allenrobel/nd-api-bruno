info:
  name: Update IPAM integration
  type: http
  seq: 25
  tags:
    - Integrations

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/ipam/:integrationId"
  params:
    - name: integrationId
      value: ""
      type: path
      description: ID of the IPAM integration, format is ipam-{ip}
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "integrationName": "d30-ipam1",
        "ip": "192.168.1.10",
        "username": "admin",
        "password": "secretpass",
        "pollInterval": 15
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

