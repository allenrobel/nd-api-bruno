  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/ipam/:integrationId/ipScopes"
  params:
    - name: integrationId
      value: ""
      type: path
      description: ID of the IPAM integration, format is ipam-{ip}
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: Sort the records by the declared fields in either ascending (default) or descending (:desc) order
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: ipScopeType
      value: ""
      type: query
      description: Whether to fetch matched or conflicting IP scopes
      disabled: true
    - name: onDemand
      value: ""
      type: query
      description: Whether to fetch fresh data from the IPAM server
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

