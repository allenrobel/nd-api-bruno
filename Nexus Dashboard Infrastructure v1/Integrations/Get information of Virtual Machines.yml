info:
  name: Get information of Virtual Machines
  type: http
  seq: 77

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/vCenter/virtualMachines"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
      disabled: true
    - name: switchId
      value: ""
      type: query
      description: Serial Number or Id of the switch/leaf
      disabled: true
    - name: securityGroupId
      value: ""
      type: query
      description: Security Group ID query parameter
      disabled: true
    - name: granularity
      value: ""
      type: query
      description: |
        Granularity of the VM response:
        - vm: Aggregate all links for a VM into a single row
        - vmInterface: One row per switch/interface attachment (default)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

