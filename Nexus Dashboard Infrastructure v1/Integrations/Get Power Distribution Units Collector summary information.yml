info:
  name: Get Power Distribution Units Collector summary information
  type: http
  seq: 66
  tags:
    - Integrations

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/pduCollectors/:integrationId/summary"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: integrationId
      value: ""
      type: path
      description: Id of the Integration
    - name: sort
      value: ""
      type: query
      description: |
        Sort the records by the declared fields in either ascending (default) or descending (:desc) order
        Ascending order by default: "field1"
        Specific order for one field: "field1:asc" or "field1:desc"
        Specific order with multiple fields: "field1:asc,field2:desc"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

