info:
  name: Modify existing AppDynamic Integration
  type: http
  seq: 10

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/integrations/appdynamics/:integrationId"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: integrationId
      value: ""
      type: path
      description: Id of the Integration
  body:
    type: json
    data: |-
      {
        "integrationName": "",
        "integrationId": "",
        "ip": "",
        "port": "",
        "associatedFabrics": [],
        "username": "",
        "password": "",
        "account": "",
        "isSecure": false,
        "useProxy": false,
        "status": "",
        "lastActiveDate": "",
        "type": ""
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

