info:
  name: Create a new Slackapp integration
  type: http
  seq: 68
  tags:
    - Integrations

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/slackapp"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: dryRun
      value: ""
      type: query
      description: Validates the request without creating the integration
      disabled: true
  body:
    type: json
    data: |-
      {
        "disableSlackIntegration": false,
        "integrationName": "Slack App",
        "lastUpdateDate": "2024-08-04 12:00:00+00:00",
        "slackAppId": "slack-app-id",
        "slackAppLevelToken": "slack-token",
        "slackBotUserOauthToken": "slack-bot-token",
        "slackChannelsRbacConfig": {
          "C09BZ3U7MTL": {
            "ndSecurityDomains": [
              "sd1"
            ],
            "ndTenantDomain": "coke"
          },
          "C09CK5CFTUJ": {
            "ndSecurityDomains": [
              "sd2",
              "sd3"
            ],
            "ndTenantDomain": "td2"
          }
        },
        "status": "active"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

