info:
  name: Create a new Slackapp integration
  type: http
  seq: 68

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/integrations/slackapp"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: dryRun
      value: ""
      type: query
      description: Validates the request without creating the integration
  body:
    type: json
    data: "{}"
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

