info:
  name: Export IP allocations
  type: http
  seq: 29
  tags:
    - Integrations

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/ipam/:integrationId/ipAllocationActions/export"
  params:
    - name: integrationId
      value: ""
      type: path
      description: ID of the IPAM integration, format is ipam-{ip}
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "networkView": "default",
        "subnet": "192.168.1.0/24",
        "vrfName": "vrf1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

