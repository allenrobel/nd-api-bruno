info:
  name: Export IP scopes
  type: http
  seq: 31
  tags:
    - Integrations

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/ipam/:integrationId/ipScopeActions/export"
  params:
    - name: integrationId
      value: ""
      type: path
      description: ID of the IPAM integration, format is ipam-{ip}
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "ipScopeType": "matched"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

