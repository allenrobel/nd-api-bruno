info:
  name: Export DHCP stats
  type: http
  seq: 28

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/integrations/ipam/:integrationId/dhcpStatsActions/export"
  params:
    - name: integrationId
      value: ""
      type: path
      description: ID of the IPAM integration, format is ipam-{ip}
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "endTimestamp": 0,
        "networkView": "",
        "startTimestamp": 0,
        "subnet": ""
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

