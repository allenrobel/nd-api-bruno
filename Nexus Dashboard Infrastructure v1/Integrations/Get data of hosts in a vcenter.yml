info:
  name: Get data of hosts in a vcenter
  type: http
  seq: 82
  tags:
    - Integrations

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/vCenter/:integrationId/hosts"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: integrationId
      value: ""
      type: path
      description: Id of the Integration, Id format is {type}-{ip} or {type}-{name}
    - name: hostName
      value: ""
      type: query
      description: Compute's host name
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

