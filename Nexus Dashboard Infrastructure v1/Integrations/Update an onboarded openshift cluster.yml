info:
  name: Update an onboarded openshift cluster
  type: http
  seq: 50
  tags:
    - Integrations

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/integrations/openshift/instance/:integrationId"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: integrationId
      value: ""
      type: path
      description: Id of the Integration, Id format is {type}-{ip} or {type}-{name}
  body:
    type: json
    data: |-
      {
        "clientCert": "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSURCVENDQWUyZ0F3SUJ",
        "clusterCert": "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSURCVENDQWUyZ0F3SUJ",
        "host": "1.1.1.1",
        "integrationName": "ocp-1",
        "managed": "managed",
        "orchType": "openShift",
        "port": 6443,
        "tlsServerName": "api.example1.cluster.local",
        "userName": "ndocpuser"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

