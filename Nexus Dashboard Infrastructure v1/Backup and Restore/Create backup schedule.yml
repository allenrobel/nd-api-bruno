info:
  name: Create backup schedule
  type: http
  seq: 8
  tags:
    - Backup and Restore

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/backups/schedules"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "encryptionKey": "test12345",
        "frequency": 1,
        "name": "daily",
        "remoteLocation": "storage224",
        "startTime": "2024-11-25 14:32:23.550000+00:00",
        "type": "configOnly"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

