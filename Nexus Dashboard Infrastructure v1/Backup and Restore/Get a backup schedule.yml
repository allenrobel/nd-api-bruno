  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/backups/schedules/:name"
      method: GET
      params:
        - name: clusterName
          value: ""
          type: query
          description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
          disabled: true
        - name: name
          value: ""
          type: path
          description: Schedule to get
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "encryptionKey": "test12345",
            "frequency": 7,
            "name": "daily",
            "path": "/tmp",
            "remoteLocation": "storage224",
            "startTime": "2024-11-25 14:32:23.550000+00:00",
            "type": "configOnly",
            "user": "admin"
