info:
  name: Get a backup schedule
  type: http
  seq: 10
  tags:
    - Backup and Restore

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/backups/schedules/:name"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
    - name: name
      value: ""
      type: path
      description: Schedule to get
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

