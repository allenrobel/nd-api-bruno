info:
  name: Create new backup
  type: http
  seq: 2
  tags:
    - Backup and Restore

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/backups"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "destination": "sftp-server",
        "encryptionKey": "mykey12345",
        "name": "mybackup1",
        "type": "configOnly"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

