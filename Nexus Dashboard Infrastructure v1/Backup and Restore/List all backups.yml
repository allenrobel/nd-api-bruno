info:
  name: List all backups
  type: http
  seq: 1
  tags:
    - Backup and Restore

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/backups"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

