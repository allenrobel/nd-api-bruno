info:
  name: Create a Tenant Domain
  type: http
  seq: 2
  tags:
    - Multi Tenancy

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/tenantDomains"
  params:
    - name: clusterName
      value: ""
      type: query
      description: Name of the target Nexus Dashboard cluster to execute this API, in a multi-cluster deployment
      disabled: true
  body:
    type: json
    data: |-
      {
        "description": "DevOps domain",
        "name": "DevOpsDomain",
        "tenantNames": [
          "DevOpsNX",
          "DevOpsACI"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

