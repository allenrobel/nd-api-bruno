info:
  name: Modify an onboarded cluster
  type: http
  seq: 5
  tags:
    - Multi-Cluster Connectivity

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{infraPath}}/clusters/:name"
  params:
    - name: name
      value: ""
      type: path
      description: name of the cluster
  body:
    type: json
    data: |-
      {
        "spec": {
          "aci": {
            "licenseTier": "premier",
            "orchestration": {
              "status": "enabled"
            },
            "securityDomain": "all",
            "telemetry": {
              "epg": "uni/tn-mgmt/mgmtp-default/inb-default",
              "network": "inband",
              "status": "enabled",
              "streamingProtocol": "ipv4"
            },
            "verifyCA": false
          },
          "credentials": {
            "loginDomain": "DefaultAuth",
            "password": "Q2lzY29pbnMzOTY1IQ==",
            "user": "admin"
          },
          "location": {
            "latitude": 10.2,
            "longitude": 10.1
          },
          "name": "ins15-apic1",
          "onboardUrl": "10.195.219.153:443",
          "reRegister": false
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

