info:
  name: Delete APIC data
  type: http
  seq: 1
  tags:
    - APIC API Proxy

http:
  method: DELETE
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/apics/:clusterName/:apicPath"
  params:
    - name: clusterName
      value: ""
      type: path
      description: APIC cluster name
    - name: apicPath
      value: ""
      type: path
      description: APIC DELETE URL
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

