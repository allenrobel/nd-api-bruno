info:
  name: Post APIC data
  type: http
  seq: 3
  tags:
    - APIC API Proxy

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/apics/:clusterName/:apicPath"
  params:
    - name: clusterName
      value: ""
      type: path
      description: APIC cluster name
    - name: apicPath
      value: ""
      type: path
      description: APIC POST URL
  body:
    type: json
    data: |-
      {
        "fvTenant": {
          "attributes": {
            "dn": "uni/tn-nd-tenant1",
            "name": "nd-tenant1",
            "rn": "tn-nd-tenant1",
            "status": "created"
          },
          "children": []
        }
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

