info:
  name: Create VRF(s)
  type: http
  seq: 27
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/vrfs"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "vrfs": [
          {
            "fabricName": "MCF",
            "serviceVrfTemplateName": "",
            "vlanId": 1001,
            "vrfExtensionTemplateName": "Default_VRF_Extension_Universal",
            "vrfId": 50001,
            "vrfName": "MyVRF_50001",
            "vrfTemplateConfig": {
              "asn": "",
              "disableRtAuto": "false",
              "ipv6LinkLocalFlag": "true",
              "maxBgpPaths": "1",
              "maxIbgpPaths": "2",
              "mtu": "9216",
              "nveId": "1",
              "routeTargetExport": "",
              "routeTargetExportEvpn": "",
              "routeTargetImport": "",
              "routeTargetImportEvpn": "65100:1000,65101:2000,65102:3000",
              "tag": "12345",
              "vrfDescription": "",
              "vrfIntfDescription": "",
              "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
              "vrfVlanId": "1001",
              "vrfVlanName": ""
            },
            "vrfTemplateName": "Default_VRF_Universal",
            "vrfType": "userDefined"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Single success (Custom VRF)
    description: Create one VRF
    request:
