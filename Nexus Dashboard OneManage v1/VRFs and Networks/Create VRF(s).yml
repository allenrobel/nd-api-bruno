          {
            "vrfs": [
              {
                "fabricName": "MCF",
                "serviceVrfTemplateName": "",
                "vlanId": 1001,
                "vrfExtensionTemplateName": "Default_VRF_Extension_Universal",
                "vrfId": 50001,
                "vrfName": "MyVRF_50001",
                "vrfTemplateConfig": {
                  "asn": "",
                  "disableRtAuto": "false",
                  "ipv6LinkLocalFlag": "true",
                  "maxBgpPaths": "1",
                  "maxIbgpPaths": "2",
                  "mtu": "9216",
                  "nveId": "1",
                  "routeTargetExport": "",
                  "routeTargetExportEvpn": "",
                  "routeTargetImport": "",
                  "routeTargetImportEvpn": "65100:1000,65101:2000,65102:3000",
                  "tag": "12345",
                  "vrfDescription": "",
                  "vrfIntfDescription": "",
                  "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
                  "vrfVlanId": "1001",
                  "vrfVlanName": ""
                },
                "vrfTemplateName": "Default_VRF_Universal",
                "vrfType": "userDefined"
              }
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "status": "success",
                "vrfId": 50000,
                "vrfName": "MyVRF_50000"
              }
            ]
          }
  - name: Single success (VXLAN VRF)
    description: Create one VRF
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/vrfs"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "vrfs": [
              {
                "coreData": {
                  "evpnRouteTargetExport": [
                    "65000:1002"
                  ],
                  "evpnRouteTargetImport": [
                    "65000:1002"
                  ],
                  "ipv6LinkLocal": true,
                  "maxBgpPaths": 1,
                  "maxIbgpPaths": 2,
                  "mtu": 9216,
                  "routeTargetExport": [
                    "65000:1001"
                  ],
                  "routeTargetImport": [
                    "65000:1001"
                  ],
                  "routingTag": 12345,
                  "v6VrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
                  "vrfDescription": "VXLAN VRF for Production",
                  "vrfInterfaceDescription": "Interface for VLAN 1000",
                  "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
                  "vrfVlanName": "VLAN1000"
                },
                "fabricData": {
                  "advertiseDefaultRoute": true,
                  "advertiseHostRoute": false,
                  "asn": "1234",
                  "configureStaticDefaultRoute": true,
                  "disableRtAuto": false,
                  "netflow": true,
                  "netflowMonitor": "Netflow_123",
                  "trmData": {
                    "ipv4Trm": true,
                    "l3VniMulticastGroup": "239.1.1.1",
                    "mvpnRouteTargetExport": [
                      "65000:100"
                    ],
                    "mvpnRouteTargetImport": [
                      "65000:100"
                    ],
                    "trmOnBgw": false,
                    "v4MulticastGroup": "224.1.0.0/4",
                    "v4RpAbsent": false,
                    "v4RpAddress": "10.1.0.1",
                    "v4RpExternal": false
                  }
                },
                "fabricName": "MCF",
                "vlanId": 1000,
                "vrfId": 50000,
                "vrfName": "MyVRF_50000",
                "vrfType": "vxlan"
              }
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "status": "success",
                "vrfId": 50000,
                "vrfName": "MyVRF_50000"
              }
            ]
          }
