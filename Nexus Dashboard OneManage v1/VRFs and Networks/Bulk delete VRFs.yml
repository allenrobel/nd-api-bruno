info:
  name: Bulk delete VRFs
  type: http
  seq: 20
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/vrfActions/remove"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "vrfNames": [
          "vrf1",
          "vrf2"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

