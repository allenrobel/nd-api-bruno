info:
  name: Attach/detach networks
  type: http
  seq: 7
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/networkAttachments"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "attachments": [
          {
            "attach": true,
            "extraConfig": "interface Ethernet1/1\n  description part of MyNetwork_30000\n",
            "interfaces": [
              {
                "interfaceRange": "Ethernet1/10",
                "mode": "trunk",
                "nativeVlan": false,
                "switchName": "v1-leaf2"
              },
              {
                "interfaceRange": "Ethernet1/11",
                "mode": "trunk",
                "nativeVlan": false,
                "switchName": "v1-leaf2"
              }
            ],
            "networkName": "MyNetwork_30000",
            "switchId": "9CWJXKE3ZOL",
            "vlanId": 2300
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

