            "networkNames": [
              "MyNetwork_30001",
              "MyNetwork_30002"
            ],
            "switchIds": [
              "99X70W9ORI1"
            ]
          }
    response:
      status: 202
      statusText: Accepted
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "Deployment of network(s) has been initiated successfully"
