          vxlanfabric1,MyVRF_50000,50000,vxlan,2000,Production VRF for VXLAN,Interface for Production VRF,MyNetwork_2000,9216,12345,FABRIC-RMAP-REDIST-SUBNET,FABRIC-RMAP-REDIST-SUBNET,1,2,true,false,"65000:1001;65001:1002","65000:1001;65001:1002","65000:2001;65001:2002","65000:2001;65001:2002",false,true,true,a3f5b6,3,true,MyNetwork_Netflow_123,239.1.1.1,false,false,false,10.1.0.1,224.1.0.0/4,"65000:100;65001:200","65000:100;65001:200",enforcedPermit,18
