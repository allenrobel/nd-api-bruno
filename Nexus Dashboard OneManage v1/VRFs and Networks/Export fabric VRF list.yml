info:
  name: Export fabric VRF list
  type: http
  seq: 17
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/vrfActions/export"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "vrfNames": [
          "MyVRF_50000",
          "MyVRF_60000"
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: When there are multiple types of VRFs in the fabric, the response will be a zip file containing multiple csv files for each type of VRF
    description: |
      When there are multiple types of VRFs in the fabric, the response will be a zip file containing multiple csv files for each type of VRF.  Each csv file will be named as 'vrfs_<vrfType>_<fabricName>_<timestamp>.csv', e.g., 'vrfs_vxlan_fab1_20251031211500000.csv' for vxlan type VRFs
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/vrfActions/export"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "vrfNames": [
              "MyVRF_50000",
              "MyVRF_60000"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/zip
      body:
        type: text
        data: <binary data representation of a zip file>
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/vrfActions/export"
      method: POST
      params:
