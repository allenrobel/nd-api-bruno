info:
  name: Export VRF attachments via CSV
  type: http
  seq: 22
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/vrfAttachments/export"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "switchIds": [
          "9UA832KA3LO",
          "9YVKXMATL9J"
        ],
        "vrfNames": [
          "MyVRF_50000",
          "MyVRF_50001"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/vrfAttachments/export"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "switchIds": [
              "9UA832KA3LO",
              "9YVKXMATL9J"
            ],
            "vrfNames": [
              "MyVRF_50000",
              "MyVRF_50001"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          vrfName,switchName,switchId,status,attach,clusterName,errorMessage,extensionValues,extraConfig,instanceValues,peerSwitchId,showVlan,vlanId,switchRole
          MyVRF_50000,v1-bgw3,9EK6FGYK6G6,pending,true,cluster-191,,,,"{""loopbackId"":10,""loopbackIpv4Address"":""7.7.1.1""}",,true,2000,borderGateway
