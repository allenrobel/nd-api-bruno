info:
  name: Preview pending network configuration
  type: http
  seq: 4
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkActions/preview"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "networkNames": [
          "MyNetwork_30001",
          "MyNetwork_30002"
        ],
        "switchIds": [
          "99X70W9ORI1"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: PreviewMultipleNetworks (exampleOne)
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkActions/preview"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "networkNames": [
              "MyNetwork_30001",
              "MyNetwork_30002"
            ],
            "switchIds": [
              "99X70W9ORI1"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "attachments": [
              {
                "displayName": "MyNetwork_30001",
                "fabricName": "Fabric1",
                "networkName": "MyNetwork_30001",
                "pendingConfigs": [
                  "configure profile MyVRF_50001",
                  "  vlan 2001",
                  "    vn-segment 50001",
                  "    name VLAN2001",
                  "  vrf context myvrf_50001",
                  "    vni 50001",
                  "    rd auto",
                  "    address-family ipv4 unicast",
                  "      route-target both auto",
                  "      route-target both auto evpn",
                  "    address-family ipv6 unicast",
                  "  interface Vlan2001",
                  "    vrf member myvrf_50001",
                  "    no shutdown",
                  "    ip address 192.168.20.1/24",
                  "    ipv6 address 2001:db8:20::1/64",
                  "    hsrp version 2",
                  "    hsrp 1",
                  "      priority 120",
                  "      ip 192.168.20.254",
                  "      ipv6 2001:db8:20::254"
                ],
                "status": "pending",
                "switchId": "99X70W9ORI1"
              },
              {
                "displayName": "MyNetwork_30002",
                "fabricName": "Fabric1",
                "networkName": "MyNetwork_30002",
                "pendingConfigs": [
                  "configure profile MyVRF_50001",
                  "  vlan 2001",
                  "    vn-segment 50001",
                  "    name VLAN2001",
                  "  vrf context myvrf_50001",
                  "    vni 50001",
                  "    rd auto",
                  "    address-family ipv4 unicast",
                  "      route-target both auto",
                  "      route-target both auto evpn",
                  "    address-family ipv6 unicast",
                  "  interface Vlan2001",
                  "    vrf member myvrf_50001",
                  "    no shutdown",
                  "    ip address 192.168.20.2/24",
                  "    ipv6 address 2001:db8:20::2/64",
                  "    hsrp version 2",
                  "    hsrp 1",
                  "      priority 110",
                  "      ip 192.168.20.254",
                  "      ipv6 2001:db8:20::254"
                ],
                "status": "pending",
                "switchId": "98AM4PTG8V0"
              }
            ]
          }
