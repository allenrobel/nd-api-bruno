info:
  name: List network attachments
  type: http
  seq: 9
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkAttachments/query"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: sort
      value: ""
      type: query
      description: Sort the records by the declared fields in either ascending (default) or descending (:desc) order
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: isConsolidated
      value: "false"
      type: query
      description: When true, returns interface ranges (e.g., 'Ethernet1/1-5'). When false, returns individual interface names (e.g., 'Ethernet1/1').
    - name: showExtraConfig
      value: "true"
      type: query
      description: When set to false, extraConfig field will not be returned in the response.
  body:
    type: json
    data: |-
      {
        "networkNames": [
          "MyNetwork_30001",
          "MyNetwork_30002"
        ],
        "switchIds": [
          "99X70W9ORI1"
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

