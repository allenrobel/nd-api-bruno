  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networks/:networkName"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: networkName
      value: ""
      type: path
      description: Then name of the network
  body:
    type: json
    data: |-
      {
        "displayName": "MyNetwork_30000",
        "fabricName": "MCF",
        "networkExtensionTemplateName": "Default_Network_Extension_Universal",
        "networkId": 30000,
        "networkName": "MyNetwork_30000",
        "networkTemplateConfig": {
          "dsvniExtComListName": "",
          "dsvniExtComSeqNum": "",
          "dsvniRouteMapName": "",
          "dsvniRouteMapSeqNum": "",
          "flagSet": "",
          "gatewayIpAddress": "192.168.1.254/24",
          "gatewayIpV6Address": "",
          "intfDescription": "",
          "isIp6DhcpRelay": "",
          "isIpDhcpRelay": "",
          "isLayer2Only": "false",
          "isSharedBorder": "",
          "localAsn": "",
          "mtu": "68",
          "networkName": "MyNetwork_30000",
          "nveId": "1",
          "rtAsn": "",
          "rtBothAuto": "false",
          "secondaryGW1": "192.0.2.1/24",
          "secondaryGW2": "192.0.3.1/24",
          "secondaryGW3": "",
          "segmentId": "30000",
          "suppressArp": "",
          "switchRole": "",
          "tag": "12345",
          "type": "",
          "vlanId": "300",
          "vlanName": "vlan300",
          "vrfName": "MyVRF_50000"
        },
        "networkTemplateName": "Default_Network_Universal",
        "networkType": "userDefined",
        "vlanId": 300,
        "vrfName": "MyVRF_50000"
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

