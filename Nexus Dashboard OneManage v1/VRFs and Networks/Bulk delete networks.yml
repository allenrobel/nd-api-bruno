info:
  name: Bulk delete networks
  type: http
  seq: 5
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkActions/remove"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "networkNames": [
          "MyNetwork_30000",
          "MyNetwork_30001"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: deleteTwoNetworks
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkActions/remove"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "networkNames": [
              "MyNetwork_30000",
              "MyNetwork_30001"
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "networkName": "MyNetwork_30000",
                "status": "success"
              },
              {
                "message": "Network MyNetwork_30001 not found",
                "networkName": "MyNetwork_30001",
