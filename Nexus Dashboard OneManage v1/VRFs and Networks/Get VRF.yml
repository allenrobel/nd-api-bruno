info:
  name: Get VRF
  type: http
  seq: 29
  tags:
    - VRFs and Networks

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/vrfs/:vrfName"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: vrfName
      value: ""
      type: path
      description: Name of the vrf
    - name: fetchMembers
      value: ""
      type: query
      description: If true, fetches the members details of a policy
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

