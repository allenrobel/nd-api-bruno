info:
  name: Export fabric network list
  type: http
  seq: 2
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkActions/export"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "networkNames": [
          "MyNetwork_30000",
          "MyNetwork_40000"
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: When there are multiple types of networks in the fabric, the response will be a zip file containing multiple csv files for each type of network
    description: |
      When there are multiple types of networks in the fabric, the response will be a zip file containing multiple csv files for each type of network.  Each csv file will be named as 'networks_<networkType>_<fabricName>_<timestamp>.csv', e.g., 'networks_vxlan_fab1_20251031211500000.csv' for vxlan type networks
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkActions/export"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "networkNames": [
              "MyNetwork_30000",
              "MyNetwork_40000"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/zip
      body:
        type: text
        data: <binary data representation of a zip file>
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkActions/export"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "networkNames": [
              "MyNetwork_30000",
              "MyNetwork_40000"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          fabricName,networkType,networkName,displayName,networkStatus,vrfName,vlanId,networkMode,networkId,vlanNetworkType,primaryNetworkId,primaryNetworkName,rtAuto,vlanName,xConnect,routingTag,arpSuppression,vlanInterfaceDescription,gatewayIpv4Address,secondaryGatewayIpv4Collection,gatewayIpv6Address,secondaryGatewayIpv6Collection,mtu,tenantName 
          fab1,vxlan,MyNetwork_30001,MyNetwork_30001,notApplicable,MyVRF_50001,2301,layer3,30001,normal,,,false,,,12345,,,,,,,, 
          fab1,vxlan,MyNetwork_30000,MyNetwork_30000,notApplicable,MyVRF_50000,2300,layer3,30000,normal,,,false,,,12345,,,192.0.2.1/24,"["1.1.1.1/24","2.2.2.2/24"]",2001:db9::1/64,"["2001:db7::1/64","2001:db8::1/64"]",,
