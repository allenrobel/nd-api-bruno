  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: vrfName
      value: ""
      type: path
      description: Name of the vrf
  body:
    type: json
    data: |-
      {
        "fabricName": "MCF",
        "serviceVrfTemplateName": "",
        "vlanId": 10,
        "vrfExtensionTemplateName": "Default_VRF_Extension_Universal",
        "vrfId": 50010,
        "vrfName": "MyVRF_50010",
        "vrfTemplateConfig": {
          "asn": "",
          "disableRtAuto": "false",
          "ipv6LinkLocalFlag": "true",
          "maxBgpPaths": "1",
          "maxIbgpPaths": "2",
          "mtu": "9216",
          "nveId": "1",
          "routeTargetExport": "",
          "routeTargetExportEvpn": "",
          "routeTargetImport": "",
          "routeTargetImportEvpn": "65100:1000,65101:2000,65102:3000",
          "tag": "12345",
          "vrfDescription": "",
          "vrfIntfDescription": "vrf int desc",
          "vrfName": "MyVRF_50010",
          "vrfRouteMap": "FABRIC-RMAP-REDIST-SUBNET",
          "vrfSegmentId": "50010",
          "vrfVlanId": "10",
          "vrfVlanName": ""
        },
        "vrfTemplateName": "Default_VRF_Universal",
        "vrfType": "userDefined"
      }
  auth: inherit

