info:
  name: Attach/detach VRFs
  type: http
  seq: 21
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/vrfAttachments"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: quickAttach
      value: ""
      type: query
      description: If true, attachment will be done with next available VLAN
      disabled: true
  body:
    type: json
    data: |-
      {
        "attachments": [
          {
            "attach": true,
            "extensionValues": [],
            "extraConfig": "",
            "instanceValues": {},
            "switchId": "9W8L5DRWO1F",
            "vlanId": 1000,
            "vrfName": "MyVRF_50000"
          },
          {
            "attach": true,
            "extensionValues": [],
            "extraConfig": "",
            "instanceValues": {},
            "switchId": "9RJ6QOIU4YC",
            "vlanId": 2000,
            "vrfName": "MyVRF_50000"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: TwoVRFAttachments (Attach single VRF to multiple switches)
    description: Attach a single VRF to two switches
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/vrfAttachments"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: quickAttach
          value: ""
          type: query
          description: If true, attachment will be done with next available VLAN
          disabled: true
      body:
        type: json
        data: |-
          {
            "attachments": [
              {
                "attach": true,
                "extensionValues": [],
                "extraConfig": "",
                "instanceValues": {},
                "switchId": "9W8L5DRWO1F",
                "vlanId": 1000,
                "vrfName": "MyVRF_50000"
              },
              {
                "attach": true,
                "extensionValues": [],
                "extraConfig": "",
                "instanceValues": {},
                "switchId": "9RJ6QOIU4YC",
                "vlanId": 2000,
                "vrfName": "MyVRF_50000"
              }
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "message": "vlanId already exists",
                "status": "failed",
                "switchId": "99X70W9ORI1",
                "switchName": "bgl-vp-leaf2",
                "vrfName": "MyVRF_50001"
              },
              {
                "status": "success",
                "switchId": "99X70W9ORI1",
                "switchName": "bgl-vp-leaf2",
                "vrfName": "MyVRF_50000"
              }
            ]
          }
