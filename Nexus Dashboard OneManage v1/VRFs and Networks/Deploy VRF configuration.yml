          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "switchIds": [
              "99X70W9ORI1"
            ],
            "vrfNames": [
              "MyVRF_50001"
            ]
          }
    response:
      status: 202
      statusText: Accepted
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "Deployment of VRFs has been initiated successfully"
          }
