info:
  name: Import network attachments via CSV
  type: http
  seq: 8
  tags:
    - VRFs and Networks

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkAttachments/import"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: CSV import response (Network attachments CSV import)
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networkAttachments/import"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "results": [
              {
                "networkName": "MyNetwork_30000",
                "status": "success",
                "switchId": "FDO20212311U",
                "switchName": "switch1"
              },
              {
                "message": "vlanId already exists",
                "networkName": "MyNetwork_30001",
                "status": "failed",
                "switchId": "FDO20212312U",
                "switchName": "switch2"
              }
            ]
          }
