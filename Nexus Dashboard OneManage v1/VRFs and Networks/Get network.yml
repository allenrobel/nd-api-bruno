info:
  name: Get network
  type: http
  seq: 14
  tags:
    - VRFs and Networks

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/networks/:networkName"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: networkName
      value: ""
      type: path
      description: Then name of the network
    - name: fetchMembers
      value: ""
      type: query
      description: If true, fetches the members details of a policy
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

