info:
  name: Replace a security contract
  type: http
  seq: 18
  tags:
    - Security and Segmentation

http:
  method: PUT
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/securityContracts/:contractName"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: contractName
      value: ""
      type: path
      description: Security Contract Name path parameter
  body:
    type: json
    data: |-
      {
        "description": "Allow web traffic",
        "direction": "custom",
        "displayName": "permit_web",
        "name": "permit-web",
        "rules": [
          {
            "action": "permitLog",
            "direction": "bidirectional",
            "matchSummary": "IP TCP dport:443",
            "protocolDefinitionName": "https",
            "ruleDirection": "bidirectional"
          },
          {
            "action": "permitLog",
            "direction": "unidirectional",
            "matchSummary": "IP TCP dport:80",
            "protocolDefinitionName": "http",
            "ruleDirection": "unidirectional"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

