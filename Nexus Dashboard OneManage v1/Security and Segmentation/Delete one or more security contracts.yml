          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "securityContractNames": [
              "permit-web"
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "securityContracts": [
              {
                "name": "permit-web",
                "status": "success",
                "message": "Successfully deleted security contract: permit-web"
              }
