          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "securityGroupNames": [
              "SG_10000"
            ]
          }
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "securityGroups": [
              {
                "name": "SG_10000",
                "status": "success",
                "message": "Successfully detached security group: SG_10000"
              }
            ]
