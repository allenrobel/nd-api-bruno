info:
  name: Create one or more security groups
  type: http
  seq: 26
  tags:
    - Security and Segmentation

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/securityGroups"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "securityGroups": [
          {
            "attach": true,
            "description": "Webserver Security Group",
            "displayName": "SG_10000",
            "id": 10000,
            "name": "SG_10000",
            "selectors": [
              {
                "ip": "10.10.2.2",
                "type": "connectedEndpoint",
                "vrfName": "MyVRF_50000"
              },
              {
                "ip": "10.10.2.3",
                "type": "connectedEndpoint",
                "vrfName": "MyVRF_50000"
              },
              {
                "ip": "20.10.2.0/16",
                "type": "externalSubnet",
                "vrfName": "MyVRF_50000"
              },
              {
                "networkName": "MyNetwork_30000",
                "type": "network",
                "vrfName": "MyVRF_50000"
              },
              {
                "interfaceName": "Ethernet1/1",
                "networkName": "MyNetwork_30000",
                "switchId": "99TLP2R8Y8R",
                "type": "networkPort",
                "vrfName": "MyVRF_50000"
              }
            ],
            "vrfNames": [
              "MyVRF_50000"
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

