      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "securityAssociationNames": [
              "SA_10000",
              "SA_10001"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          name,tenantName,displayName,description,contractName,srcSecurityGroupName,srcVrfName,dstSecurityGroupName,dstVrfName,attach
          SA_10000,,SA_10000,Permit HTTPs traffic between SG_10000 and Any,pemrit-web,Any,MyVRF_50000,SG_10000,MyVRF_50000,true
          SA_10001,,SA_10001,Deny ICMP traffic between SG_20000 and SG_30000,deny-web,SG_30000,MyVRF_50001,SG_20000,MyVRF_50001,true
