info:
  name: Export the security associations
  type: http
  seq: 3
  tags:
    - Security and Segmentation

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/securityAssociationActions/export"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "securityAssociationNames": [
          "SA_10000",
          "SA_10001"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response (Export multiple security associations)
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/securityAssociationActions/export"
