info:
  name: Create security contracts
  type: http
  seq: 15
  tags:
    - Security and Segmentation

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/securityContracts"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "securityContracts": [
          {
            "description": "Allow web traffic",
            "direction": "custom",
            "displayName": "permit-web",
            "name": "permit-web",
            "rules": [
              {
                "action": "permit",
                "direction": "bidirectional",
                "matchSummary": "IP TCP dport:443",
                "protocolDefinitionName": "https",
                "ruleDirection": "bidirectional"
              },
              {
                "action": "permit",
                "direction": "unidirectional",
                "matchSummary": "IP TCP dport:80",
                "protocolDefinitionName": "http",
                "ruleDirection": "unidirectional"
              }
            ]
          }
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

