info:
  name: Deployment history for the given fabric
  type: http
  seq: 20
  tags:
    - Fabric Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/deploymentHistory"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: sort
      value: ""
      type: query
      description: Sort the records by the declared fields in either ascending (default) or descending (:desc) order
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the cluster
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

