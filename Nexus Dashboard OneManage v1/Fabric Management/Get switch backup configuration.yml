info:
  name: Get switch backup configuration
  type: http
  seq: 18
  tags:
    - Fabric Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/backups/:backupVersion/switchConfigs"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: backupVersion
      value: ""
      type: path
      description: Backup version of the fabric backup
    - name: switchId
      value: ""
      type: query
      description: Serial Number or Id of the switch/leaf
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Example response for an external fabric configuration
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/backups/:backupVersion/switchConfigs"
      method: GET
      params:
        - name: fabricName
