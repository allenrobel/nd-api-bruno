          type: path
          description: Backup version of the fabric backup
        - name: switchId
          value: ""
          type: query
          description: Serial Number or Id of the switch/leaf
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "configResponseType": "other",
            "items": [
              {
                "backupConfig": [
                  "vrf context management",
                  "   ip route 0.0.0.0/0 172.22.31.2"
                ],
                "runningConfig": [
                  "vrf context management",
                  "   ip route 0.0.0.0/0 172.22.31.2"
                ],
                "sideBySideDiff": [
                  {
                    "differenceType": "insert",
                    "expectedConfig": "feature bgp",
                    "runningConfig": ""
                  },
                  {
                    "differenceType": "delete",
                    "expectedConfig": "",
                    "runningConfig": "no feature dhcp"
                  },
                  {
                    "differenceType": "equal",
                    "expectedConfig": "configure terminal",
                    "runningConfig": "configure terminal"
                  }
                ],
                "switchId": "87X70T9OBH5"
              }
            ]
          }
