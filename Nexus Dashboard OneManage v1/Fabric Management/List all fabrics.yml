info:
  name: List all fabrics
  type: http
  seq: 1
  tags:
    - Fabric Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics"
  params:
    - name: category
      value: fabric
      type: query
      description: Filter by category of fabric for fabricGroups
      disabled: true
    - name: category
      value: fabricGroup
      type: query
      description: Filter by category of fabric for fabricGroups
      disabled: true
    - name: category
      value: multiClusterFabricGroup
      type: query
      description: Filter by category of fabric for fabricGroups
    - name: filter
      value: ""
      type: query
      description: Lucene format filter - Filter the response based on this filter field
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: sort
      value: ""
      type: query
      description: Sort the records by the declared fields in either ascending (default) or descending (:desc) order
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

