info:
  name: Fabric Configuration Deploy
  type: http
  seq: 8
  tags:
    - Fabric Management

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/actions/deploy"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: forceShowRun
      value: ""
      type: query
      description: If true, Config compliance fetches the latest running config from the Device. If false, Config compliance uses the cached version for computation.
      disabled: true
    - name: includeAllFabricGroupSwitches
      value: ""
      type: query
      description: If this passed as true and the queried fabric is a VXLAN fabric group aka Multi-Site Domain (MSD) fabric, then all of the child fabric switches configuration preview is provided, if passed as false switches in migration state will not be used for configuration preview and only switches with core router and border gateway roles will be used for configuration preview. If fabric is not a Multi-Site Domain, this flag is ignored.
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

