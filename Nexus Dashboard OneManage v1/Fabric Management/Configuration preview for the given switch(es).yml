info:
  name: Configuration preview for the given switch(es)
  type: http
  seq: 27
  tags:
    - Fabric Management

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/switchActions/preview"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: forceShowRun
      value: ""
      type: query
      description: If true, Config compliance fetches the latest running config from the Device. If false, Config compliance uses the cached version for computation.
      disabled: true
    - name: showBrief
      value: ""
      type: query
      description: If true, API provides line count of the pending config. If false, detailed output is provided.
      disabled: true
    - name: recompute
      value: "false"
      type: query
      description: If this passed as true, compliance cache for specified switch(es) is cleared before computing pending configuration. If this passed as false, pending configuration is returned from compliance cache.
  body:
    type: json
    data: |-
      {
        "switchIds": [
          "907DONUCRPQ",
          "9CWJXKE3ZOL"
        ]
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

