info:
  name: Get switch configuration differences
  type: http
  seq: 28
  tags:
    - Fabric Management

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/switches/:switchId/diff"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
    - name: switchId
      value: ""
      type: path
      description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
    - name: forceShowRun
      value: ""
      type: query
      description: If true, Config compliance fetches the latest running config from the Device. If false, Config compliance uses the cached version for computation.
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Get side by side configuration difference for a given switch
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/fabrics/:fabricName/switches/:switchId/diff"
      method: GET
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
        - name: switchId
          value: ""
          type: path
          description: For ACI fabrics, the node ID. For NX-OS fabrics, the switch serial number.
        - name: forceShowRun
          value: ""
          type: query
          description: If true, Config compliance fetches the latest running config from the Device. If false, Config compliance uses the cached version for computation.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "diffConfigs": [
              {
                "differenceType": "insert",
                "expectedConfig": "feature bgp",
                "runningConfig": ""
              },
              {
                "differenceType": "delete",
                "expectedConfig": "",
                "runningConfig": "no feature dhcp"
              },
              {
                "differenceType": "equal",
                "expectedConfig": "configure terminal",
                "runningConfig": "configure terminal"
              }
            ]
          }
