info:
  name: Get alert trend across clusters
  type: http
  seq: 2
  tags:
    - Advisories and Anomalies

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/analyze/alerts/trend"
  params:
    - name: timezoneOffset
      value: ""
      type: query
      description: Offset from UTC based on the user's time zone
    - name: endDate
      value: ""
      type: query
      description: End date
      disabled: true
    - name: startDate
      value: ""
      type: query
      description: Start date
      disabled: true
    - name: alertType
      value: anomaly
      type: query
      description: Categorization of alert record (Anomaly or Advisory)
      disabled: true
    - name: alertType
      value: advisory
      type: query
      description: Categorization of alert record (Anomaly or Advisory)
      disabled: true
    - name: interval
      value: ""
      type: query
      description: Time interval as date string (600m / 12h / 2d) for trend in anomalies (default is 1d)
      disabled: true
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

