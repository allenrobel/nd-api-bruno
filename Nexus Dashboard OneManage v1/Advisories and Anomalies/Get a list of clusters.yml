info:
  name: Get a list of clusters
  type: http
  seq: 4
  tags:
    - Advisories and Anomalies

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/infra/clusters"
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/infra/clusters"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "clusters": [
              {
                "advisoryLevel": "warning",
                "anomalyLevel": "critical",
                "clusterName": "cl1",
                "clusterType": "ND",
                "numberOfFabrics": 2,
                "numberOfNodes": 3,
                "virtual": true
              },
              {
                "advisoryLevel": "warning",
                "anomalyLevel": "healthy",
                "clusterName": "cl2",
                "clusterType": "APIC",
                "numberOfFabrics": 1,
                "numberOfNodes": 6,
                "virtual": false
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/infra/clusters"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Bad Request",
            "description": "The server could not understand the request due to incorrect syntax.",
            "code": 400
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/infra/clusters"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Unauthorized",
            "description": "Indicates that the request requires user authentication information.",
            "code": 401
          }
  - name: 403 Response
    description: Forbidden
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/infra/clusters"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Forbidden",
            "description": "The client does not have access rights to the content.",
            "code": 403
          }
  - name: 404 Response
    description: Not Found
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/infra/clusters"
      method: GET
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Not Found",
            "description": "The server cannot find the requested resource.",
            "code": 404
          }
  - name: 429 Response
    description: Too many requests.
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/infra/clusters"
      method: GET
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Too Many Requests",
