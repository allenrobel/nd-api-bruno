                "srcClusterName": "cluster-1"
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/csv
      body:
        type: text
        data: |
          policyType,linkId,linkDiscovered,linkPlanned,linkPresent,portChannel,linkState,linkType,dstFabricName,srcFabricName,dstSwitchId,srcSwitchId,dstSwitchName,srcSwitchName,dstInterfaceName,srcInterfaceName,destinationClusterName,sourceClusterName,sourceSwitchRole,sourceInterfaceOperReason,sourceInterfaceOperStatus,sourceInterfaceAdminStatus,sourceSwitchModelName,sourceVdc,sourceVdcId,destinationSwitchRole,destinationInterfaceOperReason,destinationInterfaceOperStatus,destinationInterfaceAdminStatus,destinationSwitchModelName,destinationVdc,destinationVdcId,srcEbgpAsn,ebgpMultihop,ipv6Trm,redistributeRouteServer,donotGenerateConfig,ipv4Trm,dstEbgpAsn,ebgpAuthKeyEncryptionType,dstIpAddress,srcInterfaceDescription,srcIpAddress,ebgpPassword,routeServerRoutingTag,inheritEbgpPasswordMsdSettings,dstInterfaceDescription,macsecCipherSuite,enableEbgpPassword
          multisiteOverlay,MC-LINK-UUID-ec99b527-6493-43fe-ac6e-020be3acef47,false,true,false,false,,multi_cluster_planned_link,fab2,fab3,90M1T1IS6MU,9U4YW44YRUL,v2-bgw3,v2-bgw4,Loopback0,Loopback0,cluster78,cluster59,border gateway,,Up,Up,N9K-C9300v,false,0,border gateway,,Up,Up,N9K-C9300v,false,0,false,false,true,multi-site overlay session to v2-bgw4,true,,12345,10.2.0.1,30.2.0.2,true,,13579,,5,multi-site overlay session to v2-bgw3,false,
          multisiteOverlay,MC-LINK-UUID-625a37c2-33be-4bd7-9adb-8f2add625608,false,true,false,false,,multi_cluster_planned_link,fab1,fab3,9C9744CLV9H,9U4YW44YRUL,v2-bgw1,v2-bgw4,Loopback0,Loopback0,cluster150,cluster59,border gateway,,Up,Up,N9K-C9300v,false,0,border gateway,,Up,Up,N9K-C9300v,false,0,12345,5,false,false,false,false,24680,3,20.2.0.1,multi-site overlay session to v2-bgw1,30.2.0.2,,,true,multi-site overlay session to v2-bgw4,,true
