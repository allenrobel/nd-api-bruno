info:
  name: Export one or more links
  type: http
  seq: 3
  tags:
    - Links

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/linkActions/export"
  params:
    - name: fabricName
      value: ""
      type: query
      description: Name of the fabric
  body:
    type: json
    data: |-
      {
        "exportList": [
          {
            "dstClusterName": "cluster-2",
            "linkId": "LINK-UUID-8540",
            "srcClusterName": "cluster-1"
          },
          {
            "dstClusterName": "cluster-2",
            "linkId": "LINK-UUID-3650",
            "srcClusterName": "cluster-1"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: When there are multiple types of links (different policyTypes), the response will be a zip file containing multiple csv files for each policyType
    description: |
      When there are multiple types of links (different policyTypes), the response will be a zip file containing multiple csv files for each policyType. Each csv file will be named as 'links_<policyType>_<fabricName>_<timestamp>.csv', e.g., 'links_multisiteUnderlay_fab1_20251031211500000.csv' for multisiteUnderlay type links
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/linkActions/export"
      method: POST
      params:
        - name: fabricName
          value: ""
          type: query
          description: Name of the fabric
      body:
        type: json
        data: |-
          {
            "exportList": [
              {
                "dstClusterName": "cluster-2",
                "linkId": "LINK-UUID-8540",
                "srcClusterName": "cluster-1"
              },
              {
                "dstClusterName": "cluster-2",
                "linkId": "LINK-UUID-3650",
                "srcClusterName": "cluster-1"
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/zip
      body:
        type: text
        data: <binary data representation of a zip file>
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/linkActions/export"
      method: POST
      params:
        - name: fabricName
