info:
  name: Import one or more links
  type: http
  seq: 4
  tags:
    - Links

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/linkActions/import"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: CreatedOneLink
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/linkActions/import"
      method: POST
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "links": [
              {
                "linkId": "LINK-UUID-8540",
                "message": "LINK-UUID-8540 create successful",
                "status": "success"
              }
            ]
          }
  - name: CreatedTwoLinks
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/linkActions/import"
      method: POST
    response:
      status: 207
      statusText: Multi-Status
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "links": [
              {
                "linkId": "LINK-UUID-8540",
                "message": "LINK-UUID-8540 create successful",
                "status": "success"
              },
              {
                "linkId": "LINK-UUID-8541",
                "message": "LINK-UUID-8541 failed due to database error",
                "status": "failure"
              }
            ]
          }
