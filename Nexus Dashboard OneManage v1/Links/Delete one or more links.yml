info:
  name: Delete one or more links
  type: http
  seq: 5
  tags:
    - Links

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}{{oneManagePath}}/manage/linkActions/remove"
  params:
    - name: isLogicalLink
      value: "false"
      type: query
      description: Is the link a logical link, if yes, pass true, else pass false.
  body:
    type: json
    data: |-
      {
        "links": [
          {
            "dstClusterName": "cluster-2",
            "linkId": "MC-LINK-UUID-7e14e899-424b-4641-a329-71f8b66a05a2",
            "srcClusterName": "cluster-1"
          },
          {
            "dstClusterName": "cluster-2",
            "linkId": "MC-LINK-UUID-b69abba1-1f50-4b49-b61e-7364872b8880",
            "srcClusterName": "cluster-1"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

