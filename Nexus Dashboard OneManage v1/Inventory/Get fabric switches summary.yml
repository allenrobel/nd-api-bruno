info:
  name: Get fabric switches summary
  type: http
  seq: 2
  tags:
    - Inventory

http:
  method: GET
  url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/switches/summary"
  params:
    - name: fabricName
      value: ""
      type: path
      description: Name of the fabric
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://example.com/login
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: observer fabric-admin support-engineer super-admin approver designer
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{controllerProtocol}}{{controllerIp}}{{basePath}}/manage/fabrics/:fabricName/switches/summary"
      method: GET
      params:
        - name: fabricName
          value: ""
          type: path
          description: Name of the fabric
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "anomalyLevel": [
              {
                "name": "critical",
                "count": 2
              },
              {
                "name": "warning",
                "count": 2
              }
            ],
            "configSyncStatus": [
              {
                "name": "outOfSync",
                "count": 2
              },
              {
                "name": "inSync",
                "count": 4
              }
            ],
            "role": [
              {
                "name": "leaf",
                "count": 2
              },
              {
                "name": "controller",
                "count": 4
              }
            ],
            "softwareVersion": [
              {
                "name": "5.2(h)",
                "count": 2
              },
              {
                "name": "6.4(g)",
                "count": 4
              }
            ]
