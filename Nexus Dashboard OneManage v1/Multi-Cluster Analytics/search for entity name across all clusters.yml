      description: End date
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Number of records to skip for pagination
      disabled: true
    - name: max
      value: ""
      type: query
      description: Number of records to return
      disabled: true
    - name: sort
      value: ""
      type: query
      description: Sort the records by the declared fields in either ascending (default) or descending (:desc) order
      disabled: true
    - name: clusterName
      value: ""
      type: query
      description: Name of the cluster
      disabled: true
    - name: category
      value: endpoint
      type: query
      description: search category to filter search results with
      disabled: true
