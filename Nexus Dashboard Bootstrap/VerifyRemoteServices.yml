info:
  name: Verify Remote Services
  type: http
  seq: 1

http:
  method: POST
  url: "{{controllerProtocol}}{{controllerIp}}/bootstrap/verifyremoteservices"
  body:
    type: json
    data: |-
      {
        "nameServers": [
          "192.168.7.1"
        ],
        "ntpConfig": {
          "servers": [
            {
              "host": "192.168.7.6",
              "prefer": true
            }
          ]
        }
      }
