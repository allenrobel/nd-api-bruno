opencollection: 1.0.0

info:
  name: Schema
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: basePath
      value: /api/v1
  auth:
    type: bearer
    token: "{{nd_auth_token}}"
  scripts:
    - type: before-request
      code: |-
        // Skip token check for login request itself
        if (req.getUrl().includes('/login')) {
          return;
        }

        // Check if token exists
        const token = bru.getVar("nd_auth_token");
        if (!token) {
          console.log("No auth token found. Please run the login request first.");
        }
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
